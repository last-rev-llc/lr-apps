<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="var(--accent)">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>⚡ Clients — Command Center</title>
<link rel="stylesheet" href="https://shared.adam-harris.alphaclaw.app/theme.css">
<script src="https://shared.adam-harris.alphaclaw.app/components/index.js"></script>
    <script src="https://shared.adam-harris.alphaclaw.app/supabase-auth.js"></script>
<script src="https://shared.adam-harris.alphaclaw.app/supabase-client.js"></script>
<script src="modules/index.js"></script>
<script src="https://shared.adam-harris.alphaclaw.app/sql-sync.js"></script>
<script src="db.js"></script>
<script src="https://unpkg.com/lucide@0.454.0/dist/umd/lucide.min.js"></script>
<style>
  /* Client selector grid */
  .client-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; padding: 20px 0; }
  .client-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; cursor: pointer; transition: all .2s; position: relative; overflow: hidden; }
  .client-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.2); }
  .client-card.active { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(245,158,11,.2); }
  .client-card-name { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .client-card-industry { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
  .client-card-stats { display: flex; gap: 16px; flex-wrap: wrap; }
  .client-card-stat { text-align: center; }
  .client-card-stat-val { font-size: 18px; font-weight: 700; color: var(--accent); }
  .client-card-stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .client-health-badge { position: absolute; top: 12px; right: 12px; width: 12px; height: 12px; border-radius: 50%; }
  .client-health-badge.green { background: var(--green); }
  .client-health-badge.yellow { background: #eab308; }
  .client-health-badge.red { background: #ef4444; }
  .client-health-badge.unknown { background: var(--muted); }

  /* Client dashboard */
  .client-dashboard { max-width: 1200px; margin: 0 auto; }
  .client-back { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: 13px; cursor: pointer; padding: 8px 0; border: none; background: none; transition: color .2s; }
  .client-back:hover { color: var(--text); }
  .client-dash-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
  .client-dash-name { font-size: 24px; font-weight: 700; }
  .client-dash-meta { font-size: 13px; color: var(--muted); }
  .dash-section { margin-bottom: 28px; }
  .dash-section-title { font-size: 14px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .dash-kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
  .dash-kpi { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; text-align: center; }
  .dash-kpi-val { font-size: 22px; font-weight: 700; color: var(--text); }
  .dash-kpi-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-top: 4px; }
  .dash-list { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .dash-list-item { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; font-size: 13px; }
  .dash-list-item:last-child { border-bottom: none; }
  .dash-list-item a { color: var(--accent); text-decoration: none; }
  .dash-list-item a:hover { text-decoration: underline; }
  .dash-contact { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-bottom: 1px solid var(--border); }
  .dash-contact:last-child { border-bottom: none; }
  .dash-contact-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); color: #000; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; flex-shrink: 0; }
  .dash-contact-info { flex: 1; }
  .dash-contact-name { font-weight: 600; font-size: 14px; }
  .dash-contact-role { font-size: 12px; color: var(--muted); }
  .dash-empty { padding: 24px; text-align: center; color: var(--muted); font-size: 13px; }

  /* Backlog Meeting styles (copied from cc-client-health) */
  .bm-client { margin-bottom: 28px; }
  .bm-client-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: var(--surface); border-radius: 8px 8px 0 0; border-bottom: 2px solid var(--accent); }
  .bm-client-name { font-weight: 700; font-size: 16px; color: var(--text); }
  .bm-client-count { font-size: 12px; color: var(--muted); }
  .bm-client-stats { display: flex; gap: 12px; margin-left: auto; font-size: 11px; color: var(--muted); }
  .bm-client-stat { display: flex; align-items: center; gap: 4px; }
  .bm-status-group { margin: 0; }
  .bm-status-header { display: flex; align-items: center; gap: 6px; padding: 8px 16px; background: rgba(255,255,255,.03); border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .bm-status-dot { width: 8px; height: 8px; border-radius: 50%; }
  .bm-status-dot.in-progress { background: var(--accent); }
  .bm-status-dot.blocked { background: #ef4444; }
  .bm-status-dot.not-started { background: var(--muted); }
  .bm-status-dot.in-review { background: #8b5cf6; }
  .bm-status-dot.done { background: var(--green); }
  .bm-status-dot.discussion { background: #3b82f6; }
  .bm-item { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 4px; }
  .bm-item:last-child { border-bottom: none; }
  .bm-item-title { font-weight: 600; font-size: 14px; color: var(--text); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .bm-item-title a { color: var(--accent); text-decoration: none; }
  .bm-item-title a:hover { text-decoration: underline; }
  .bm-item-meta { display: flex; gap: 8px; align-items: center; font-size: 12px; color: var(--muted); flex-wrap: wrap; }
  .bm-item-summary { font-size: 13px; color: var(--muted); line-height: 1.5; }
  .bm-priority { font-size: 11px; font-weight: 600; padding: 1px 6px; border-radius: 4px; }
  .bm-priority.high { background: rgba(239,68,68,.15); color: #ef4444; }
  .bm-priority.medium { background: rgba(245,158,11,.15); color: var(--accent); }
  .bm-priority.low { background: rgba(34,197,94,.15); color: var(--green); }
  .bm-sources { display: flex; gap: 4px; align-items: center; }
  .bm-source-link { font-size: 11px; color: var(--accent); text-decoration: none; padding: 1px 6px; border-radius: 4px; background: rgba(245,158,11,.08); }
  .bm-source-link:hover { background: rgba(245,158,11,.18); }
  .bm-assignees { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
  .bm-item-due { font-size: 11px; font-weight: 600; padding: 1px 8px; border-radius: 4px; background: rgba(239,68,68,.12); color: #ef4444; }
  .bm-item-due.upcoming { background: rgba(245,158,11,.12); color: var(--accent); }
  .bm-done-toggle { display: flex; align-items: center; gap: 6px; padding: 8px 16px; background: transparent; border: none; border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 600; color: var(--muted); cursor: pointer; width: 100%; text-align: left; text-transform: uppercase; letter-spacing: .5px; }
  .bm-done-toggle:hover { background: rgba(255,255,255,.03); }
  .bm-done-toggle .chevron { transition: transform .2s; display: inline-block; }
  .bm-done-toggle.open .chevron { transform: rotate(90deg); }
  .bm-done-items { display: none; }
  .bm-done-items.open { display: block; }
  .bm-section-label { padding: 10px 16px 6px; font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; background: rgba(245,158,11,.04); border-bottom: 1px solid var(--border); }
  .bm-section-label.highlights { color: var(--muted); background: transparent; }
</style>
</head>
<body>
<div class="sticky-header">
<cc-topbar></cc-topbar>
<cc-nav active="clients"></cc-nav>
</div>
<cc-user-auth mode="gate" allow-signup="false"></cc-user-auth>
<cc-toast></cc-toast>

<div style="max-width:1200px;margin:0 auto;padding:0 20px 40px;">
<cc-tabs active="clients">
  <cc-tab name="clients" label="Clients" icon="building-2">
    <div id="clients-container">
      <div style="text-align:center;padding:40px;color:var(--muted)">Loading clients…</div>
    </div>
  </cc-tab>
  <cc-tab name="backlog" label="Backlog Meeting" icon="clipboard-list">
    <cc-fade-in>
    <div style="margin-bottom:20px;">
      <h2 style="margin:0 0 4px;">📋 Sprint Planning</h2>
      <div style="color:var(--muted);font-size:13px;">Friday meeting with Krista — what's outstanding &amp; next week's priorities</div>
      <div style="color:var(--muted);font-size:12px;margin-top:4px;">Last updated: <span id="bm-updated">—</span></div>
    </div>
    </cc-fade-in>
    <div id="bm-content"></div>
  </cc-tab>
</cc-tabs>
</div>

<script>
// ─── Client Selector + Dashboard ───
(async () => {
  const container = document.getElementById('clients-container');

  // Load client data from accounts app + health data
  let clients = [];
  let healthData = [];
  try {
    const [clientsRes, healthRes] = await Promise.all([
      fetch('https://accounts.adam-harris.alphaclaw.app/data/clients.json').then(r => r.ok ? r.json() : []),
      fetch('data/client-health.json').then(r => r.ok ? r.json() : [])
    ]);
    clients = clientsRes || [];
    healthData = healthRes || [];
  } catch (e) {
    console.error('Failed to load clients:', e);
    container.innerHTML = '<cc-empty-state message="Failed to load client data" icon="⚠️"></cc-empty-state>';
    return;
  }

  if (!clients.length) {
    container.innerHTML = '<cc-empty-state message="No clients found" icon="👥"></cc-empty-state>';
    return;
  }

  // Merge health data into clients
  clients.forEach(c => {
    const h = healthData.find(h => h.client && c.name && h.client.toLowerCase().includes(c.name.split('(')[0].trim().split(' ')[0].toLowerCase()));
    if (h) { c._health = h.health || 'unknown'; c._score = h.score; c._metrics = h.metrics; c._repoDetails = h.repoDetails; c._alerts = h.alerts; }
    else { c._health = 'unknown'; }
  });

  let currentClient = null;

  function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

  function renderSelector() {
    const cards = clients.map(c => {
      const contacts = (typeof c.contacts === 'string' ? JSON.parse(c.contacts || '[]') : c.contacts) || [];
      const repos = (typeof c.repos === 'string' ? JSON.parse(c.repos || '[]') : c.repos) || [];
      return `
      <div class="client-card" onclick="window._selectClient('${esc(c.id)}')">
        <div class="client-health-badge ${c._health || 'unknown'}"></div>
        <div class="client-card-name">${esc(c.name)}</div>
        <div class="client-card-industry">${esc(c.industry || 'Technology')}</div>
        <div class="client-card-stats">
          <div class="client-card-stat"><div class="client-card-stat-val">${repos.length}</div><div class="client-card-stat-label">Repos</div></div>
          <div class="client-card-stat"><div class="client-card-stat-val">${contacts.length}</div><div class="client-card-stat-label">Contacts</div></div>
          ${c._score != null ? `<div class="client-card-stat"><div class="client-card-stat-val">${c._score}</div><div class="client-card-stat-label">Health</div></div>` : ''}
        </div>
      </div>`;
    }).join('');

    container.innerHTML = `
      <div style="margin-bottom:12px;color:var(--muted);font-size:13px;">Select a client to view their dashboard</div>
      <div class="client-grid">${cards}</div>`;
    requestAnimationFrame(() => { if (window.lucide) lucide.createIcons(); });
  }

  function renderDashboard(client) {
    const c = client;
    const contacts = (typeof c.contacts === 'string' ? JSON.parse(c.contacts || '[]') : c.contacts) || [];
    const repos = (typeof c.repos === 'string' ? JSON.parse(c.repos || '[]') : c.repos) || [];
    const meetings = (typeof c.meetings === 'string' ? JSON.parse(c.meetings || '[]') : c.meetings) || [];
    const highlights = (typeof c.highlights === 'string' ? JSON.parse(c.highlights || '[]') : c.highlights) || [];
    const challenges = (typeof c.challenges === 'string' ? JSON.parse(c.challenges || '[]') : c.challenges) || [];
    const upcomingFocus = (typeof c.upcomingFocus === 'string' ? JSON.parse(c.upcomingFocus || '[]') : c.upcomingFocus) || [];
    const notes = (typeof c.notes === 'string' ? JSON.parse(c.notes || '[]') : c.notes) || [];
    const links = (typeof c.links === 'string' ? JSON.parse(c.links || '[]') : c.links) || [];

    // KPIs
    const kpis = [];
    if (c._score != null) kpis.push({ val: c._score, label: 'Health Score' });
    if (c._metrics) {
      if (c._metrics.commitsLast7d != null) kpis.push({ val: c._metrics.commitsLast7d, label: 'Commits (7d)' });
      if (c._metrics.openPRs != null) kpis.push({ val: c._metrics.openPRs, label: 'Open PRs' });
      if (c._metrics.openIssues != null) kpis.push({ val: c._metrics.openIssues, label: 'Open Issues' });
    }
    kpis.push({ val: repos.length, label: 'Repos' });
    kpis.push({ val: contacts.length, label: 'Contacts' });

    const kpiHtml = kpis.map(k => `<div class="dash-kpi"><div class="dash-kpi-val">${k.val}</div><div class="dash-kpi-label">${esc(k.label)}</div></div>`).join('');

    // Contacts
    const contactsHtml = contacts.length ? contacts.map(ct => {
      const name = typeof ct === 'string' ? ct : (ct.name || 'Unknown');
      const role = typeof ct === 'object' ? (ct.role || ct.title || '') : '';
      const initials = name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
      return `<div class="dash-contact"><div class="dash-contact-avatar">${initials}</div><div class="dash-contact-info"><div class="dash-contact-name">${esc(name)}</div>${role ? `<div class="dash-contact-role">${esc(role)}</div>` : ''}</div></div>`;
    }).join('') : '<div class="dash-empty">No contacts added yet</div>';

    // Repos
    const repoHtml = repos.length ? repos.map(r => {
      const name = typeof r === 'string' ? r : (r.name || r.repo || 'Unknown');
      const url = typeof r === 'object' && r.url ? r.url : `https://github.com/last-rev-llc/${name}`;
      return `<div class="dash-list-item"><i data-lucide="git-branch" style="width:14px;height:14px;color:var(--muted)"></i><a href="${esc(url)}" target="_blank">${esc(name)}</a></div>`;
    }).join('') : '<div class="dash-empty">No repos linked yet</div>';

    // Meetings
    const meetingsHtml = meetings.length ? meetings.map(m => {
      const title = typeof m === 'string' ? m : (m.title || m.name || 'Meeting');
      const schedule = typeof m === 'object' ? (m.schedule || m.time || '') : '';
      return `<div class="dash-list-item"><i data-lucide="video" style="width:14px;height:14px;color:var(--muted)"></i><span>${esc(title)}</span>${schedule ? `<span style="margin-left:auto;color:var(--muted);font-size:11px">${esc(schedule)}</span>` : ''}</div>`;
    }).join('') : '<div class="dash-empty">No recurring meetings</div>';

    // Highlights & Challenges
    const highlightsHtml = highlights.length ? highlights.map(h => `<div class="dash-list-item"><span style="color:var(--green)">✓</span> ${esc(typeof h === 'string' ? h : h.text || '')}</div>`).join('') : '<div class="dash-empty">No recent highlights</div>';
    const challengesHtml = challenges.length ? challenges.map(h => `<div class="dash-list-item"><span style="color:#ef4444">⚠</span> ${esc(typeof h === 'string' ? h : h.text || '')}</div>`).join('') : '<div class="dash-empty">No current challenges</div>';

    // Upcoming Focus
    const focusHtml = upcomingFocus.length ? upcomingFocus.map(f => `<div class="dash-list-item"><span style="color:var(--accent)">→</span> ${esc(typeof f === 'string' ? f : f.text || '')}</div>`).join('') : '<div class="dash-empty">No upcoming focus items</div>';

    // Links
    const linksHtml = links.length ? links.map(l => {
      const label = typeof l === 'string' ? l : (l.label || l.name || l.url || 'Link');
      const url = typeof l === 'object' ? (l.url || '#') : l;
      return `<div class="dash-list-item"><i data-lucide="external-link" style="width:14px;height:14px;color:var(--muted)"></i><a href="${esc(url)}" target="_blank">${esc(label)}</a></div>`;
    }).join('') : '';

    // Alerts
    const alertsHtml = (c._alerts || []).map(a => `<div style="padding:8px 14px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:8px;font-size:13px;color:#ef4444;margin-bottom:8px;">⚠️ ${esc(a)}</div>`).join('');

    container.innerHTML = `
      <div class="client-dashboard">
        <button class="client-back" onclick="window._backToClients()">
          <i data-lucide="arrow-left" style="width:14px;height:14px"></i> All Clients
        </button>
        <div class="client-dash-header">
          <div>
            <div class="client-dash-name">${esc(c.name)}</div>
            <div class="client-dash-meta">${esc(c.industry || '')}${c.status ? ' · ' + esc(c.status) : ''}</div>
          </div>
          ${c._health && c._health !== 'unknown' ? `<div class="client-health-badge ${c._health}" style="width:16px;height:16px;position:static"></div>` : ''}
        </div>

        ${alertsHtml}

        <div class="dash-section">
          <div class="dash-kpi-grid">${kpiHtml}</div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
          <div class="dash-section">
            <div class="dash-section-title"><i data-lucide="users" style="width:16px;height:16px"></i> Contacts</div>
            <div class="dash-list">${contactsHtml}</div>
          </div>
          <div class="dash-section">
            <div class="dash-section-title"><i data-lucide="git-branch" style="width:16px;height:16px"></i> Repos</div>
            <div class="dash-list">${repoHtml}</div>
          </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
          <div class="dash-section">
            <div class="dash-section-title"><i data-lucide="video" style="width:16px;height:16px"></i> Recurring Meetings</div>
            <div class="dash-list">${meetingsHtml}</div>
          </div>
          <div class="dash-section">
            <div class="dash-section-title"><i data-lucide="target" style="width:16px;height:16px"></i> Upcoming Focus</div>
            <div class="dash-list">${focusHtml}</div>
          </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
          <div class="dash-section">
            <div class="dash-section-title"><i data-lucide="trending-up" style="width:16px;height:16px"></i> Highlights</div>
            <div class="dash-list">${highlightsHtml}</div>
          </div>
          <div class="dash-section">
            <div class="dash-section-title"><i data-lucide="alert-triangle" style="width:16px;height:16px"></i> Challenges</div>
            <div class="dash-list">${challengesHtml}</div>
          </div>
        </div>

        ${linksHtml ? `<div class="dash-section"><div class="dash-section-title"><i data-lucide="link" style="width:16px;height:16px"></i> Links</div><div class="dash-list">${linksHtml}</div></div>` : ''}

        ${notes.length ? `<div class="dash-section"><div class="dash-section-title"><i data-lucide="sticky-note" style="width:16px;height:16px"></i> Notes</div><div class="dash-list">${notes.map(n => `<div class="dash-list-item">${esc(typeof n === 'string' ? n : n.text || '')}</div>`).join('')}</div></div>` : ''}
      </div>`;

    requestAnimationFrame(() => { if (window.lucide) lucide.createIcons(); });
  }

  window._selectClient = (id) => {
    currentClient = clients.find(c => c.id === id);
    if (currentClient) renderDashboard(currentClient);
  };

  window._backToClients = () => {
    currentClient = null;
    renderSelector();
  };

  // Check URL for pre-selected client
  const urlClient = new URLSearchParams(location.search).get('client');
  if (urlClient) {
    const match = clients.find(c => c.id === urlClient || c.name?.toLowerCase().includes(urlClient.toLowerCase()));
    if (match) { currentClient = match; renderDashboard(match); }
    else renderSelector();
  } else {
    renderSelector();
  }
})();
</script>

<script>
// ─── Backlog Meeting ───
(async () => {
  try {
    const res = await fetch('https://cc-client-health.adam-harris.alphaclaw.app/data/backlog-meeting.json');
    if (!res.ok) { document.getElementById('bm-content').innerHTML = '<cc-empty-state message="No backlog data yet" icon="📋"></cc-empty-state>'; return; }
    const data = await res.json();

    if (data.lastUpdated) {
      document.getElementById('bm-updated').textContent =
        new Date(data.lastUpdated).toLocaleString('en-US', { timeZone: 'America/Los_Angeles', dateStyle: 'medium', timeStyle: 'short' });
    }

    const container = document.getElementById('bm-content');
    const clients = data.clients || [];

    if (!clients.length) {
      container.innerHTML = '<cc-empty-state message="No backlog data yet — will populate on next update" icon="📋"></cc-empty-state>';
      return;
    }

    const outstandingOrder = ['blocked', 'in-progress', 'in-review', 'not-started', 'discussion'];
    const statusLabels = {
      'blocked': '🛑 Blocked', 'in-progress': '🔄 In Progress', 'in-review': '👀 In Review / UAT',
      'not-started': '📋 Not Started / Next Up', 'discussion': '💬 Needs Discussion', 'done': '✅ Completed This Week'
    };

    function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

    function renderAssignees(assignees) {
      if (!assignees || !assignees.length) return '';
      return '<span class="bm-assignees">' + assignees.map(a => {
        if (window.CCUserPill) return CCUserPill.html({ name: a, size: 'sm' });
        return '<span class="badge">' + esc(a) + '</span>';
      }).join('') + '</span>';
    }

    function renderSources(sources) {
      if (!sources || !sources.length) return '';
      return '<span class="bm-sources">' + sources.map(s => {
        const icon = s.type === 'jira' ? '🎫' : s.type === 'slack' ? '💬' : s.type === 'zoom' ? '📹' : '🔗';
        const label = s.label || s.type;
        if (s.url) return `<a href="${esc(s.url)}" target="_blank" class="bm-source-link">${icon} ${esc(label)}</a>`;
        return `<span class="bm-source-link">${icon} ${esc(label)}</span>`;
      }).join('') + '</span>';
    }

    function renderDueDate(due) {
      if (!due) return '';
      const d = new Date(due);
      const now = new Date();
      const diffDays = Math.ceil((d - now) / 86400000);
      const cls = diffDays <= 0 ? 'bm-item-due' : 'bm-item-due upcoming';
      const label = diffDays <= 0 ? 'Overdue' : diffDays === 1 ? 'Due tomorrow' : `Due ${d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}`;
      return `<span class="${cls}">📅 ${label}</span>`;
    }

    function renderItem(item) {
      const titleLink = item.sources?.find(s => s.type === 'jira');
      const titleHtml = titleLink ? `<a href="${esc(titleLink.url)}" target="_blank">${esc(item.title)}</a>` : esc(item.title);
      return `<div class="bm-item">
        <div class="bm-item-title">${titleHtml} ${item.priority ? `<span class="bm-priority ${item.priority}">${item.priority}</span>` : ''} ${renderDueDate(item.dueDate)}</div>
        <div class="bm-item-meta">${renderAssignees(item.assignees)} ${renderSources(item.sources)}</div>
        ${item.summary ? `<div class="bm-item-summary">${esc(item.summary)}</div>` : ''}
      </div>`;
    }

    clients.forEach((client, ci) => {
      const div = document.createElement('div');
      div.className = 'bm-client';

      const byStatus = {};
      (client.items || []).forEach(item => { const s = item.status || 'discussion'; if (!byStatus[s]) byStatus[s] = []; byStatus[s].push(item); });

      const totalItems = (client.items || []).length;
      const doneItems = byStatus['done'] || [];
      const outstandingCount = totalItems - doneItems.length;

      let outstandingHtml = '';
      outstandingOrder.forEach(status => {
        const items = byStatus[status];
        if (!items || !items.length) return;
        outstandingHtml += `<div class="bm-status-group"><div class="bm-status-header"><span class="bm-status-dot ${status}"></span>${statusLabels[status] || status} <span style="opacity:.5">(${items.length})</span></div>${items.map(renderItem).join('')}</div>`;
      });

      let doneHtml = '';
      if (doneItems.length) {
        const doneId = 'done-' + ci;
        doneHtml = `<button class="bm-done-toggle" onclick="const el=document.getElementById('${doneId}');el.classList.toggle('open');this.classList.toggle('open')"><span class="chevron">▶</span><span class="bm-status-dot done"></span>${statusLabels['done']} <span style="opacity:.5">(${doneItems.length})</span></button><div class="bm-done-items" id="${doneId}">${doneItems.map(renderItem).join('')}</div>`;
      }

      const blockedCount = (byStatus['blocked'] || []).length;
      const statsHtml = `<div class="bm-client-stats"><span class="bm-client-stat">${outstandingCount} outstanding</span>${blockedCount ? `<span class="bm-client-stat" style="color:#ef4444">${blockedCount} blocked</span>` : ''}${doneItems.length ? `<span class="bm-client-stat" style="color:var(--green)">${doneItems.length} done</span>` : ''}</div>`;

      div.innerHTML = `<div class="bm-client-header"><span class="bm-client-name">${esc(client.name)}</span><span class="bm-client-count">${totalItems} item${totalItems !== 1 ? 's' : ''}</span>${statsHtml}</div><div class="panel" style="border-radius:0 0 8px 8px;overflow:hidden">${outstandingHtml ? '<div class="bm-section-label">📌 Outstanding & Next Week</div>' : ''}${outstandingHtml}${doneHtml ? '<div class="bm-section-label highlights">Highlights — What Got Done</div>' : ''}${doneHtml}${!outstandingHtml && !doneHtml ? '<cc-empty-state message="No items" icon="✨"></cc-empty-state>' : ''}</div>`;

      container.appendChild(div);
    });
  } catch (e) {
    console.error('Backlog meeting load error:', e);
    document.getElementById('bm-content').innerHTML = '<cc-empty-state message="Failed to load meeting data"></cc-empty-state>';
  }
})();
</script>
<script>if("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js").catch(()=>{});</script>
</body>
</html>
