<style>
/* CC Iron App Styles */
.cc-iron-app {
  max-width: 1200px;
  margin: 0 auto;
  padding: 1rem;
}

.dashboard-container,
.exercises-container,
.workout-container,
.programs-container,
.progress-container {
  min-height: 80vh;
}

.exercise-meta,
.program-meta {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}

.badge-beginner { background: var(--green); color: white; }
.badge-intermediate { background: var(--orange); color: white; }
.badge-advanced { background: var(--red); color: white; }

.exercise-detail h4,
.program-detail h4,
.program-detail h5 {
  margin: 16px 0 8px 0;
}

.program-day {
  border-left: 4px solid var(--accent);
}

.exercise-list {
  padding: 12px;
}

.exercise-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}

.exercise-row:last-child {
  border-bottom: none;
}

.exercise-name {
  flex: 1;
  font-weight: 500;
  text-transform: capitalize;
}

.exercise-sets,
.exercise-rest {
  font-size: 0.875rem;
  color: var(--muted);
}

.alternatives-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 1rem;
}

.workout-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
  padding: 20px;
  background: var(--card);
  border-radius: 12px;
}

.workout-timer {
  font-size: 2rem;
  font-weight: bold;
  color: var(--accent);
  font-family: 'Monaco', monospace;
}

.workout-start {
  text-align: center;
  padding: 40px 20px;
}

.active-workout {
  padding: 20px;
}

.list-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}

.list-row:last-child {
  border-bottom: none;
}

.view-list .entity-actions {
  margin-left: auto;
}

.expanded-card .panel-header h3 {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 0;
}

/* Responsive adjustments */
@media (max-width: 768px) {
  .cc-iron-app {
    padding: 0.5rem;
  }
  
  .alternatives-grid {
    grid-template-columns: 1fr;
  }
  
  .exercise-row {
    flex-direction: column;
    gap: 4px;
  }
  
  .workout-header {
    flex-direction: column;
    gap: 12px;
    text-align: center;
  }
}
</style>
</head>

</body>
