<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#D4A574">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.svg">
<title>🎺 GenSilent — Logs</title>
<link rel="stylesheet" href="https://shared.adam-harris.alphaclaw.app/theme.css">
<script src="https://shared.adam-harris.alphaclaw.app/components/index.js"></script>
    <script src="https://shared.adam-harris.alphaclaw.app/supabase-auth.js"></script>
<meta name="supabase-url" content="https://lregiwsovpmljxjvrrsc.supabase.co">
<meta name="supabase-key" content="sb_publishable_HPinRWPrX97uxshGM0u1rw_UAsQsyFq">
<script src="https://shared.adam-harris.alphaclaw.app/supabase-client.js"></script>

</head>
<body>
<cc-app-topnav app="gen-silent" title="🎺 GenSilent" links='[{"id":"app","label":"App","href":"app.html"},{"id":"apps","label":"Apps","href":"apps.html"}]' active="logs"></cc-app-topnav>
<cc-app-nav app="gen-silent" title="🎺 GenSilent" active="logs" position="bottom"></cc-app-nav>
<cc-user-auth mode="gate" allow-signup="false"></cc-user-auth>
<cc-toast></cc-toast>
<div style="max-width:960px;margin:40px auto;padding:0 20px;">
  <h1 style="font-family:var(--serif);margin-bottom:24px;color:var(--accent, #b8860b);">Change Log</h1>
  <div id="logs-container">Loading logs…</div>
</div>
<script>
(async () => {
  const c = document.getElementById('logs-container');
  const esc = s => { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; };
  try {
    const sb = window.supabase;
    if (!sb) { c.textContent = 'Database not available.'; return; }
    const rows = await sb.select('activity_log', { filters: { app: 'eq.gen-silent' }, order: 'created_at.desc', limit: 100 });
    if (!rows || !rows.length) {
      c.innerHTML = '<cc-empty-state message="No log entries yet" icon="📋"></cc-empty-state>';
      return;
    }
    c.innerHTML = rows.map(r => `
      <div style="padding:10px 0;border-bottom:1px solid var(--border);">
        <span style="color:var(--heading);font-weight:600;">${esc(r.action || 'update')}</span>
        <span style="margin-left:8px;font-size:12px;color:var(--muted);">${esc(new Date(r.created_at).toLocaleString())}</span>
        ${r.detail ? `<div style="font-size:12px;margin-top:4px;">${esc(r.detail)}</div>` : ''}
      </div>`).join('');
  } catch(e) { c.textContent = 'Could not load logs: ' + e.message; }
})();
</script>
</body>
</html>
