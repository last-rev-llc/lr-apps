<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f59e0b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.svg">
<title>Slang Translator — Logs</title>
<link rel="stylesheet" href="https://shared.adam-harris.alphaclaw.app/theme.css">
<script src="https://shared.adam-harris.alphaclaw.app/components/index.js"></script>
    <script src="https://shared.adam-harris.alphaclaw.app/supabase-auth.js"></script>
<meta name="supabase-url" content="https://lregiwsovpmljxjvrrsc.supabase.co">
<meta name="supabase-key" content="sb_publishable_HPinRWPrX97uxshGM0u1rw_UAsQsyFq">
<script src="https://shared.adam-harris.alphaclaw.app/supabase-client.js"></script>
</head>
<body>
<cc-app-topnav app="slang-translator" title="Slang Translator" links='[{"id":"app","label":"App","href":"app.html"}]' active="logs"></cc-app-topnav>
<cc-app-nav app="slang-translator" title="Slang Translator" active="logs" position="bottom"></cc-app-nav>
<cc-user-auth mode="gate" allow-signup="false"></cc-user-auth>
<cc-toast></cc-toast>
<div style="max-width:960px;margin:40px auto;padding:0 20px;">
  <h1 style="font-family:var(--serif);margin-bottom:24px;">Change Log</h1>
  <div id="logs-container" style="color:var(--muted);font-size:14px;">
    <p>Loading logs…</p>
  </div>
</div>
<script>
(async () => {
  const esc = s => { const d = document.createElement('span'); d.textContent = s ?? ''; return d.innerHTML; };
  const container = document.getElementById('logs-container');
  try {
    if (!window.supabase) throw new Error('Supabase not available');
    const rows = await window.supabase.select('activity_log', {
      filters: { app: 'eq.slang-translator' },
      order: 'created_at.desc',
      limit: 50
    });
    if (!rows || rows.length === 0) {
      container.innerHTML = '<cc-empty-state message="No log entries yet" icon="📋"></cc-empty-state>';
      return;
    }
    container.innerHTML = rows.map(r => {
      const d = new Date(r.created_at);
      const ds = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      return `<div class="panel" style="margin-bottom:12px;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span style="color:var(--text);font-weight:600;">${esc(r.action)}</span>
          <span style="font-size:12px;">${esc(ds)}</span>
        </div>
        <div style="font-size:12px;margin-top:4px;">${esc(r.detail)}</div>
      </div>`;
    }).join('');
  } catch (e) {
    container.innerHTML = `<div class="panel" style="margin-bottom:12px;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span style="color:var(--text);font-weight:600;">App Created</span>
        <span style="font-size:12px;">Feb 14, 2026</span>
      </div>
      <div style="font-size:12px;margin-top:4px;">Initial release with Dictionary, Translator, Compare, and Quiz tabs. Merges Gen Alpha (Supabase) and Gen X (JSON) data sources.</div>
    </div>`;
  }
})();
</script>
</body>
</html>
