<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="cc-base" content="/apps/shared/">
<title>🍷 Proper Wine Pour — Logs</title>
<meta name="theme-color" content="#722F37">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="/apps/shared/theme.css">
<script src="/apps/shared/components/index.js"></script>
<meta name="supabase-url" content="https://lregiwsovpmljxjvrrsc.supabase.co">
<meta name="supabase-key" content="sb_publishable_HPinRWPrX97uxshGM0u1rw_UAsQsyFq">
<script src="/apps/shared/supabase-client.js"></script>
<meta name="app-id" content="proper-wine-pour">
<script src="/apps/shared/supabase-auth.js"></script>
<script src="/apps/shared/components/cc-user-auth.js"></script>
</head>
<body>
<cc-app-nav app="proper-wine-pour" title="🍷 Proper Wine Pour" active="logs"></cc-app-nav>
<cc-user-auth mode="menu" providers="email"></cc-user-auth>
<cc-toast></cc-toast>
<div style="max-width:960px;margin:40px auto;padding:0 20px;">
  <h1 style="font-family:var(--serif);margin-bottom:24px;">📋 Change Log</h1>
  <div id="logs-container" style="color:var(--muted);font-size:14px;">Loading logs…</div>
</div>
<script>
(async () => {
  const container = document.getElementById('logs-container');
  try {
    const sb = window.supabase;
    if (!sb) { container.textContent = 'Database not available.'; return; }
    const rows = await sb.select('activity_log', { filters: { app: 'eq.proper-wine-pour' }, order: 'created_at.desc', limit: 100 });
    if (!rows || !rows.length) {
      container.innerHTML = '<cc-empty-state message="No log entries yet. Activity will appear here as changes are made." icon="📋" animation="none"></cc-empty-state>';
      return;
    }
    const esc = s => { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; };
    container.innerHTML = rows.map(r => `
      <div style="padding:10px 0;border-bottom:1px solid var(--border);">
        <span style="color:var(--heading);font-weight:600;">${esc(r.action || 'update')}</span>
        <span style="margin-left:8px;font-size:12px;color:var(--muted);">${esc(new Date(r.created_at).toLocaleString())}</span>
        ${r.detail ? `<div style="font-size:12px;margin-top:4px;">${esc(r.detail)}</div>` : ''}
      </div>`).join('');
  } catch(e) {
    container.textContent = 'Could not load logs: ' + e.message;
  }
})();
</script>
</body>
</html>
