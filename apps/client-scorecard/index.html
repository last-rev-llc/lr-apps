<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#22c55e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.svg">
<title>🏥 Client Scorecard</title>
<meta name="supabase-url" content="https://lregiwsovpmljxjvrrsc.supabase.co">
<meta name="supabase-key" content="sb_publishable_HPinRWPrX97uxshGM0u1rw_UAsQsyFq">
<link rel="stylesheet" href="https://shared.adam-harris.alphaclaw.app/theme.css">
<script src="https://shared.adam-harris.alphaclaw.app/components/index.js"></script>
    <script src="https://shared.adam-harris.alphaclaw.app/supabase-auth.js"></script>
<script src="https://shared.adam-harris.alphaclaw.app/supabase-client.js"></script>
<style>
.scorecard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; padding: 20px; }
.client-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; transition: border-color 0.2s; }
.client-card:hover { border-color: var(--accent); }
.client-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.client-name { font-size: 20px; font-weight: 700; color: var(--text); }
.health-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 99px; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.health-green { background: rgba(34,197,94,0.15); color: var(--green); }
.health-yellow { background: rgba(234,179,8,0.15); color: var(--yellow); }
.health-red { background: rgba(239,68,68,0.15); color: var(--red); }
.score-ring { width: 64px; height: 64px; position: relative; margin: 0 auto 16px; }
.score-ring svg { transform: rotate(-90deg); }
.score-ring circle { fill: none; stroke-width: 6; }
.score-ring .bg { stroke: var(--border); }
.score-ring .fg { stroke-linecap: round; transition: stroke-dashoffset 0.6s ease; }
.score-value { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; }
.metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
.metric { background: var(--bg); border-radius: 8px; padding: 12px; }
.metric-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.metric-value { font-size: 20px; font-weight: 700; color: var(--text); }
.metric-detail { font-size: 12px; color: var(--muted); margin-top: 2px; }
.metric-trend { font-size: 12px; margin-top: 2px; }
.trend-up { color: var(--green); }
.trend-down { color: var(--red); }
.trend-flat { color: var(--muted); }
.signal-bars { display: flex; gap: 3px; align-items: end; height: 20px; margin-top: 6px; }
.signal-bar { width: 4px; border-radius: 2px; background: var(--border); }
.signal-bar.active { background: var(--green); }
.signal-bar.warn { background: var(--yellow); }
.signal-bar.danger { background: var(--red); }
.summary-row { display: flex; gap: 16px; padding: 12px 20px; flex-wrap: wrap; }
.summary-stat { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 20px; flex: 1; min-width: 160px; text-align: center; }
.summary-stat .num { font-size: 28px; font-weight: 700; }
.summary-stat .lbl { font-size: 12px; color: var(--muted); text-transform: uppercase; }
.updated-text { color: var(--muted); font-size: 13px; }
/* empty-state and filters styles removed — using shared components */
/* pill styles removed — using cc-pill-filter */
</style>
<script src="https://shared.adam-harris.alphaclaw.app/sql-sync.js"></script>
<script src="db.js"></script>
</head>
<body>
<cc-app-nav app="client-scorecard" title="Client Scorecard" active="index"></cc-app-nav>
<cc-user-auth mode="gate" allow-signup="false"></cc-user-auth>
<cc-toast></cc-toast>

<cc-page-header icon="🏥" title="Client Health Scorecard" description="Health scores based on GitHub activity">
  <div class="updated-text">Last refreshed: <span id="updated">—</span></div>
</cc-page-header>

<div class="summary-row" id="summary"></div>
<div style="padding:0 20px;margin-bottom:4px;">
  <cc-pill-dropdown id="filters" label="Health" items='[{"value":"All","label":"All"},{"value":"Healthy","label":"Healthy"},{"value":"At Risk","label":"At Risk"},{"value":"Critical","label":"Critical"}]' value="All"></cc-pill-dropdown>
</div>
<div class="scorecard-grid" id="grid"></div>
<cc-empty-state id="empty" style="display:none;" icon="📊" title="No client data yet" message="Run the refresh script to populate."></cc-empty-state>

<script>
const DATA_URL = 'data/clients.json';

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function healthColor(score) {
  if (score >= 70) return 'green';
  if (score >= 40) return 'yellow';
  return 'red';
}

function healthLabel(score) {
  if (score >= 70) return 'Healthy';
  if (score >= 40) return 'At Risk';
  return 'Critical';
}

function trendIcon(val) {
  if (val > 0) return `<span class="trend-up">↑ ${val}%</span>`;
  if (val < 0) return `<span class="trend-down">↓ ${Math.abs(val)}%</span>`;
  return `<span class="trend-flat">— flat</span>`;
}

function ringSVG(score) {
  const c = healthColor(score);
  const r = 26, circ = 2 * Math.PI * r;
  const offset = circ - (score / 100) * circ;
  const color = `var(--${c})`;
  return `
    <div class="score-ring">
      <svg width="64" height="64" viewBox="0 0 64 64">
        <circle class="bg" cx="32" cy="32" r="${r}"/>
        <circle class="fg" cx="32" cy="32" r="${r}"
          stroke="${color}" stroke-dasharray="${circ}" stroke-dashoffset="${offset}"/>
      </svg>
      <div class="score-value" style="color:${color}">${score}</div>
    </div>`;
}

function renderCard(client) {
  const c = healthColor(client.score);
  const m = client.metrics || {};
  return `
    <div class="client-card">
      <div class="client-header">
        <div class="client-name">${esc(client.name)}</div>
        <div class="health-badge health-${c}">● ${healthLabel(client.score)}</div>
      </div>
      ${ringSVG(client.score)}
      <div class="metrics-grid">
        <div class="metric">
          <div class="metric-label">Commits (7d)</div>
          <div class="metric-value">${m.commits ?? '—'}</div>
          <div class="metric-trend">${m.commitsTrend != null ? trendIcon(m.commitsTrend) : ''}</div>
        </div>
        <div class="metric">
          <div class="metric-label">Open PRs</div>
          <div class="metric-value">${m.openPRs ?? '—'}</div>
          <div class="metric-detail">${m.stalePRs ? `${m.stalePRs} stale` : ''}</div>
        </div>
        <div class="metric">
          <div class="metric-label">Slack Volume (7d)</div>
          <div class="metric-value">${m.slackMessages ?? '—'}</div>
          <div class="metric-trend">${m.slackTrend != null ? trendIcon(m.slackTrend) : ''}</div>
        </div>
        <div class="metric">
          <div class="metric-label">Deploys (7d)</div>
          <div class="metric-value">${m.deploys ?? '—'}</div>
          <div class="metric-trend">${m.deploysTrend != null ? trendIcon(m.deploysTrend) : ''}</div>
        </div>
        <div class="metric">
          <div class="metric-label">Open Issues</div>
          <div class="metric-value">${m.openIssues ?? '—'}</div>
          <div class="metric-detail">${m.criticalIssues ? `<span style="color:var(--red)">${m.criticalIssues} critical</span>` : ''}</div>
        </div>
        <div class="metric">
          <div class="metric-label">Last Deploy</div>
          <div class="metric-value" style="font-size:14px">${esc(m.lastDeploy ?? '—')}</div>
        </div>
      </div>
    </div>`;
}

function renderSummary(clients) {
  const total = clients.length;
  const healthy = clients.filter(c => c.score >= 70).length;
  const atRisk = clients.filter(c => c.score >= 40 && c.score < 70).length;
  const critical = clients.filter(c => c.score < 40).length;
  const avg = total ? Math.round(clients.reduce((s, c) => s + c.score, 0) / total) : 0;
  document.getElementById('summary').innerHTML = `
    <div class="summary-stat"><div class="num">${total}</div><div class="lbl">Clients</div></div>
    <div class="summary-stat"><div class="num" style="color:var(--green)">${healthy}</div><div class="lbl">Healthy</div></div>
    <div class="summary-stat"><div class="num" style="color:var(--yellow)">${atRisk}</div><div class="lbl">At Risk</div></div>
    <div class="summary-stat"><div class="num" style="color:var(--red)">${critical}</div><div class="lbl">Critical</div></div>
    <div class="summary-stat"><div class="num">${avg}</div><div class="lbl">Avg Score</div></div>`;
}

function renderFilters(clients) {
  document.getElementById('filters').addEventListener('dropdown-change', (e) => {
    const f = e.detail.value;
    renderGrid(f === 'All' ? clients : clients.filter(c => healthLabel(c.score) === f));
  });
}

function renderGrid(clients) {
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  if (!clients.length) { grid.innerHTML = ''; empty.style.display = ''; return; }
  empty.style.display = 'none';
  grid.innerHTML = clients.sort((a, b) => a.score - b.score).map(renderCard).join('');
}

async function init() {
  try {
    const db = await getDb();
    const raw = db.all('clientHealth');
    const clients = raw.length ? raw : [];
    const data = { updatedAt: clients[0]?.updatedAt };
    document.getElementById('updated').textContent = data.updatedAt
      ? new Date(data.updatedAt).toLocaleString('en-US', { timeZone: 'America/Los_Angeles', dateStyle: 'medium', timeStyle: 'short' })
      : 'Unknown';
    renderSummary(clients);
    renderFilters(clients);
    renderGrid(clients);
  } catch (e) {
    document.getElementById('empty').style.display = '';
    console.error('Failed to load client data', e);
    window.showToast?.('Failed to load client data. Please refresh.', 5000);
  }
}
init();
</script>
</body>
</html>
