<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7"></script>
<script src="modules/hspt-practice.js"></script>
<style>
.hspt-timer{font-family:var(--mono);font-size:1.5rem;color:var(--accent)}
.hspt-timer.warning{color:var(--danger)}
.hspt-progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin:8px 0}
.hspt-progress-fill{height:100%;background:var(--accent);transition:width .3s}
.hspt-option{cursor:pointer;padding:12px 16px;border:1px solid var(--border);border-radius:8px;margin:6px 0;transition:all .2s}
.hspt-option:hover{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 8%,transparent)}
.hspt-option.selected{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 15%,transparent)}
.hspt-option.correct{border-color:var(--success);background:color-mix(in srgb,var(--success) 15%,transparent)}
.hspt-option.incorrect{border-color:var(--danger);background:color-mix(in srgb,var(--danger) 15%,transparent)}
.hspt-nav-dots{display:flex;flex-wrap:wrap;gap:4px}
.hspt-nav-dot{width:44px;height:44px;border-radius:4px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;transition:all .2s}
.hspt-option:focus-visible,.hspt-nav-dot:focus-visible,[data-section]:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.hspt-nav-dot.answered{background:var(--accent);color:#000;border-color:var(--accent)}
.hspt-nav-dot.current{outline:2px solid var(--accent);outline-offset:1px}
.passage-text{max-height:300px;overflow-y:auto;padding:16px;background:var(--surface);border-radius:8px;margin-bottom:16px;line-height:1.7;font-size:.95rem;border:1px solid var(--border)}
.score-circle{width:120px;height:120px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;border:4px solid var(--accent);margin:0 auto 16px}
.score-circle .pct{font-size:2rem;font-weight:700;color:var(--accent)}
.section-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
</style>
</head>
<body>
<cc-app-nav app="hspt-practice" title="📝 HSPT Practice" active="home"></cc-app-nav>
<cc-user-auth mode="gate" allow-signup="false"></cc-user-auth>
<cc-toast></cc-toast>
<cc-hspt-practice></cc-hspt-practice>
</body>
</html>
