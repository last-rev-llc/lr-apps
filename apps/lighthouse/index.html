<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#06b6d4">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.svg">
<title>🔦 Lighthouse Audits</title>
<meta name="supabase-url" content="https://lregiwsovpmljxjvrrsc.supabase.co">
<meta name="supabase-key" content="sb_publishable_HPinRWPrX97uxshGM0u1rw_UAsQsyFq">
<link rel="stylesheet" href="https://shared.adam-harris.alphaclaw.app/theme.css">
<script src="https://shared.adam-harris.alphaclaw.app/components/index.js"></script>
    <script src="https://shared.adam-harris.alphaclaw.app/supabase-auth.js"></script>
<script src="https://shared.adam-harris.alphaclaw.app/supabase-client.js"></script>
<script src="https://shared.adam-harris.alphaclaw.app/modules/sql-sync.js"></script>
<script src="db.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7"></script>
<style>
  .alerts-banner { background: var(--danger-bg, rgba(239,68,68,0.12)); border: 1px solid var(--danger, #ef4444); border-radius: 12px; padding: 16px; margin-bottom: 20px; }
  .alerts-banner h3 { color: var(--danger, #ef4444); margin: 0 0 8px; font-size: 14px; }
  .alert-item { font-size: 13px; color: var(--text); padding: 4px 0; display: flex; align-items: center; gap: 8px; }
  .alert-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--danger, #ef4444); flex-shrink: 0; }

  .sites-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
  @media (max-width: 600px) { .sites-grid { grid-template-columns: 1fr; } }

  .site-card { cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; }
  .site-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
  .site-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .site-name { font-size: 16px; font-weight: 600; color: var(--text); }
  .site-url { font-size: 12px; color: var(--muted); word-break: break-all; }
  .site-date { font-size: 11px; color: var(--muted); }
  .trend-arrow { font-size: 16px; }
  .trend-up { color: #0cce6b; }
  .trend-down { color: #ef4444; }
  .trend-flat { color: var(--muted); }

  .scores-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .score-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .score-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .score-circle { position: relative; width: 56px; height: 56px; }
  .score-circle svg { transform: rotate(-90deg); }
  .score-circle .bg { fill: none; stroke: var(--glass); stroke-width: 4; }
  .score-circle .fg { fill: none; stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 0.6s ease; }
  .score-value { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; }

  .expanded-section { margin-top: 16px; border-top: 1px solid var(--glass); padding-top: 16px; }
  .chart-container { height: 220px; margin-bottom: 16px; }
  .details-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 16px; }
  @media (max-width: 600px) { .details-grid { grid-template-columns: repeat(3, 1fr); } }
  .detail-item { text-align: center; padding: 8px; background: var(--glass); border-radius: 8px; }
  .detail-value { font-size: 16px; font-weight: 600; color: var(--text); }
  .detail-label { font-size: 10px; color: var(--muted); margin-top: 2px; }

  .compare-section { margin-top: 16px; }
  .compare-header { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  .compare-header select { background: var(--glass); color: var(--text); border: 1px solid var(--border, rgba(255,255,255,0.1)); border-radius: 8px; padding: 6px 10px; font-size: 13px; }
  .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .compare-col { padding: 12px; background: var(--glass); border-radius: 10px; }
  .compare-col h4 { font-size: 13px; color: var(--muted); margin: 0 0 8px; }
  .compare-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; }
  .compare-diff { font-size: 11px; font-weight: 600; }
  .diff-pos { color: #0cce6b; }
  .diff-neg { color: #ef4444; }

  .filter-bar { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .btn-icon-danger { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; padding: 4px 6px; border-radius: 6px; line-height: 1; transition: all 0.15s; }
  .btn-icon-danger:hover { color: var(--danger, #ef4444); background: var(--danger-bg, rgba(239,68,68,0.12)); }
</style>
</head>
<body>
<cc-app-nav app="lighthouse" title="🔦 Lighthouse Audits" active="index"></cc-app-nav>
<cc-user-auth mode="gate" allow-signup="false"></cc-user-auth>
<cc-toast></cc-toast>

<cc-page-header icon="🔦" title="Lighthouse Audits" description="Performance & SEO audit reports">
  <div class="site-date">Auto-audited weekly</div>
  <button class="btn btn-primary" onclick="openAddModal()">+ Add Site</button>
</cc-page-header>

<cc-modal id="add-site-modal" title="Add Tracked Site">
  <cc-field id="field-site-name" label="Site Name" placeholder="My Website"></cc-field>
  <cc-field id="field-site-url" label="URL" placeholder="https://example.com"></cc-field>
  <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;">
    <button class="btn btn-secondary" onclick="closeAddModal()">Cancel</button>
    <button class="btn btn-primary" onclick="addSite()">Add Site</button>
  </div>
</cc-modal>

<div id="alerts"></div>

<div class="filter-bar">
  <cc-search id="search" placeholder="Search sites..."></cc-search>
  <cc-pill-dropdown id="sortBy" label="Sort" items='[{"value":"name","label":"Name"},{"value":"perf","label":"Performance"},{"value":"a11y","label":"Accessibility"},{"value":"seo","label":"SEO"},{"value":"bp","label":"Best Practices"}]' value="name"></cc-pill-dropdown>
</div>

<div id="sites" class="sites-grid"></div>

<script>
let sites = [];
let expandedId = null;
let charts = {};
let syncDB = null;

function esc(s) { const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; }
function escAttr(s) { return (s ?? '').toString().replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function openAddModal() { document.getElementById('add-site-modal').open(); }
function closeAddModal() { document.getElementById('add-site-modal').close(); }

async function addSite() {
  const nameEl = document.getElementById('field-site-name');
  const urlEl = document.getElementById('field-site-url');
  const name = nameEl.value?.trim() || nameEl.querySelector('input')?.value?.trim();
  const url = urlEl.value?.trim() || urlEl.querySelector('input')?.value?.trim();
  if (!name || !url) { window.showToast?.('Please fill in both fields', 'error'); return; }
  const id = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  if (sites.find(s => s.id === id)) { window.showToast?.('Site already exists', 'error'); return; }
  const now = new Date().toISOString().slice(0, 10);
  const newSite = { id, site: name, url, audits: [{ date: now, performance: 0, accessibility: 0, seo: 0, bestPractices: 0, details: { fcp: 0, lcp: 0, tbt: 0, cls: 0, si: 0 } }] };
  sites.push(newSite);
  if (syncDB) {
    await syncDB.upsert('audits', { id, site: name, url, audits: newSite.audits, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() });
  }
  closeAddModal();
  if (nameEl.querySelector) { const i = nameEl.querySelector('input'); if (i) i.value = ''; }
  if (urlEl.querySelector) { const i = urlEl.querySelector('input'); if (i) i.value = ''; }
  renderAlerts(); renderAll();
  window.showToast?.('Site added!', 'success');
}

async function removeSite(id, e) {
  e.stopPropagation();
  const site = sites.find(s => s.id === id);
  if (!site) return;
  if (!confirm(`Remove "${site.site}"? This cannot be undone.`)) return;
  sites = sites.filter(s => s.id !== id);
  if (syncDB) { await syncDB.delete('audits', id); }
  renderAlerts(); renderAll();
  window.showToast?.('Site removed', 'success');
}

const THRESHOLDS = { performance: 80, accessibility: 90, seo: 85, bestPractices: 85 };
const LABELS = { performance: 'Perf', accessibility: 'A11y', seo: 'SEO', bestPractices: 'BP' };
const COLORS = { performance: '#6366f1', accessibility: '#8b5cf6', seo: '#06b6d4', bestPractices: 'var(--accent)' };

function scoreColor(s) { return s >= 90 ? '#0cce6b' : s >= 50 ? '#ffa400' : '#ff4e42'; }

function svgCircle(score, size = 56) {
  const r = (size - 8) / 2;
  const c = 2 * Math.PI * r;
  const offset = c - (score / 100) * c;
  const color = scoreColor(score);
  return `<div class="score-circle" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle class="bg" cx="${size/2}" cy="${size/2}" r="${r}"/>
      <circle class="fg" cx="${size/2}" cy="${size/2}" r="${r}" stroke="${color}"
        stroke-dasharray="${c}" stroke-dashoffset="${offset}"/>
    </svg>
    <div class="score-value" style="color:${color}">${score}</div>
  </div>`;
}

function trend(audits) {
  if (audits.length < 2) return '<span class="trend-arrow trend-flat">→</span>';
  const last = audits[audits.length - 1];
  const prev = audits[audits.length - 2];
  const avg = (a) => (a.performance + a.accessibility + a.seo + a.bestPractices) / 4;
  const diff = avg(last) - avg(prev);
  if (diff > 1) return '<span class="trend-arrow trend-up">↑</span>';
  if (diff < -1) return '<span class="trend-arrow trend-down">↓</span>';
  return '<span class="trend-arrow trend-flat">→</span>';
}

function renderAlerts() {
  const items = [];
  sites.forEach(s => {
    const last = s.audits[s.audits.length - 1];
    if (!last) return;
    Object.entries(THRESHOLDS).forEach(([k, t]) => {
      if (last[k] < t) items.push(`<div class="alert-item"><span class="alert-dot"></span><strong>${esc(s.site)}</strong> — ${LABELS[k]}: ${last[k]} (threshold: ${t})</div>`);
    });
  });
  document.getElementById('alerts').innerHTML = items.length ? `<div class="alerts-banner"><h3>⚠️ ${items.length} Alert${items.length>1?'s':''}</h3>${items.join('')}</div>` : '';
}

function renderAll() {
  const searchEl = document.getElementById('search');
  const q = (searchEl.value || searchEl.querySelector?.('input')?.value || '').toLowerCase();
  const sortEl = document.getElementById('sortBy');
  const sort = sortEl.value || sortEl.getAttribute('value') || 'name';
  let filtered = sites.filter(s => s.site.toLowerCase().includes(q) || s.url.toLowerCase().includes(q));
  filtered.sort((a, b) => {
    const la = a.audits[a.audits.length - 1] || {};
    const lb = b.audits[b.audits.length - 1] || {};
    if (sort === 'name') return a.site.localeCompare(b.site);
    const map = { perf: 'performance', a11y: 'accessibility', seo: 'seo', bp: 'bestPractices' };
    return (lb[map[sort]] || 0) - (la[map[sort]] || 0);
  });
  const container = document.getElementById('sites');
  if (!filtered.length) {
    container.innerHTML = '<cc-empty-state icon="🔍" message="No sites match your search."></cc-empty-state>';
    return;
  }
  container.innerHTML = filtered.map(s => {
    const last = s.audits[s.audits.length - 1] || {};
    const isExpanded = expandedId === s.id;
    return `<div class="card site-card" data-id="${escAttr(s.id)}" onclick="toggle(this.dataset.id)">
      <div class="site-card-header">
        <div>
          <div class="site-name">${esc(s.site)} ${trend(s.audits)}</div>
          <div class="site-url">${esc(s.url)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="site-date">${esc(last.date || '')}</div>
          <button class="btn-icon-danger" data-id="${escAttr(s.id)}" onclick="removeSite(this.dataset.id, event)" title="Remove site">✕</button>
        </div>
      </div>
      <div class="scores-row">
        ${['performance','accessibility','seo','bestPractices'].map(k =>
          `<div class="score-item">${svgCircle(last[k] || 0)}<div class="score-label">${LABELS[k]}</div></div>`
        ).join('')}
      </div>
      ${isExpanded ? expandedHTML(s) : ''}
    </div>`;
  }).join('');
  // Wire up compare select change listeners
  document.querySelectorAll('.cmp-select').forEach(sel => {
    sel.addEventListener('change', () => renderCompare(sel.dataset.sid));
  });
  if (expandedId) setTimeout(() => initChart(expandedId), 50);
}

function expandedHTML(s) {
  const last = s.audits[s.audits.length - 1] || {};
  const d = last.details || {};
  const audits = s.audits;
  const opts = audits.map((a, i) => `<option value="${i}">${esc(a.date)}</option>`).reverse();
  return `<div class="expanded-section" onclick="event.stopPropagation()">
    <div class="chart-container"><canvas id="chart-${escAttr(s.id)}"></canvas></div>
    <h4 style="font-size:13px;color:var(--muted);margin:0 0 8px;">Core Web Vitals (Latest)</h4>
    <div class="details-grid">
      <div class="detail-item"><div class="detail-value">${esc(d.fcp)}s</div><div class="detail-label">FCP</div></div>
      <div class="detail-item"><div class="detail-value">${esc(d.lcp)}s</div><div class="detail-label">LCP</div></div>
      <div class="detail-item"><div class="detail-value">${esc(d.tbt)}ms</div><div class="detail-label">TBT</div></div>
      <div class="detail-item"><div class="detail-value">${esc(d.cls)}</div><div class="detail-label">CLS</div></div>
      <div class="detail-item"><div class="detail-value">${esc(d.si)}s</div><div class="detail-label">SI</div></div>
    </div>
    <div class="compare-section">
      <div class="compare-header">
        <span style="font-size:13px;color:var(--muted);font-weight:600;">Compare:</span>
        <select class="cmp-select" data-sid="${escAttr(s.id)}" data-cmp="A">${opts.join('')}</select>
        <span style="color:var(--muted)">vs</span>
        <select class="cmp-select" data-sid="${escAttr(s.id)}" data-cmp="B">${opts.map((o,i) => i===1 ? o.replace('<option','<option selected') : o).join('')}</select>
      </div>
      <div id="compare-${escAttr(s.id)}"></div>
    </div>
  </div>`;
}

function renderCompare(id) {
  const s = sites.find(x => x.id === id);
  if (!s) return;
  const selects = document.querySelectorAll(`.cmp-select[data-sid="${CSS.escape(id)}"]`);
  const selA = [...selects].find(el => el.dataset.cmp === 'A');
  const selB = [...selects].find(el => el.dataset.cmp === 'B');
  if (!selA || !selB) return;
  const a = s.audits[selA.value];
  const b = s.audits[selB.value];
  if (!a || !b) return;
  const keys = ['performance','accessibility','seo','bestPractices'];
  const diffHTML = (v) => { const cls = v > 0 ? 'diff-pos' : v < 0 ? 'diff-neg' : ''; return `<span class="compare-diff ${cls}">${v > 0 ? '+' : ''}${v}</span>`; };
  document.getElementById(`compare-${id}`).innerHTML = `<div class="compare-grid">
    <div class="compare-col"><h4>${a.date}</h4>${keys.map(k => `<div class="compare-row"><span>${LABELS[k]}</span><span style="color:${scoreColor(a[k])}">${a[k]}</span></div>`).join('')}</div>
    <div class="compare-col"><h4>${b.date} ${keys.map(k => diffHTML(a[k]-b[k])).join(' ')}</h4>${keys.map(k => `<div class="compare-row"><span>${LABELS[k]}</span><span style="color:${scoreColor(b[k])}">${b[k]}</span></div>`).join('')}</div>
  </div>`;
}

function toggle(id) {
  expandedId = expandedId === id ? null : id;
  renderAll();
  if (expandedId) setTimeout(() => renderCompare(id), 60);
}

function initChart(id) {
  const s = sites.find(x => x.id === id);
  if (!s) return;
  const el = document.getElementById(`chart-${id}`);
  if (!el) return;
  if (charts[id]) charts[id].destroy();
  const labels = s.audits.map(a => a.date);
  charts[id] = new Chart(el, {
    type: 'line',
    data: {
      labels,
      datasets: Object.entries(COLORS).map(([k, c]) => ({
        label: LABELS[k], data: s.audits.map(a => a[k]),
        borderColor: c, backgroundColor: c + '22', tension: 0.3, pointRadius: 3, borderWidth: 2
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        y: { min: 0, max: 100, grid: { color: 'rgba(255,255,255,0.06)' }, ticks: { color: 'rgba(255,255,255,0.5)' } },
        x: { grid: { color: 'rgba(255,255,255,0.06)' }, ticks: { color: 'rgba(255,255,255,0.5)', maxRotation: 45 } }
      },
      plugins: { legend: { labels: { color: 'rgba(255,255,255,0.7)', boxWidth: 12 } } }
    }
  });
}

async function init() {
  try {
    syncDB = await createSyncDB(LIGHTHOUSE_DB_CONFIG);
    const rows = await syncDB.getAll('audits');
    sites = rows.map(r => ({ id: r.id, site: r.site, url: r.url, audits: typeof r.audits === 'string' ? JSON.parse(r.audits) : r.audits }));
  } catch (e) {
    console.warn('SyncDB failed, loading JSON directly', e);
    const res = await fetch('data/audits.json');
    sites = await res.json();
  }
  renderAlerts();
  renderAll();

  document.getElementById('search').addEventListener('cc-search', (e) => { renderAll(); });
  document.getElementById('sortBy').addEventListener('dropdown-change', (e) => {
    document.getElementById('sortBy').setAttribute('value', e.detail.value);
    renderAll();
  });
}

init();
</script>
</body>
</html>
