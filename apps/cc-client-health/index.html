<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#22c55e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.svg">
<title>💚 Client Health</title>

<meta name="supabase-url" content="https://lregiwsovpmljxjvrrsc.supabase.co">
<meta name="supabase-key" content="sb_publishable_HPinRWPrX97uxshGM0u1rw_UAsQsyFq">
<link rel="stylesheet" href="https://shared.adam-harris.alphaclaw.app/theme.css">
<script src="https://shared.adam-harris.alphaclaw.app/components/index.js"></script>
<script src="https://shared.adam-harris.alphaclaw.app/supabase-client.js"></script>
<script src="modules/cc-client-health.js"></script>
<style>
  /* Backlog Meeting styles */
  .bm-client { margin-bottom: 28px; }
  .bm-client-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: var(--surface); border-radius: 8px 8px 0 0; border-bottom: 2px solid var(--accent); }
  .bm-client-name { font-weight: 700; font-size: 16px; color: var(--text); }
  .bm-client-count { font-size: 12px; color: var(--muted); }
  .bm-client-stats { display: flex; gap: 12px; margin-left: auto; font-size: 11px; color: var(--muted); }
  .bm-client-stat { display: flex; align-items: center; gap: 4px; }
  .bm-section-label { padding: 10px 16px 6px; font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; background: rgba(245,158,11,.04); border-bottom: 1px solid var(--border); }
  .bm-section-label.highlights { color: var(--muted); background: transparent; }
  .bm-status-group { margin: 0; }
  .bm-status-header { display: flex; align-items: center; gap: 6px; padding: 8px 16px; background: rgba(255,255,255,.03); border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .bm-status-dot { width: 8px; height: 8px; border-radius: 50%; }
  .bm-status-dot.in-progress { background: var(--accent); }
  .bm-status-dot.blocked { background: var(--red, #ef4444); }
  .bm-status-dot.not-started { background: var(--muted); }
  .bm-status-dot.in-review { background: var(--purple, #8b5cf6); }
  .bm-status-dot.done { background: var(--green, var(--green)); }
  .bm-status-dot.discussion { background: var(--blue, #3b82f6); }
  .bm-item { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 4px; }
  .bm-item:last-child { border-bottom: none; }
  .bm-item-title { font-weight: 600; font-size: 14px; color: var(--text); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .bm-item-title a { color: var(--accent); text-decoration: none; }
  .bm-item-title a:hover { text-decoration: underline; }
  .bm-item-meta { display: flex; gap: 8px; align-items: center; font-size: 12px; color: var(--muted); flex-wrap: wrap; }
  .bm-item-summary { font-size: 13px; color: var(--muted); line-height: 1.5; }
  .bm-item-due { font-size: 11px; font-weight: 600; padding: 1px 8px; border-radius: 4px; background: rgba(239,68,68,.12); color: var(--red, #ef4444); }
  .bm-item-due.upcoming { background: rgba(245,158,11,.12); color: var(--accent); }
  .bm-priority { font-size: 11px; font-weight: 600; padding: 1px 6px; border-radius: 4px; }
  .bm-priority.high { background: rgba(239,68,68,.15); color: var(--red, #ef4444); }
  .bm-priority.medium { background: rgba(245,158,11,.15); color: var(--accent); }
  .bm-priority.low { background: rgba(34,197,94,.15); color: var(--green); }
  .bm-sources { display: flex; gap: 4px; align-items: center; }
  .bm-source-link { font-size: 11px; color: var(--accent); text-decoration: none; padding: 1px 6px; border-radius: 4px; background: rgba(245,158,11,.08); }
  .bm-source-link:hover { background: rgba(245,158,11,.18); }
  .bm-assignees { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
  .bm-done-toggle { display: flex; align-items: center; gap: 6px; padding: 8px 16px; background: transparent; border: none; border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 600; color: var(--muted); cursor: pointer; width: 100%; text-align: left; text-transform: uppercase; letter-spacing: .5px; }
  .bm-done-toggle:hover { background: rgba(255,255,255,.03); }
  .bm-done-toggle .chevron { transition: transform .2s; display: inline-block; }
  .bm-done-toggle.open .chevron { transform: rotate(90deg); }
  .bm-done-items { display: none; }
  .bm-done-items.open { display: block; }
  .bm-done-items .bm-item { opacity: .6; }
  .bm-done-items .bm-item-title { font-weight: 500; }

  /* Archives tab */
  .arch-filters { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; align-items: center; }
  .arch-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; cursor: pointer; transition: border-color .2s; }
  .arch-card:hover { border-color: var(--accent); }
  .arch-card-head { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .arch-card-date { font-weight: 600; font-size: 14px; color: var(--text); }
  .arch-badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px; }
  .arch-badge.digest { background: rgba(245,158,11,.15); color: var(--accent); }
  .arch-badge.overview { background: rgba(59,130,246,.15); color: var(--blue, #3b82f6); }
  .arch-badge.weekly { background: rgba(139,92,246,.15); color: var(--purple, #8b5cf6); }
  .arch-svc { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px; color: #fff; }
  .arch-svc.slack { background: #4A154B; }
  .arch-svc.jira { background: #0052CC; }
  .arch-svc.zoom { background: #2D8CFF; }
  .arch-svc.github { background: #333; }
  .arch-svc.calendar { background: #4285F4; }
  .arch-count { font-size: 11px; color: var(--muted); margin-left: auto; }
  .arch-summary { font-size: 13px; color: var(--muted); margin-top: 8px; line-height: 1.5; }
  .arch-details { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); display: none; }
  .arch-card.open .arch-details { display: block; }
  .arch-detail-item { font-size: 13px; color: var(--text); padding: 4px 0; border-bottom: 1px solid var(--border); }
  .arch-detail-item:last-child { border-bottom: none; }
  .arch-detail-label { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; margin: 8px 0 4px; }
</style>
</head>
<body>
<cc-app-nav app="cc-client-health" title="💚 Client Health" active="home"></cc-app-nav>
<cc-auth></cc-auth>
<cc-toast></cc-toast>

<div style="max-width:960px;margin:0 auto;padding:0 20px 40px;">
<cc-tabs active="clients">
  <cc-tab name="clients" label="💚 Clients">
    <cc-client-health src="data/client-health.json"></cc-client-health>
  </cc-tab>
  <cc-tab name="backlog" label="📋 Backlog Meeting">
    <cc-fade-in>
    <div style="margin-bottom:20px;">
      <h2 style="margin:0 0 4px;">📋 <span>Sprint Planning</span></h2>
      <div style="color:var(--muted);font-size:13px;">Friday meeting with Krista — what's outstanding &amp; next week's priorities</div>
      <div style="color:var(--muted);font-size:12px;margin-top:4px;">Last updated: <span id="bm-updated">—</span></div>
    </div>
    </cc-fade-in>
    <cc-tabs active="agenda">
      <cc-tab name="agenda" label="📋 Agenda">
        <div id="bm-content"></div>
      </cc-tab>
      <cc-tab name="archives" label="📁 Archives">
        <div id="archives">
          <div class="arch-filters">
            <cc-pill-dropdown id="arch-type" label="Type" items='[{"value":"all","label":"All"},{"value":"digest","label":"Daily Digests"},{"value":"overview","label":"Daily Overviews"},{"value":"weekly","label":"Weekly Summaries"}]' value="all"></cc-pill-dropdown>
            <cc-pill-dropdown id="arch-service" label="Service" items='[{"value":"all","label":"All"},{"value":"slack","label":"Slack"},{"value":"jira","label":"JIRA"},{"value":"zoom","label":"Zoom"},{"value":"github","label":"GitHub"},{"value":"calendar","label":"Calendar"}]' value="all" style="display:none"></cc-pill-dropdown>
            <cc-pill-filter id="arch-range" items='[{"value":"7","label":"Last 7 days"},{"value":"30","label":"Last 30 days"},{"value":"all","label":"All time"}]' value="30"></cc-pill-filter>
          </div>
          <div id="arch-results"></div>
        </div>
      </cc-tab>
    </cc-tabs>
  </cc-tab>
</cc-tabs>
</div>

<script>
// Backlog Meeting - Agenda tab
(async () => {
  if (window.CCUserPill) await CCUserPill.ensureUsers();

  try {
    const res = await fetch('data/backlog-meeting.json');
    if (!res.ok) { document.getElementById('bm-content').innerHTML = '<cc-empty-state message="No backlog data yet" icon="📋"></cc-empty-state>'; return; }
    const data = await res.json();

    if (data.lastUpdated) {
      document.getElementById('bm-updated').textContent =
        new Date(data.lastUpdated).toLocaleString('en-US', { timeZone: 'America/Los_Angeles', dateStyle: 'medium', timeStyle: 'short' });
    }

    const container = document.getElementById('bm-content');
    const clients = data.clients || [];

    if (!clients.length) {
      container.innerHTML = '<cc-empty-state message="No backlog data yet — will populate on next update" icon="📋"></cc-empty-state>';
      return;
    }

    const outstandingOrder = ['blocked', 'in-progress', 'in-review', 'not-started', 'discussion'];
    const statusLabels = {
      'blocked': '🛑 Blocked', 'in-progress': '🔄 In Progress', 'in-review': '👀 In Review / UAT',
      'not-started': '📋 Not Started / Next Up', 'discussion': '💬 Needs Discussion', 'done': '✅ Completed This Week'
    };

    function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
    function escAttr(s) { return String(s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function renderAssignees(assignees) {
      if (!assignees || !assignees.length) return '';
      return '<span class="bm-assignees">' + assignees.map(a => {
        if (window.CCUserPill) return CCUserPill.html({ name: a, size: 'sm' });
        return '<span class="badge">' + esc(a) + '</span>';
      }).join('') + '</span>';
    }

    function renderSources(sources) {
      if (!sources || !sources.length) return '';
      return '<span class="bm-sources">' + sources.map(s => {
        const icon = s.type === 'jira' ? '🎫' : s.type === 'slack' ? '💬' : s.type === 'zoom' ? '📹' : '🔗';
        const label = s.label || s.type;
        if (s.url) return `<a href="${escAttr(s.url)}" target="_blank" rel="noopener" class="bm-source-link">${icon} ${esc(label)}</a>`;
        return `<span class="bm-source-link">${icon} ${esc(label)}</span>`;
      }).join('') + '</span>';
    }

    function renderDueDate(due) {
      if (!due) return '';
      const d = new Date(due);
      const now = new Date();
      const diffDays = Math.ceil((d - now) / 86400000);
      const cls = diffDays <= 0 ? 'bm-item-due' : 'bm-item-due upcoming';
      const label = diffDays <= 0 ? 'Overdue' : diffDays === 1 ? 'Due tomorrow' : `Due ${d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}`;
      return `<span class="${cls}">📅 ${label}</span>`;
    }

    function renderItem(item) {
      const titleLink = item.sources?.find(s => s.type === 'jira');
      const titleHtml = titleLink ? `<a href="${escAttr(titleLink.url)}" target="_blank" rel="noopener">${esc(item.title)}</a>` : esc(item.title);
      return `<div class="bm-item">
        <div class="bm-item-title">${titleHtml} ${item.priority ? `<span class="bm-priority ${item.priority}">${item.priority}</span>` : ''} ${renderDueDate(item.dueDate)}</div>
        <div class="bm-item-meta">${renderAssignees(item.assignees)} ${renderSources(item.sources)}</div>
        ${item.summary ? `<div class="bm-item-summary">${esc(item.summary)}</div>` : ''}
      </div>`;
    }

    clients.forEach((client, ci) => {
      const div = document.createElement('div');
      div.className = 'bm-client';

      const byStatus = {};
      (client.items || []).forEach(item => { const s = item.status || 'discussion'; if (!byStatus[s]) byStatus[s] = []; byStatus[s].push(item); });

      const totalItems = (client.items || []).length;
      const doneItems = byStatus['done'] || [];
      const outstandingCount = totalItems - doneItems.length;

      let outstandingHtml = '';
      outstandingOrder.forEach(status => {
        const items = byStatus[status];
        if (!items || !items.length) return;
        outstandingHtml += `<div class="bm-status-group"><div class="bm-status-header"><span class="bm-status-dot ${status}"></span>${statusLabels[status] || status} <span style="opacity:.5">(${items.length})</span></div>${items.map(renderItem).join('')}</div>`;
      });

      let doneHtml = '';
      if (doneItems.length) {
        const doneId = 'done-' + ci;
        doneHtml = `<button class="bm-done-toggle" onclick="const el=document.getElementById('${doneId}');el.classList.toggle('open');this.classList.toggle('open')"><span class="chevron">▶</span><span class="bm-status-dot done"></span>${statusLabels['done']} <span style="opacity:.5">(${doneItems.length})</span></button><div class="bm-done-items" id="${doneId}">${doneItems.map(renderItem).join('')}</div>`;
      }

      const blockedCount = (byStatus['blocked'] || []).length;
      const statsHtml = `<div class="bm-client-stats"><span class="bm-client-stat">${outstandingCount} outstanding</span>${blockedCount ? `<span class="bm-client-stat" style="color:var(--red, #ef4444)">${blockedCount} blocked</span>` : ''}${doneItems.length ? `<span class="bm-client-stat" style="color:var(--green)">${doneItems.length} done</span>` : ''}</div>`;

      div.innerHTML = `<div class="bm-client-header"><span class="bm-client-name">${esc(client.name)}</span><span class="bm-client-count">${totalItems} item${totalItems !== 1 ? 's' : ''}</span>${statsHtml}</div><div class="panel" style="border-radius:0 0 8px 8px;overflow:hidden">${outstandingHtml ? '<div class="bm-section-label">📌 Outstanding & Next Week</div>' : ''}${outstandingHtml}${doneHtml ? '<div class="bm-section-label highlights">Highlights — What Got Done</div>' : ''}${doneHtml}${!outstandingHtml && !doneHtml ? '<cc-empty-state message="No items" icon="✨"></cc-empty-state>' : ''}</div>`;

      container.appendChild(div);
    });

    setTimeout(() => window.refreshIcons && window.refreshIcons(), 0);
  } catch (e) {
    console.error('Backlog meeting load error:', e);
    document.getElementById('bm-content').innerHTML = '<cc-empty-state message="Failed to load meeting data"></cc-empty-state>';
  }
})();
</script>
<script>
// Archives tab logic
(() => {
  let cache = null;
  let loaded = false;

  function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
  function formatDate(d) { return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }

  function renderItems(arr, label) {
    if (!arr || !arr.length) return '';
    return `<div class="arch-detail-label">${esc(label)}</div>` + arr.map(i => `<div class="arch-detail-item">${esc(typeof i === 'string' ? i : (i.title || i.text || JSON.stringify(i)))}</div>`).join('');
  }

  function renderCard(rec) {
    const typeCls = rec._type === 'digest' ? 'digest' : rec._type === 'overview' ? 'overview' : 'weekly';
    const typeLabel = rec._type === 'digest' ? 'Digest' : rec._type === 'overview' ? 'Overview' : 'Weekly';
    const svcBadge = rec.service ? `<span class="arch-svc ${rec.service}">${rec.service}</span>` : '';
    const count = rec.item_count ? `<span class="arch-count">${rec.item_count} items</span>` : '';
    const summary = rec.summary ? rec.summary.slice(0, 200) + (rec.summary.length > 200 ? '…' : '') : '';
    const fullSummary = rec.summary || '';

    let details = '';
    if (fullSummary.length > 200) details += `<div class="arch-detail-label">Full Summary</div><div style="font-size:13px;color:var(--text);line-height:1.5">${esc(fullSummary)}</div>`;
    if (rec._type === 'digest') details += renderItems(rec.items, 'Items');
    if (rec._type === 'overview') { details += renderItems(rec.highlights, 'Highlights'); details += renderItems(rec.blockers, 'Blockers'); details += renderItems(rec.action_items, 'Action Items'); }
    if (rec._type === 'weekly') { details += renderItems(rec.themes, 'Themes'); details += renderItems(rec.highlights, 'Highlights'); details += renderItems(rec.blockers, 'Blockers'); details += renderItems(rec.action_items, 'Action Items'); }

    return `<div class="arch-card" onclick="this.classList.toggle('open')"><div class="arch-card-head"><span class="arch-card-date">${formatDate(rec.date)}</span><span class="arch-badge ${typeCls}">${typeLabel}</span>${svcBadge}${count}</div>${summary ? `<div class="arch-summary">${esc(summary)}</div>` : ''}${details ? `<div class="arch-details">${details}</div>` : ''}</div>`;
  }

  async function fetchAll() {
    if (cache) return cache;
    const sb = window.supabase;
    if (!sb) throw new Error('Supabase not connected');
    const [digests, overviews, weeklies] = await Promise.all([
      sb.select('daily_digests', { order: 'date.desc' }),
      sb.select('daily_overviews', { order: 'date.desc' }),
      sb.select('weekly_summaries', { order: 'start_date.desc' })
    ]);
    const all = [
      ...(digests || []).map(r => ({ ...r, _type: 'digest' })),
      ...(overviews || []).map(r => ({ ...r, _type: 'overview' })),
      ...(weeklies || []).map(r => ({ ...r, _type: 'weekly', date: r.start_date || r.created_at }))
    ];
    all.sort((a, b) => new Date(b.date) - new Date(a.date));
    cache = all;
    return all;
  }

  function applyFilters(records) {
    const type = document.getElementById('arch-type')?.value || 'all';
    const svc = document.getElementById('arch-service')?.value || 'all';
    const range = document.getElementById('arch-range')?.value || '30';
    let filtered = records;
    if (type !== 'all') filtered = filtered.filter(r => r._type === type);
    if (type === 'digest' && svc !== 'all') filtered = filtered.filter(r => r.service === svc);
    if (range !== 'all') { const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - parseInt(range)); filtered = filtered.filter(r => new Date(r.date) >= cutoff); }
    return filtered;
  }

  function render(records) {
    const el = document.getElementById('arch-results');
    const filtered = applyFilters(records);
    if (!filtered.length) { el.innerHTML = '<cc-empty-state message="No archive records found" icon="📁"></cc-empty-state>'; return; }
    el.innerHTML = filtered.map(renderCard).join('');
  }

  async function loadArchives() {
    const el = document.getElementById('arch-results');
    try {
      el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted)">Loading archives…</div>';
      const records = await fetchAll();
      render(records);
    } catch (e) {
      console.error('Archives load error:', e);
      el.innerHTML = '<cc-empty-state message="Failed to load archives" icon="⚠️"></cc-empty-state>';
    }
  }

  function updateServiceVisibility() {
    const type = document.getElementById('arch-type')?.value;
    const svcEl = document.getElementById('arch-service');
    if (svcEl) svcEl.style.display = type === 'digest' ? '' : 'none';
  }

  function onFilterChange() { updateServiceVisibility(); if (cache) render(cache); }
  document.addEventListener('pill-change', onFilterChange);
  document.addEventListener('dropdown-change', onFilterChange);
  document.addEventListener('tab-change', (e) => { if (e.detail?.tab === 'archives' && !loaded) { loaded = true; loadArchives(); } });

  function tryAutoLoad() {
    const params = new URLSearchParams(location.search);
    if (params.get('tab') === 'archives' && !loaded) {
      if (!window.supabase) { setTimeout(tryAutoLoad, 200); return; }
      loaded = true; loadArchives();
    }
  }
  setTimeout(tryAutoLoad, 300);
})();
</script>
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});</script>
</body>
</html>
