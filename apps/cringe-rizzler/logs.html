<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f59e0b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.svg">
<title>Cringe Rizzler — Logs</title>
<link rel="stylesheet" href="https://shared.adam-harris.alphaclaw.app/theme.css">
<script src="https://shared.adam-harris.alphaclaw.app/components/index.js"></script>
<meta name="supabase-url" content="https://lregiwsovpmljxjvrrsc.supabase.co">
<meta name="supabase-key" content="sb_publishable_HPinRWPrX97uxshGM0u1rw_UAsQsyFq">
<script src="https://shared.adam-harris.alphaclaw.app/supabase-client.js"></script>
<script src="db.js"></script>
</head>
<body>
<cc-app-nav app="cringe-rizzler" title="Cringe Rizzler" active="logs" position="bottom"></cc-app-nav>
<cc-auth></cc-auth>
<cc-toast></cc-toast>
<div style="max-width:960px;margin:40px auto;padding:0 20px;">
  <h1 style="font-family:var(--serif);margin-bottom:24px;">Change Log</h1>
  <div id="logs-container" style="color:var(--muted);font-size:14px;">Loading logs...</div>
</div>
<script>
(async () => {
  const c = document.getElementById('logs-container');
  try {
    // Show recent saved items as activity log
    if (!window.supabase) { c.textContent = 'Database not available.'; return; }
    const db = await CringeRizzlerDB.init();
    const rows = await db.getAll({ orderBy: 'created_at', desc: true });
    const esc = s => { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; };
    if (!rows.length) {
      c.innerHTML = '<cc-empty-state message="No activity yet. Generate and save some phrases or memes to see activity here." icon="📭"></cc-empty-state>';
      return;
    }
    c.innerHTML = rows.slice(0, 50).map(r => `
      <div style="padding:10px 0;border-bottom:1px solid var(--border);">
        <span style="color:var(--text);font-weight:600;">Saved ${esc(r.type)}</span>
        <span style="margin-left:8px;font-size:12px;color:var(--muted);">${esc(new Date(r.created_at).toLocaleString())}</span>
        <div style="font-size:12px;margin-top:4px;color:var(--muted);">${esc((r.content || '').substring(0, 100))}${(r.content || '').length > 100 ? '...' : ''}</div>
      </div>`).join('');
  } catch(e) { c.textContent = 'Could not load logs: ' + e.message; }
})();
</script>
</body>
</html>
