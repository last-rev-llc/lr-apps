<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎵 Concerts — Logs</title>
<link rel="stylesheet" href="https://shared.adam-harris.alphaclaw.app/theme.css">
<script src="https://shared.adam-harris.alphaclaw.app/components/index.js"></script>
<meta name="supabase-url" content="https://lregiwsovpmljxjvrrsc.supabase.co">
<meta name="supabase-key" content="sb_publishable_HPinRWPrX97uxshGM0u1rw_UAsQsyFq">
<script src="https://shared.adam-harris.alphaclaw.app/supabase-client.js"></script>
<script src="db.js"></script>
</head>
<body>
<cc-app-nav app="cc-concerts" title="🎵 Concerts" active="logs"></cc-app-nav>
<cc-auth></cc-auth>
<cc-toast></cc-toast>
<div style="max-width:960px;margin:40px auto;padding:0 20px;">
  <h1 style="font-family:var(--serif);margin-bottom:24px;">📋 Change Log</h1>
  <div id="logs-container" style="color:var(--muted);font-size:14px;">Loading logs…</div>
</div>
<script>
(async () => {
  const container = document.getElementById('logs-container');
  try {
    // Show recent concerts as log entries since we don't have sync_log
    if (!window.supabase) { container.textContent = 'Database not available.'; return; }
    const concerts = await window.supabase.select('concerts', { order: 'created_at.desc', limit: 50 });
    const rsvps = await window.supabase.select('concert_rsvps', { order: 'created_at.desc', limit: 50 });
    const entries = [];
    concerts.forEach(c => entries.push({ action: 'Concert added', ts: c.created_at, detail: `${c.artist} at ${c.venue || 'TBA'} — ${c.date}` }));
    rsvps.forEach(r => entries.push({ action: `RSVP: ${r.status}`, ts: r.created_at, detail: `${r.user_name} → ${r.concert_id}` }));
    entries.sort((a, b) => (b.ts || '').localeCompare(a.ts || ''));
    const esc = s => { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; };
    if (!entries.length) {
      container.innerHTML = '<cc-empty-state message="No log entries yet — activity will appear here as changes are made." icon="📋"></cc-empty-state>';
      return;
    }
    container.innerHTML = entries.slice(0, 50).map(r => `
      <div style="padding:10px 0;border-bottom:1px solid var(--border);">
        <span style="color:var(--heading);font-weight:600;">${esc(r.action || 'update')}</span>
        <span style="margin-left:8px;font-size:12px;color:var(--muted);">${r.ts ? esc(new Date(r.ts).toLocaleString()) : ''}</span>
        ${r.detail ? `<div style="font-size:12px;margin-top:4px;">${esc(r.detail)}</div>` : ''}
      </div>`).join('');
  } catch(e) {
    container.textContent = 'Could not load logs: ' + e.message;
  }
})();
</script>
</body>
</html>
