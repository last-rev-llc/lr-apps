<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1792 1024">
  <rect fill="#0f172a" width="1792" height="1024"/>
  
  <!-- Central hub representing enterprise system -->
  <circle cx="896" cy="512" r="80" fill="none" stroke="#6366f1" stroke-width="3" stroke-dasharray="12 6"/>
  <circle cx="896" cy="512" r="40" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  <text x="896" y="520" text-anchor="middle" fill="#6366f1" font-size="14" font-family="Arial">Core</text>
  
  <!-- API Integration nodes -->
  <g>
    <!-- OpenAI node -->
    <circle cx="650" cy="350" r="50" fill="#1e293b" stroke="#06b6d4" stroke-width="2"/>
    <text x="650" y="320" text-anchor="middle" fill="#06b6d4" font-size="12" font-family="Arial">OpenAI</text>
    <text x="650" y="355" text-anchor="middle" fill="#06b6d4" font-size="10" font-family="Arial">API</text>
    <line x1="700" y1="350" x2="836" y2="472" stroke="#06b6d4" stroke-width="2" opacity="0.8"/>
    
    <!-- Anthropic node -->
    <circle cx="1142" cy="350" r="50" fill="#1e293b" stroke="#06b6d4" stroke-width="2"/>
    <text x="1142" y="320" text-anchor="middle" fill="#06b6d4" font-size="12" font-family="Arial">Anthropic</text>
    <text x="1142" y="355" text-anchor="middle" fill="#06b6d4" font-size="10" font-family="Arial">API</text>
    <line x1="1092" y1="350" x2="956" y2="472" stroke="#06b6d4" stroke-width="2" opacity="0.8"/>
    
    <!-- Google AI node -->
    <circle cx="896" cy="250" r="50" fill="#1e293b" stroke="#06b6d4" stroke-width="2"/>
    <text x="896" y="230" text-anchor="middle" fill="#06b6d4" font-size="12" font-family="Arial">Google</text>
    <text x="896" y="255" text-anchor="middle" fill="#06b6d4" font-size="10" font-family="Arial">AI</text>
    <line x1="896" y1="300" x2="896" y2="432" stroke="#06b6d4" stroke-width="2" opacity="0.8"/>
  </g>
  
  <!-- Integration pattern indicators -->
  <g>
    <!-- Direct API pattern -->
    <rect x="450" y="600" width="120" height="60" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="510" y="620" text-anchor="middle" fill="#f59e0b" font-size="10" font-family="Arial">Direct API</text>
    <text x="510" y="635" text-anchor="middle" fill="#f59e0b" font-size="10" font-family="Arial">Integration</text>
    
    <!-- Agent pattern -->
    <rect x="620" y="600" width="120" height="60" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="680" y="620" text-anchor="middle" fill="#f59e0b" font-size="10" font-family="Arial">AI Agents</text>
    <text x="680" y="635" text-anchor="middle" fill="#f59e0b" font-size="10" font-family="Arial">Embedded</text>
    
    <!-- RAG pattern -->
    <rect x="790" y="600" width="120" height="60" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="850" y="620" text-anchor="middle" fill="#f59e0b" font-size="10" font-family="Arial">RAG</text>
    <text x="850" y="635" text-anchor="middle" fill="#f59e0b" font-size="10" font-family="Arial">Pipeline</text>
    
    <!-- Microservices pattern -->
    <rect x="960" y="600" width="120" height="60" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="1020" y="620" text-anchor="middle" fill="#f59e0b" font-size="10" font-family="Arial">AI</text>
    <text x="1020" y="635" text-anchor="middle" fill="#f59e0b" font-size="10" font-family="Arial">Microservices</text>
    
    <!-- Orchestration pattern -->
    <rect x="1130" y="600" width="120" height="60" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="1190" y="620" text-anchor="middle" fill="#f59e0b" font-size="10" font-family="Arial">Agent</text>
    <text x="1190" y="635" text-anchor="middle" fill="#f59e0b" font-size="10" font-family="Arial">Orchestration</text>
  </g>
  
  <!-- Data flow lines -->
  <g opacity="0.6">
    <line x1="510" y1="600" x2="856" y2="552" stroke="#64748b" stroke-width="1" stroke-dasharray="4 4"/>
    <line x1="680" y1="600" x2="876" y2="552" stroke="#64748b" stroke-width="1" stroke-dasharray="4 4"/>
    <line x1="850" y1="600" x2="896" y2="552" stroke="#64748b" stroke-width="1" stroke-dasharray="4 4"/>
    <line x1="1020" y1="600" x2="916" y2="552" stroke="#64748b" stroke-width="1" stroke-dasharray="4 4"/>
    <line x1="1190" y1="600" x2="936" y2="552" stroke="#64748b" stroke-width="1" stroke-dasharray="4 4"/>
  </g>
  
  <!-- Integration flow arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1" opacity="0.8"/>
    </marker>
  </defs>
  
  <!-- Flowing data indicators -->
  <g opacity="0.4">
    <circle cx="750" cy="400" r="3" fill="#06b6d4">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1050" cy="400" r="3" fill="#06b6d4">
      <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="896" cy="350" r="3" fill="#06b6d4">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>