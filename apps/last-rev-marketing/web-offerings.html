<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="./js/lr-head.js"></script>
  <script src="./js/lr-layout.js"></script>
</head>
<body class="lp">

  <lr-head
    title="Web Development — Last Rev"
    description="Enterprise web development: marketing sites, headless CMS, e-commerce platforms, intranets & knowledge bases built with Next.js and Contentful."
    canonical="https://lastrev.com/web-offerings"
    og-title="Web Development — Last Rev"
    og-description="Enterprise web development: marketing sites, headless CMS, e-commerce platforms, intranets & knowledge bases built with Next.js and Contentful."
    og-image="https://lastrev.com/images/og-default.png"
    og-url="https://lastrev.com/web-offerings"
    og-type="website"
    robots="index, follow"
    extra-css="./css/web-offerings.css"
  ></lr-head>

  <lr-layout active="web-offerings" cta-text="Start a Project" cta-href="#contact">

  <!-- Hero -->
  <section class="hero-inner">
    <cc-fade-in>
      <h1 style="position: absolute; left: -9999px;">Web Development — Last Rev</h1>
      <cc-hero variant="glow" overline="Web Development Services" title="Enterprise Web. Composable Architecture. Real Results." subtitle="From high-performance marketing sites to intranets and e-commerce — Last Rev builds modern web applications on headless CMS platforms that scale with your business.">
        <div slot="actions" class="hero-ctas">
          <a href="#services" class="btn-primary">Explore Services</a>
          <a href="#contact" class="btn-ghost">Start a Project ↓</a>
        </div>
      </cc-hero>
    </cc-fade-in>
  </section>

  <!-- Service Overview Cards -->
  <section class="lp-section" id="services">
    <cc-fade-in>
      <div class="product-overview-grid">
        <cc-card variant="glass" href="#marketing-sites" title="Marketing Websites" body="Enterprise-grade marketing sites optimized for performance, SEO, and conversion. Built on headless CMS with sub-second page loads." overline="🌐 Enterprise"></cc-card>
        <cc-card variant="glass" href="#headless-cms" title="Headless CMS" body="Expert Contentful and Sanity implementations with composable content models, localization, and multi-channel delivery." overline="📦 Composable"></cc-card>
        <cc-card variant="glass" href="#ecommerce" title="E-Commerce" body="Custom storefronts and catalog experiences built for speed, scale, and seamless checkout — headless commerce done right." overline="🛒 Commerce"></cc-card>
      </div>
    </cc-fade-in>
  </section>

  <div class="lp-divider"></div>

  <!-- MARKETING WEBSITES -->
  <section class="lp-section product-section" id="marketing-sites">
    <cc-fade-in>
      <cc-section-intro
        badge="Enterprise Web" badge-color="blue"
        title="Marketing Websites"
        subtitle="High-Performance Sites That Convert"
        body="Your website is your hardest-working salesperson. We build enterprise marketing sites on modern composable stacks — headless CMS, React/Next.js, and edge deployment — so they load fast, rank well, and convert visitors into customers."
      ></cc-section-intro>
    </cc-fade-in>

    <div class="features-grid">
      <cc-fade-in delay="0">
        <cc-card variant="glass" title="Next.js & React" body="Server-side rendering, static generation, and incremental builds deliver sub-second page loads and perfect Lighthouse scores.">
          <div slot="actions"><div class="neon-icon neon-blue"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></div></div>
        </cc-card>
      </cc-fade-in>

      <cc-fade-in delay="100">
        <cc-card variant="glass" title="SEO-First Architecture" body="Structured data, semantic HTML, optimized Core Web Vitals, and automated sitemap generation built into every site from day one.">
          <div slot="actions"><div class="neon-icon neon-green"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></div></div>
        </cc-card>
      </cc-fade-in>

      <cc-fade-in delay="200">
        <cc-card variant="glass" title="Edge Deployment" body="Deploy to Netlify or Vercel's global edge network. Your site loads fast everywhere — not just near your data center.">
          <div slot="actions"><div class="neon-icon neon-amber"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></div></div>
        </cc-card>
      </cc-fade-in>

      <cc-fade-in delay="300">
        <cc-card variant="glass" title="Component-Driven Design" body="Reusable design system components ensure brand consistency across every page while giving content teams flexibility to build new layouts.">
          <div slot="actions"><div class="neon-icon neon-violet"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></div></div>
        </cc-card>
      </cc-fade-in>

      <cc-fade-in delay="400">
        <cc-card variant="glass" title="Accessibility (WCAG)" body="Every site we build meets WCAG 2.1 AA standards. Keyboard navigation, screen reader support, and contrast compliance are non-negotiable.">
          <div slot="actions"><div class="neon-icon neon-pink"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="4" r="2"/><path d="M12 6v6m-4 4 4-4 4 4"/><path d="M6 12h12"/></svg></div></div>
        </cc-card>
      </cc-fade-in>

      <cc-fade-in delay="500">
        <cc-card variant="glass" title="Analytics & Optimization" body="GA4, GTM, A/B testing, and conversion tracking wired in from launch. Know what's working and iterate with real data.">
          <div slot="actions"><div class="neon-icon neon-cyan"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg></div></div>
        </cc-card>
      </cc-fade-in>
    </div>
  </section>

  <div class="lp-divider"></div>

  <!-- HEADLESS CMS -->
  <section class="lp-section product-section" id="headless-cms">
    <cc-fade-in>
      <cc-section-intro
        badge="Composable CMS" badge-color="violet"
        title="Headless CMS Implementation"
        subtitle="Content Infrastructure That Scales With You"
        body="We're deep experts in Contentful and Sanity — the two leading headless CMS platforms. From content modeling and migration to multi-locale delivery and editorial workflows, we build content infrastructure that empowers your team and feeds every channel."
      ></cc-section-intro>
    </cc-fade-in>

    <div class="capability-grid">
      <cc-fade-in delay="0">
        <cc-card variant="glass" title="Contentful" body="Enterprise Contentful implementations with composable content types, rich text customization, localization across 50+ locales, and automated publishing workflows." overline="📦"></cc-card>
      </cc-fade-in>
      <cc-fade-in delay="80">
        <cc-card variant="glass" title="Sanity" body="Flexible Sanity Studio configurations with custom schemas, real-time collaboration, GROQ-powered queries, and field-level localization plugins." overline="🔧"></cc-card>
      </cc-fade-in>
      <cc-fade-in delay="160">
        <cc-card variant="glass" title="Content Modeling" body="Structured, reusable content types designed for multi-channel delivery — your content works on web, mobile, digital signage, and future channels." overline="🧩"></cc-card>
      </cc-fade-in>
      <cc-fade-in delay="240">
        <cc-card variant="glass" title="CMS Migration" body="Battle-tested migration pipelines for moving from WordPress, Drupal, Sitecore, or legacy CMSes to headless — with zero content loss." overline="🔄"></cc-card>
      </cc-fade-in>
      <cc-fade-in delay="320">
        <cc-card variant="glass" title="Localization" body="Multi-locale content delivery with best-in-class localization support. Translation workflows, locale fallbacks, and market-specific content variants." overline="🌍"></cc-card>
      </cc-fade-in>
      <cc-fade-in delay="400">
        <cc-card variant="glass" title="Content Normalization" body="Unified content layers that normalize data from multiple CMS sources into a single, consistent API for your frontend — vendor-agnostic by design." overline="⚡"></cc-card>
      </cc-fade-in>
    </div>

    <cc-fade-in>
      <div style="margin-top: 56px;">
        <h3 style="text-align:center; color: rgba(255,255,255,0.5); font-size: 13px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 24px;">CMS Platforms We Work With</h3>
        <div class="use-case-strip">
          <div class="use-case-pill glass">Contentful</div>
          <div class="use-case-pill glass">Sanity</div>
          <div class="use-case-pill glass">WordPress</div>
          <div class="use-case-pill glass">Drupal</div>
          <div class="use-case-pill glass">Sitecore</div>
          <div class="use-case-pill glass">Salesforce CMS</div>
          <div class="use-case-pill glass">Strapi</div>
        </div>
      </div>
    </cc-fade-in>
  </section>

  <div class="lp-divider"></div>

  <!-- E-COMMERCE -->
  <section class="lp-section product-section" id="ecommerce">
    <cc-fade-in>
      <cc-section-intro
        badge="Commerce" badge-color="amber"
        title="E-Commerce"
        subtitle="Headless Commerce That Actually Converts"
        body="Decouple your storefront from your commerce engine. We build blazing-fast e-commerce experiences on headless platforms that give your team full creative control while keeping checkout seamless and reliable."
      ></cc-section-intro>
    </cc-fade-in>

    <div class="pillars-grid">
      <cc-fade-in delay="0">
        <cc-card variant="glass" title="🛍️ Custom Storefronts" body="React-based storefronts with headless Shopify, BigCommerce, or custom backends · Product filtering & search · Dynamic pricing · Personalized recommendations"></cc-card>
      </cc-fade-in>
      <cc-fade-in delay="100">
        <cc-card variant="glass" title="⚡ Performance & SEO" body="Static product pages with ISR for instant loads · Structured data for rich snippets · Image optimization pipeline · Sub-second checkout flows"></cc-card>
      </cc-fade-in>
      <cc-fade-in delay="200">
        <cc-card variant="glass" title="🔗 Integrations" body="PIM, ERP, OMS, and payment gateway integrations · Inventory sync across channels · Order management · Fulfillment automation"></cc-card>
      </cc-fade-in>
    </div>
  </section>

  <div class="lp-divider"></div>

  <!-- INTRANETS & KNOWLEDGE BASES -->
  <section class="lp-section product-section" id="intranets">
    <cc-fade-in>
      <cc-section-intro
        badge="Internal Tools" badge-color="green"
        title="Intranets & Knowledge Bases"
        subtitle="Your Team's Single Source of Truth"
        body="Intranets and knowledge bases are only useful when people actually use them. We build internal platforms that are fast, searchable, and genuinely helpful — not digital graveyards for outdated PDFs."
      ></cc-section-intro>
    </cc-fade-in>

    <div class="features-grid">
      <cc-fade-in delay="0">
        <cc-card variant="glass" title="Intelligent Search" body="Full-text and semantic search powered by AI. Your team finds answers in seconds, not hours of scrolling through SharePoint.">
          <div slot="actions"><div class="neon-icon neon-green"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></div></div>
        </cc-card>
      </cc-fade-in>

      <cc-fade-in delay="100">
        <cc-card variant="glass" title="SSO & Access Control" body="Integrate with your identity provider — Okta, Azure AD, Auth0. Role-based access ensures the right people see the right content.">
          <div slot="actions"><div class="neon-icon neon-blue"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2a4 4 0 0 0-4 4v2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2h-2V6a4 4 0 0 0-4-4z"/><circle cx="12" cy="15" r="2"/></svg></div></div>
        </cc-card>
      </cc-fade-in>

      <cc-fade-in delay="200">
        <cc-card variant="glass" title="CMS-Driven Content" body="Non-technical editors manage content through a familiar CMS interface. No developer needed to update a policy doc or add a new FAQ.">
          <div slot="actions"><div class="neon-icon neon-violet"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></div></div>
        </cc-card>
      </cc-fade-in>

      <cc-fade-in delay="300">
        <cc-card variant="glass" title="Multi-Department Structure" body="Organized by team, department, or topic with flexible navigation. Each department manages their own section without stepping on others.">
          <div slot="actions"><div class="neon-icon neon-amber"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div></div>
        </cc-card>
      </cc-fade-in>
    </div>
  </section>

  <div class="lp-divider"></div>

  <!-- Tech Stack -->
  <section class="lp-section" style="text-align: center;">
    <cc-fade-in>
      <cc-section-intro
        overline="Our Stack"
        title="Modern Tech. Proven Patterns."
        body="We don't chase trends — we use what works. Our stack is battle-tested across enterprise marketing sites, intranets, and e-commerce platforms."
      ></cc-section-intro>
    </cc-fade-in>

    <cc-fade-in>
      <cc-logo-cloud brands="tech" title="Battle-Tested Technologies"></cc-logo-cloud>
    </cc-fade-in>
  </section>

  <!-- Process -->
  <section class="lp-section" style="text-align: center;">
    <cc-fade-in>
      <cc-section-intro
        overline="How We Work"
        title="From Discovery to Launch in Weeks, Not Months"
      ></cc-section-intro>
    </cc-fade-in>

    <cc-fade-in>
      <cc-timeline variant="alternating" steps='[{"title":"Week 1–2 — Discovery & Architecture","description":"We audit your current site, define content models, map user journeys, and architect the technical stack. You get a clear plan with timelines."},{"title":"Week 3–6 — Build & Iterate","description":"Component-driven development in 2-week sprints. You see working code every sprint — not wireframes. Content modeling and migration happen in parallel."},{"title":"Week 7–8 — QA, Performance & Launch","description":"Accessibility audit, Lighthouse optimization, cross-browser testing, and content freeze. Go live with confidence on Netlify or Vercel with instant rollback."},{"title":"Ongoing — Support & Optimization","description":"Post-launch analytics review, A/B testing, performance monitoring, and continuous content optimization. We stay engaged as long as you need us."}]'></cc-timeline>
    </cc-fade-in>
  </section>

  </lr-layout>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": ["Service", "WebPage"],
    "name": "Web Development Services",
    "description": "Enterprise web development: marketing sites, headless CMS, e-commerce platforms, intranets & knowledge bases built with Next.js and Contentful.",
    "url": "https://lastrev.com/web-offerings",
    "serviceType": "Web Development",
    "category": ["Enterprise Web Development", "Headless CMS", "E-commerce Development", "Intranet Development"],
    "areaServed": {
      "@type": "Place",
      "name": "United States"
    },
    "provider": {
      "@type": "Organization",
      "name": "Last Rev, LLC",
      "url": "https://lastrev.com",
      "logo": "https://lastrev.com/images/logo.png",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "San Francisco",

        "postalCode": "94118",
        "addressCountry": "US"
      },
      "contactPoint": {

      }
    },
    "offers": [
      {
        "@type": "Offer",

      },
      {
        "@type": "Offer",

      },
      {
        "@type": "Offer",

</body>
</html>
