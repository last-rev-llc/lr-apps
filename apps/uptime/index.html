<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f59e0b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.svg">
<title>📡 Uptime Status</title>
<meta name="supabase-url" content="https://lregiwsovpmljxjvrrsc.supabase.co">
<meta name="supabase-key" content="sb_publishable_HPinRWPrX97uxshGM0u1rw_UAsQsyFq">
<link rel="stylesheet" href="https://shared.adam-harris.alphaclaw.app/theme.css">
<script src="https://shared.adam-harris.alphaclaw.app/components/index.js"></script>
<script src="https://shared.adam-harris.alphaclaw.app/supabase-client.js"></script>
<script src="https://shared.adam-harris.alphaclaw.app/sql-sync.js"></script>
<script src="db.js"></script>
<style>
  .status-banner {
    padding: 16px 24px;
    border-radius: 12px;
    font-size: 18px;
    font-weight: 600;
    text-align: center;
    margin-bottom: 24px;
  }
  .banner-ok { background: rgba(16,185,129,0.15); color: var(--success, var(--green)); border: 1px solid rgba(16,185,129,0.3); }
  .banner-issues { background: rgba(239,68,68,0.15); color: var(--danger, var(--red)); border: 1px solid rgba(239,68,68,0.3); }

  .sites-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }
  @media (max-width: 480px) {
    .sites-grid { grid-template-columns: 1fr; }
  }

  .site-card {
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .site-card:hover { border-color: var(--accent); box-shadow: 0 0 12px rgba(99,102,241,0.15); }

  .site-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }
  .site-name { font-weight: 600; font-size: 16px; color: var(--text); }
  .site-url { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .status-badge {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
  }
  .status-up { background: rgba(16,185,129,0.15); color: var(--green); }
  .status-down { background: rgba(239,68,68,0.15); color: var(--danger, var(--red)); }
  .status-degraded { background: rgba(245,158,11,0.15); color: var(--yellow); }

  .site-stats {
    display: flex;
    gap: 20px;
    margin-bottom: 14px;
    font-size: 13px;
    color: var(--muted);
  }
  .site-stats .stat-value { font-weight: 600; color: var(--text); }

  /* 30-day uptime bars */
  .uptime-bars {
    display: flex;
    gap: 2px;
    align-items: flex-end;
    height: 32px;
  }
  .uptime-bar {
    flex: 1;
    min-width: 0;
    border-radius: 2px;
    transition: opacity 0.15s;
    position: relative;
  }
  .uptime-bar:hover { opacity: 0.8; }
  .bar-up { background: var(--green); }
  .bar-down { background: var(--red); }
  .bar-degraded { background: var(--yellow); }
  .bar-nodata { background: var(--border); }

  .uptime-bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* Detail modal handled by <cc-modal> */

  /* Response time chart */
  .rt-chart {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 120px;
    margin: 16px 0;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .rt-bar {
    flex: 1;
    min-width: 0;
    background: var(--accent, #6366f1);
    border-radius: 2px 2px 0 0;
    transition: opacity 0.15s;
    position: relative;
  }
  .rt-bar:hover { opacity: 0.7; }

  /* Incidents */
  .incident-item {
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .incident-item:last-child { border-bottom: none; }
  .incident-time { font-size: 12px; color: var(--muted); }
  .incident-desc { font-size: 14px; color: var(--text); margin: 4px 0; }
  .incident-duration { font-size: 12px; color: var(--muted); }
  .incident-resolved { color: var(--green); }
  .incident-ongoing { color: var(--red); }

  .section-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin: 20px 0 10px;
  }

  /* Tooltip for bars */
  .rt-bar[data-tooltip]:hover::after,
  .uptime-bar[data-tooltip]:hover::after {
    content: attr(data-tooltip);
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface, #1e1e2e);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 6px;
    white-space: nowrap;
    z-index: 10;
    pointer-events: none;
  }

  .site-delete {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: none;
    background: rgba(239,68,68,0.15);
    color: var(--red);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 5;
  }
  .site-card:hover .site-delete { opacity: 1; }
  .site-delete:hover { background: rgba(239,68,68,0.3); }
  .site-card { position: relative; }

  .btn-add, .btn-refresh {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--glass);
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s, background 0.2s;
  }
  .btn-add:hover, .btn-refresh:hover {
    border-color: var(--accent);
    background: rgba(99,102,241,0.1);
  }
</style>
</head>
<body>
<cc-app-nav app="uptime" title="Uptime Status" active="uptime"></cc-app-nav>
<cc-auth></cc-auth>
<cc-toast></cc-toast>

<cc-page-header icon="📡" title="Uptime Status" description="Service health monitoring">
  <button class="btn-add" onclick="openAddModal()" title="Add Site">+</button>
  <button class="btn-refresh" onclick="openBuildModal()" title="Production Prompt">🔨</button>
  <div style="color:var(--muted);font-size:13px;">Last updated: <span id="updated">—</span></div>
</cc-page-header>

<div id="banner" class="status-banner banner-ok">✅ All Systems Operational</div>

<cc-pill-filter id="status-filter" label="Status" items='[{"value":"all","label":"All"},{"value":"up","label":"🟢 Up"},{"value":"degraded","label":"🟡 Degraded"},{"value":"down","label":"🔴 Down"}]' value="all"></cc-pill-filter>

<div class="sites-grid" id="sites-grid"></div>

<!-- Add Site Modal -->
<cc-modal id="add-modal" title="Add Site" size="sm">
  <cc-field label="Site Name" name="site-name" placeholder="e.g. My Website" required></cc-field>
  <cc-field label="URL" name="site-url" placeholder="https://example.com" required></cc-field>
  <cc-field label="Description" name="site-desc" type="textarea" placeholder="Optional description" rows="2"></cc-field>
  <div slot="footer">
    <button class="btn btn-ghost" onclick="document.getElementById('add-modal').close()">Cancel</button>
    <button class="btn btn-primary" onclick="addSite()">Add Site</button>
  </div>
</cc-modal>

<!-- Build/Production Prompt Modal -->
<cc-modal id="build-modal" title="🔨 Production Prompt" size="lg">
  <div style="display:flex;justify-content:flex-end;margin-bottom:12px;">
    <button class="btn btn-primary" onclick="copyBuildPrompt()" style="font-size:13px;padding:6px 16px;">📋 Copy Prompt</button>
  </div>
  <pre id="build-prompt-content" style="white-space:pre-wrap;word-wrap:break-word;font-size:12px;line-height:1.6;color:var(--text);background:var(--glass);border:1px solid var(--border);border-radius:8px;padding:16px;max-height:60vh;overflow-y:auto;font-family:'SF Mono',Monaco,Consolas,monospace;"></pre>
</cc-modal>

<!-- Detail Modal -->
<cc-modal id="detail-modal" title="Site Details" size="lg">
  <div id="modal-body"></div>
</cc-modal>

<script>
let db, sites = [];
let currentFilter = 'all';

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str == null ? '' : String(str);
  return d.innerHTML;
}

function escAttr(str) {
  return String(str == null ? '' : str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function init() {
  db = await SyncDB.init(UPTIME_DB_CONFIG);
  sites = db.all('sites');
  if (!sites.length) {
    await db.pullAll();
    sites = db.all('sites');
  }
  render();
  document.getElementById('updated').textContent = new Date().toLocaleTimeString();
}

function getStatusIcon(s) {
  return s === 'up' ? '🟢' : s === 'down' ? '🔴' : '🟡';
}
function getStatusLabel(s) {
  return s === 'up' ? 'Operational' : s === 'down' ? 'Down' : 'Degraded';
}

function render() {
  const filtered = currentFilter === 'all' ? sites : sites.filter(s => s.status === currentFilter);
  const issues = sites.filter(s => s.status !== 'up');
  const banner = document.getElementById('banner');
  if (issues.length === 0) {
    banner.className = 'status-banner banner-ok';
    banner.textContent = '✅ All Systems Operational';
  } else {
    banner.className = 'status-banner banner-issues';
    banner.textContent = `⚠️ ${issues.length} System${issues.length > 1 ? 's' : ''} Experiencing Issues`;
  }

  const grid = document.getElementById('sites-grid');
  if (!filtered.length) {
    grid.innerHTML = '<cc-empty-state icon="📡" message="No sites match this filter"></cc-empty-state>';
    return;
  }
  grid.innerHTML = filtered.map(site => {
    const history = (site.history || []).slice(0, 30);
    const bars = renderBars(history);
    const oldest = history.length ? history[history.length - 1].date : '';
    const newest = history.length ? history[0].date : '';
    return `
      <div class="site-card" data-site-id="${escAttr(site.id)}" onclick="showDetail(this.dataset.siteId)">
        <button class="site-delete" data-site-id="${escAttr(site.id)}" onclick="event.stopPropagation();deleteSite(this.dataset.siteId)" title="Remove site">×</button>
        <div class="site-header">
          <div>
            <div class="site-name">${esc(site.name)}</div>
            <div class="site-url">${esc(site.url)}</div>
          </div>
          <span class="status-badge status-${escAttr(site.status)}">${getStatusIcon(site.status)} ${getStatusLabel(site.status)}</span>
        </div>
        <div class="site-stats">
          <div>Response: <span class="stat-value">${site.responseTimeMs ? esc(site.responseTimeMs + 'ms') : '—'}</span></div>
          <div>Uptime: <span class="stat-value">${esc(site.uptimePercent)}%</span></div>
        </div>
        <div class="uptime-bars">${bars}</div>
        <div class="uptime-bar-label"><span>${esc(oldest)}</span><span>${esc(newest)}</span></div>
      </div>`;
  }).join('');
}

function renderBars(history) {
  // Show oldest→newest (left→right), so reverse
  const days = [...history].reverse();
  return days.map(d => {
    const cls = d.status === 'up' ? 'bar-up' : d.status === 'down' ? 'bar-down' : 'bar-degraded';
    const h = d.status === 'down' ? '100%' : d.responseTimeMs ? Math.max(20, Math.min(100, (d.responseTimeMs / 20))) + '%' : '30%';
    const tip = `${d.date}: ${d.status}${d.responseTimeMs ? ' (' + d.responseTimeMs + 'ms)' : ''}`;
    return `<div class="uptime-bar ${cls}" style="height:${h}" data-tooltip="${escAttr(tip)}"></div>`;
  }).join('');
}

function showDetail(id) {
  const site = sites.find(s => s.id === id);
  if (!site) return;
  const history = site.history || [];
  const incidents = [];
  history.forEach(d => {
    (d.incidents || []).forEach(inc => {
      incidents.push({ ...inc, date: d.date });
    });
  });

  const detailModal = document.getElementById('detail-modal');
  detailModal.setAttribute('title', site.name);
  document.getElementById('modal-body').innerHTML = `
    <div class="site-url" style="margin-bottom:8px;">${esc(site.url)}</div>
    <span class="status-badge status-${escAttr(site.status)}">${getStatusIcon(site.status)} ${getStatusLabel(site.status)}</span>
    <div class="site-stats" style="margin-top:14px;">
      <div>Response: <span class="stat-value">${site.responseTimeMs ? esc(site.responseTimeMs + 'ms') : '—'}</span></div>
      <div>Uptime: <span class="stat-value">${esc(site.uptimePercent)}%</span></div>
      <div>Checked: <span class="stat-value">${esc(new Date(site.lastChecked).toLocaleString())}</span></div>
    </div>

    <div class="section-title">Response Time (30 days)</div>
    <div class="rt-chart">${renderRtChart(history)}</div>

    <div class="section-title">30-Day Uptime</div>
    <div class="uptime-bars" style="height:40px;">${renderBars(history)}</div>
    <div class="uptime-bar-label"><span>${esc(history.length ? history[history.length-1].date : '')}</span><span>${esc(history.length ? history[0].date : '')}</span></div>

    <div class="section-title">Incident History${incidents.length ? ` (${incidents.length})` : ''}</div>
    ${incidents.length === 0 ? '<cc-empty-state icon="🎉" message="No incidents in the last 30 days"></cc-empty-state>' :
      incidents.map(inc => {
        const dur = inc.end ? formatDuration(new Date(inc.start), new Date(inc.end)) : 'Ongoing';
        return `<div class="incident-item">
          <div class="incident-time">${esc(new Date(inc.start).toLocaleString())}</div>
          <div class="incident-desc">${esc(inc.description)}</div>
          <div class="incident-duration">Duration: ${esc(dur)} · <span class="${inc.resolved ? 'incident-resolved' : 'incident-ongoing'}">${inc.resolved ? '✅ Resolved' : '🔴 Ongoing'}</span></div>
        </div>`;
      }).join('')}
  `;
  detailModal.open();
}

function renderRtChart(history) {
  const days = [...history].reverse();
  const max = Math.max(...days.map(d => d.responseTimeMs || 0), 1);
  return days.map(d => {
    const pct = d.responseTimeMs ? (d.responseTimeMs / max * 100) : 0;
    const color = d.responseTimeMs > 1000 ? 'var(--accent)' : d.responseTimeMs === 0 ? 'var(--danger, var(--red))' : 'var(--accent)';
    const tip = `${d.date}: ${d.responseTimeMs ? d.responseTimeMs + 'ms' : 'Down'}`;
    return `<div class="rt-bar" style="height:${Math.max(2, pct)}%;background:${color}" data-tooltip="${escAttr(tip)}"></div>`;
  }).join('');
}

function formatDuration(start, end) {
  const mins = Math.round((end - start) / 60000);
  if (mins < 60) return `${mins}m`;
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return `${h}h ${m}m`;
}

function closeModal() {
  document.getElementById('detail-modal').close();
}

document.getElementById('status-filter').addEventListener('pill-change', e => {
  currentFilter = e.detail.value;
  render();
});

function openAddModal() {
  const modal = document.getElementById('add-modal');
  modal.querySelectorAll('cc-field').forEach(f => f.clear && f.clear());
  modal.open();
}

async function addSite() {
  const modal = document.getElementById('add-modal');
  const nameField = modal.querySelector('[name="site-name"]');
  const urlField = modal.querySelector('[name="site-url"]');
  const descField = modal.querySelector('[name="site-desc"]');
  const name = nameField.getValue().trim();
  const url = urlField.getValue().trim();
  const desc = descField.getValue().trim();
  if (!name || !url) { window.showToast && showToast('Name and URL are required', 3000); return; }
  const id = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
  const now = new Date().toISOString();
  const site = {
    id, name, url, status: 'up', responseTimeMs: 0, uptimePercent: 100,
    lastChecked: now, history: [{ date: now.slice(0, 10), status: 'up', responseTimeMs: 0, incidents: [] }],
    description: desc, createdAt: now, updatedAt: now
  };
  db.upsert('sites', site);
  await db.push('sites');
  sites = db.all('sites');
  render();
  modal.close();
  window.showToast && showToast(`✅ Added "${name}"`, 3000);
}

async function deleteSite(id) {
  const site = sites.find(s => s.id === id);
  if (!site) return;
  if (!confirm(`Remove "${site.name}" from monitoring?`)) return;
  db.delete('sites', id);
  await db.push('sites');
  sites = db.all('sites');
  render();
  window.showToast && showToast(`🗑️ Removed "${site.name}"`, 3000);
}

async function openBuildModal() {
  const modal = document.getElementById('build-modal');
  const content = document.getElementById('build-prompt-content');
  content.textContent = 'Loading…';
  modal.open();
  try {
    const resp = await fetch('data/production-prompt.md');
    content.textContent = await resp.text();
  } catch (e) {
    content.textContent = 'Failed to load prompt: ' + e.message;
  }
}

async function copyBuildPrompt() {
  const text = document.getElementById('build-prompt-content').textContent;
  try {
    await navigator.clipboard.writeText(text);
    window.showToast && showToast('📋 Prompt copied to clipboard!', 3000);
  } catch (e) {
    window.showToast && showToast('Failed to copy', 3000);
  }
}

init();
</script>
</body>
</html>
