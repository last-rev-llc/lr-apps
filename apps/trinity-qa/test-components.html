<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component Test</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body style="padding: 2rem;">
  <h1>Component Load Test</h1>
  <div id="results"></div>

  <script type="module">
    const results = document.getElementById('results');
    
    // Import components
    import '/js/components/index.js';
    
    // Wait for components to register
    setTimeout(() => {
      const components = [
        'tq-badge',
        'tq-button',
        'tq-input',
        'tq-card',
        'tq-modal',
        'tq-toast',
        'tq-rating',
        'tq-table',
        'tq-avatar',
        'tq-empty',
        'tq-stat',
        'tq-form',
        'tq-header',
        'tq-footer'
      ];
      
      let passed = 0;
      let failed = 0;
      let output = '<h2>Component Registration Test</h2><ul>';
      
      components.forEach(name => {
        const isDefined = customElements.get(name) !== undefined;
        if (isDefined) {
          passed++;
          output += `<li style="color: green;">✓ ${name} - REGISTERED</li>`;
        } else {
          failed++;
          output += `<li style="color: red;">✗ ${name} - NOT FOUND</li>`;
        }
      });
      
      output += '</ul>';
      output += `<h3>Results: ${passed}/${components.length} passed</h3>`;
      
      if (failed === 0) {
        output += '<p style="color: green; font-weight: bold;">🎉 All components loaded successfully!</p>';
      } else {
        output += `<p style="color: red; font-weight: bold;">❌ ${failed} components failed to load</p>`;
      }
      
      results.innerHTML = output;
    }, 100);
  </script>
</body>
</html>
