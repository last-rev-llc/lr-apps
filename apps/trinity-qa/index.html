<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trinity Building Services - QA Portal</title>
  <meta name="theme-color" content="#475569">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏢</text></svg>">
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen" class="loading-screen">
    <div class="loading-content">
      <div class="trinity-logo">Trinity Building Services</div>
      <div class="loading-spinner"></div>
      <p>Loading QA Portal...</p>
    </div>
  </div>

  <!-- Login Screen -->
  <div id="login-screen" class="login-screen hidden">
    <div class="login-container">
      <div class="login-header">
        <h1>Trinity Building Services</h1>
        <p class="tagline">Quality Assurance Portal</p>
      </div>
      
      <div class="login-card">
        <h2>Sign In</h2>
        <form id="login-form">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="your.email@trinity.com">
          </div>
          
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="••••••••">
          </div>
          
          <button type="submit" class="btn btn-primary btn-block">Sign In</button>
        </form>
        
        <div class="login-footer">
          <p class="company-info">Family-owned and operated since 1987</p>
          <p class="company-info">San Francisco Bay Area</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div id="app" class="hidden">
    <!-- Top Navigation -->
    <tq-header id="main-header" app-title="Trinity QA"></tq-header>

    <!-- Main Content -->
    <main class="main-content">
      <div id="view-container"></div>
    </main>

    <!-- Notifications -->
    <div id="notifications-container" class="notifications-container"></div>
    
    <!-- Footer -->
    <tq-footer></tq-footer>
  </div>

  <!-- Modal Container -->
  <div id="modal-container"></div>

  <!-- Scripts -->
  <script type="module" src="/js/components/index.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/supabase.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/views/dashboard.js"></script>
  <script src="/js/views/inspections.js"></script>
  <script src="/js/views/work-orders.js"></script>
  <script src="/js/views/surveys.js"></script>
  <script src="/js/views/schedule.js"></script>
  <script src="/js/views/locations.js"></script>
  <script src="/js/views/users.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
