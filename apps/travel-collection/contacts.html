<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f59e0b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.svg">
<title>👥 Contacts — Travel Collection</title>
<meta name="supabase-url" content="https://lregiwsovpmljxjvrrsc.supabase.co">
<meta name="supabase-key" content="sb_publishable_HPinRWPrX97uxshGM0u1rw_UAsQsyFq">
<link rel="stylesheet" href="https://shared.adam-harris.alphaclaw.app/theme.css">
<script src="https://shared.adam-harris.alphaclaw.app/components/index.js"></script>
    <script src="https://shared.adam-harris.alphaclaw.app/supabase-auth.js"></script>
<style>
  .contact-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; padding: 0 24px 40px; }
  .contact-card { border-radius: 16px; padding: 20px; background: var(--glass); border: 1px solid var(--glass-border); backdrop-filter: blur(12px); cursor: pointer; transition: all .3s; }
  .contact-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: var(--shadow-hover); }
  .contact-card h3 { font-family: var(--serif); margin: 0 0 4px; font-size: 1.1rem; }
  .contact-card .role { color: var(--muted); font-size: 0.85rem; margin-bottom: 8px; }
  .contact-card .props { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }
  .contact-card .notes-preview { color: var(--muted); font-size: 0.8rem; margin-top: 8px; font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .filters-bar { display: flex; flex-wrap: wrap; gap: 12px; padding: 0 24px 20px; align-items: center; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
  .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--glass); color: var(--text); font-size: 0.9rem; box-sizing: border-box; }
  .form-group textarea { min-height: 80px; resize: vertical; font-family: inherit; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  .note-item { padding: 12px; background: var(--glass); border-radius: 10px; margin-bottom: 8px; border: 1px solid var(--glass-border); }
  .note-item .note-date { font-size: 0.75rem; color: var(--muted); margin-bottom: 4px; }
  .note-item .note-text { font-size: 0.9rem; line-height: 1.5; }
  .stats-bar { display: flex; gap: 16px; padding: 0 24px 12px; color: var(--muted); font-size: 0.85rem; flex-wrap: wrap; }
  .stats-bar .stat { background: var(--glass); padding: 6px 14px; border-radius: 8px; border: 1px solid var(--glass-border); }
  .stats-bar .stat strong { color: var(--accent); }
  .prop-tag { display: inline-flex; align-items: center; gap: 4px; }
  .prop-tag .remove-prop { cursor: pointer; opacity: 0.6; font-size: 0.7rem; }
  .prop-tag .remove-prop:hover { opacity: 1; color: var(--red, #ef4444); }
  @media (max-width: 640px) { .contact-grid { grid-template-columns: 1fr; } .form-row { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<cc-app-nav app="travel-collection" title="Travel Collection" active="contacts"></cc-app-nav>
<cc-user-auth mode="gate" allow-signup="false"></cc-user-auth>
<cc-toast></cc-toast>

<div class="page-header">
  <h1>👥 <span>Contacts</span></h1>
  <button class="btn btn-primary btn-sm" onclick="openAddContact()">+ Add Contact</button>
</div>

<div class="filters-bar">
  <cc-search id="search" placeholder="Search contacts..."></cc-search>
  <cc-pill-dropdown id="filter-tag" label="Tag" items='[{"value":"","label":"All Tags"},{"value":"hotel-owner","label":"Hotel Owner"},{"value":"gm","label":"General Manager"},{"value":"concierge","label":"Concierge"},{"value":"travel-advisor","label":"Travel Advisor"},{"value":"dmc","label":"DMC"},{"value":"client","label":"Client"},{"value":"friend","label":"Friend"}]' value=""></cc-pill-dropdown>
</div>

<div class="stats-bar" id="stats"></div>
<div class="contact-grid" id="contact-grid"></div>

<!-- Add/Edit Modal -->
<cc-modal id="contact-modal" title="Add Contact" size="md">
    <input type="hidden" id="edit-id">
    <div class="form-row">
      <div class="form-group">
        <label>First Name</label>
        <input type="text" id="f-first" placeholder="First name">
      </div>
      <div class="form-group">
        <label>Last Name</label>
        <input type="text" id="f-last" placeholder="Last name">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="f-email" placeholder="email@example.com">
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="tel" id="f-phone" placeholder="+1 555-1234">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Company / Property</label>
        <input type="text" id="f-company" placeholder="Hotel name or company">
      </div>
      <div class="form-group">
        <label>Role / Title</label>
        <input type="text" id="f-role" placeholder="General Manager, Owner, etc.">
      </div>
    </div>
    <div class="form-group">
      <label>Tags</label>
      <select id="f-tags" multiple style="min-height:80px;">
        <option value="hotel-owner">Hotel Owner</option>
        <option value="gm">General Manager</option>
        <option value="concierge">Concierge</option>
        <option value="travel-advisor">Travel Advisor</option>
        <option value="dmc">DMC</option>
        <option value="client">Client</option>
        <option value="friend">Friend</option>
        <option value="vip">VIP</option>
      </select>
    </div>
    <div class="form-group">
      <label>Associated Properties</label>
      <select id="f-properties" multiple style="min-height:100px;"></select>
    </div>
    <div class="form-group">
      <label>Location Met / Context</label>
      <input type="text" id="f-context" placeholder="Where did you meet? Event name?">
    </div>
    <div class="form-actions">
      <button class="btn btn-sm" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary btn-sm" id="btn-delete" style="display:none;background:var(--red);" onclick="deleteContact()">Delete</button>
      <button class="btn btn-primary btn-sm" onclick="saveContact()">Save Contact</button>
    </div>
</cc-modal>

<!-- Detail Modal -->
<cc-modal id="detail-modal" title="" size="md">
  <div id="detail-panel"></div>
</cc-modal>

<script src="https://shared.adam-harris.alphaclaw.app/supabase-client.js"></script>
<script src="db.js"></script>
<script>
let contacts = [];
let properties = [];
let db = null;

function esc(s) { const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; }
function escAttr(s) { return (s ?? '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function load() {
  try {
    db = await TravelDB.init();
    properties = await db.getProperties();
    contacts = await db.getContacts();
    populatePropertySelect();
    renderContacts();
    document.getElementById('contact-grid').addEventListener('click', e => {
      const card = e.target.closest('[data-contact-id]');
      if (card) showDetail(card.dataset.contactId);
    });
    document.addEventListener('cc-search', renderContacts);
    document.addEventListener('dropdown-change', renderContacts);
  } catch (err) {
    console.error(err);
    window.showToast?.('Failed to load contacts', 4000);
  }
}

function populatePropertySelect() {
  const sel = document.getElementById('f-properties');
  sel.innerHTML = properties.map(p => `<option value="${escAttr(p.id)}">${esc(p.name)} — ${esc(p.location)}</option>`).join('');
}

function renderContacts() {
  const q = (document.getElementById('search').getAttribute('value') || '').toLowerCase();
  const tag = document.getElementById('filter-tag').getAttribute('value') || '';

  let filtered = contacts.filter(c => {
    if (q && !`${c.firstName} ${c.lastName} ${c.company} ${c.email}`.toLowerCase().includes(q)) return false;
    if (tag && !(c.tags || []).includes(tag)) return false;
    return true;
  });

  filtered.sort((a, b) => (a.lastName || '').localeCompare(b.lastName || ''));

  document.getElementById('stats').innerHTML = `
    <div class="stat"><strong>${filtered.length}</strong> contacts</div>
    <div class="stat"><strong>${filtered.filter(c => (c.tags||[]).includes('client')).length}</strong> clients</div>
    <div class="stat"><strong>${filtered.filter(c => (c.associatedProperties||[]).length > 0).length}</strong> with properties</div>
  `;

  const grid = document.getElementById('contact-grid');
  if (filtered.length === 0) {
    grid.innerHTML = '<cc-empty-state icon="👥" message="No contacts yet — click + Add Contact to get started."></cc-empty-state>';
    return;
  }

  grid.innerHTML = filtered.map(c => {
    const propNames = (c.associatedProperties || []).map(pid => {
      const p = properties.find(x => x.id === pid);
      return p ? p.name : pid;
    });
    const lastNote = (c.notes || []).length > 0 ? c.notes[c.notes.length - 1].text : '';
    return `
      <div class="contact-card" data-contact-id="${escAttr(c.id)}">
        <h3>${esc(c.firstName)} ${esc(c.lastName)}</h3>
        <div class="role">${esc(c.role || '')}${c.company ? ` · ${esc(c.company)}` : ''}</div>
        <div class="meta">
          ${(c.tags || []).map(t => `<span class="pill">${esc(t)}</span>`).join('')}
        </div>
        ${propNames.length ? `<div class="props">${propNames.map(n => `<span class="pill" style="font-size:0.75rem;">🏨 ${esc(n)}</span>`).join('')}</div>` : ''}
        ${lastNote ? `<div class="notes-preview">📝 ${esc(lastNote)}</div>` : ''}
      </div>`;
  }).join('');
}

function openAddContact() {
  document.getElementById('contact-modal').setAttribute('title', 'Add Contact');
  document.getElementById('edit-id').value = '';
  document.getElementById('f-first').value = '';
  document.getElementById('f-last').value = '';
  document.getElementById('f-email').value = '';
  document.getElementById('f-phone').value = '';
  document.getElementById('f-company').value = '';
  document.getElementById('f-role').value = '';
  document.getElementById('f-context').value = '';
  document.getElementById('f-tags').selectedIndex = -1;
  document.getElementById('f-properties').selectedIndex = -1;
  document.getElementById('btn-delete').style.display = 'none';
  document.getElementById('contact-modal').setAttribute('title', 'Add Contact');
  document.getElementById('contact-modal').open();
}

function openEditContact(id) {
  const c = contacts.find(x => x.id === id);
  if (!c) return;
  document.getElementById('contact-modal').setAttribute('title', 'Edit Contact');
  document.getElementById('edit-id').value = c.id;
  document.getElementById('f-first').value = c.firstName || '';
  document.getElementById('f-last').value = c.lastName || '';
  document.getElementById('f-email').value = c.email || '';
  document.getElementById('f-phone').value = c.phone || '';
  document.getElementById('f-company').value = c.company || '';
  document.getElementById('f-role').value = c.role || '';
  document.getElementById('f-context').value = c.context || '';
  // Set tags
  const tagSel = document.getElementById('f-tags');
  Array.from(tagSel.options).forEach(o => o.selected = (c.tags || []).includes(o.value));
  // Set properties
  const propSel = document.getElementById('f-properties');
  Array.from(propSel.options).forEach(o => o.selected = (c.associatedProperties || []).includes(o.value));
  document.getElementById('btn-delete').style.display = '';
  document.getElementById('contact-modal').setAttribute('title', 'Edit Contact');
  document.getElementById('contact-modal').open();
}

function closeModal() { document.getElementById('contact-modal').close(); }

async function saveContact() {
  const editId = document.getElementById('edit-id').value;
  const firstName = document.getElementById('f-first').value.trim();
  const lastName = document.getElementById('f-last').value.trim();
  if (!firstName && !lastName) { window.showToast?.('Name is required', 3000); return; }

  const tags = Array.from(document.getElementById('f-tags').selectedOptions).map(o => o.value);
  const assocProps = Array.from(document.getElementById('f-properties').selectedOptions).map(o => o.value);

  const data = {
    firstName,
    lastName,
    email: document.getElementById('f-email').value.trim(),
    phone: document.getElementById('f-phone').value.trim(),
    company: document.getElementById('f-company').value.trim(),
    role: document.getElementById('f-role').value.trim(),
    context: document.getElementById('f-context').value.trim(),
    tags,
    associatedProperties: assocProps,
    updatedAt: new Date().toISOString()
  };

  try {
    if (editId) {
      const existing = await db.getContact(editId);
      if (existing) {
        await db.upsertContact({ ...existing, ...data });
      }
    } else {
      data.id = 'contact-' + Date.now();
      data.createdAt = new Date().toISOString();
      data.notes = [];
      await db.upsertContact(data);
    }

    contacts = await db.getContacts();
    closeModal();
    renderContacts();
    window.showToast?.('Contact saved ✅', 2000);
  } catch (err) {
    console.error(err);
    window.showToast?.('Failed to save contact', 4000);
  }
}

async function deleteContact() {
  const editId = document.getElementById('edit-id').value;
  if (!editId || !confirm('Delete this contact?')) return;
  try {
    await db.deleteContact(editId);
    contacts = await db.getContacts();
    closeModal();
    renderContacts();
    window.showToast?.('Contact deleted', 2000);
  } catch (err) {
    console.error(err);
    window.showToast?.('Failed to delete contact', 4000);
  }
}

function showDetail(id) {
  const c = contacts.find(x => x.id === id);
  if (!c) return;
  const propNames = (c.associatedProperties || []).map(pid => {
    const p = properties.find(x => x.id === pid);
    return p ? `<a href="index.html" style="color:var(--accent);" rel="noopener">🏨 ${esc(p.name)}</a>` : esc(pid);
  });

  const modal = document.getElementById('detail-modal');
  modal.setAttribute('title', `${c.firstName} ${c.lastName}`);

  document.getElementById('detail-panel').innerHTML = `
    <div style="color:var(--muted);margin-bottom:16px;">${esc(c.role || '')}${c.company ? ` · ${esc(c.company)}` : ''}</div>
    <div style="margin-bottom:12px;">
      <button class="btn btn-sm" data-edit-id="${escAttr(c.id)}">✏️ Edit</button>
    </div>
    <div class="meta" style="margin-bottom:16px;">
      ${(c.tags || []).map(t => `<span class="pill">${esc(t)}</span>`).join('')}
    </div>
    ${c.email ? `<div style="margin-bottom:8px;">📧 <a href="mailto:${escAttr(c.email)}" style="color:var(--accent);">${esc(c.email)}</a></div>` : ''}
    ${c.phone ? `<div style="margin-bottom:8px;">📱 ${esc(c.phone)}</div>` : ''}
    ${c.context ? `<div style="margin-bottom:16px;color:var(--muted);font-style:italic;">📍 ${esc(c.context)}</div>` : ''}
    ${propNames.length ? `<div style="margin-bottom:16px;"><h4 style="color:var(--accent);font-size:0.85rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Associated Properties</h4><div class="meta">${propNames.join(' ')}</div></div>` : ''}
    <div style="margin-bottom:16px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <h4 style="color:var(--accent);font-size:0.85rem;text-transform:uppercase;letter-spacing:1px;margin:0;">Notes</h4>
        <button class="btn btn-sm" data-add-note-id="${escAttr(c.id)}">+ Add Note</button>
      </div>
      <div id="notes-list">
        ${(c.notes || []).length === 0 ? '<cc-empty-state icon="📝" message="No notes yet"></cc-empty-state>' :
          (c.notes || []).slice().reverse().map(n => `
            <div class="note-item">
              <div class="note-date">${new Date(n.date).toLocaleDateString('en-US', { timeZone: 'America/Los_Angeles', dateStyle: 'medium' })} ${new Date(n.date).toLocaleTimeString('en-US', { timeZone: 'America/Los_Angeles', timeStyle: 'short' })}</div>
              <div class="note-text">${esc(n.text)}</div>
            </div>`).join('')}
      </div>
    </div>
  `;
  // Wire up edit + add note buttons via data attributes
  const editBtn = document.getElementById('detail-panel').querySelector('[data-edit-id]');
  if (editBtn) editBtn.addEventListener('click', () => { modal.close(); openEditContact(editBtn.dataset.editId); });
  const noteBtn = document.getElementById('detail-panel').querySelector('[data-add-note-id]');
  if (noteBtn) noteBtn.addEventListener('click', () => addNote(noteBtn.dataset.addNoteId));
  modal.open();
}

function closeDetailModal() { document.getElementById('detail-modal').close(); }

async function addNote(contactId) {
  const text = prompt('Add a note:');
  if (!text || !text.trim()) return;
  const c = contacts.find(x => x.id === contactId);
  if (!c) return;
  try {
    if (!c.notes) c.notes = [];
    c.notes.push({ date: new Date().toISOString(), text: text.trim() });
    c.updatedAt = new Date().toISOString();
    await db.upsertContact(c);
    contacts = await db.getContacts();
    showDetail(contactId); // refresh
    window.showToast?.('Note added ✅', 2000);
  } catch (err) {
    console.error(err);
    window.showToast?.('Failed to add note', 4000);
  }
}

// cc-modal handles Escape internally
document.addEventListener('DOMContentLoaded', load);
</script>
</body>
</html>
