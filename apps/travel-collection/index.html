<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f59e0b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.svg">
<title>🏨 Travel Collection — Dominique Debay</title>
<meta name="supabase-url" content="https://lregiwsovpmljxjvrrsc.supabase.co">
<meta name="supabase-key" content="sb_publishable_HPinRWPrX97uxshGM0u1rw_UAsQsyFq">
<link rel="stylesheet" href="https://shared.adam-harris.alphaclaw.app/theme.css">
<script src="https://shared.adam-harris.alphaclaw.app/components/index.js"></script>
    <script src="https://shared.adam-harris.alphaclaw.app/supabase-auth.js"></script>
<style>
  .property-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; padding: 0 24px 40px; }
  .property-card { border-radius: 16px; overflow: hidden; background: var(--glass); border: 1px solid var(--glass-border); backdrop-filter: blur(12px); transition: all .3s; cursor: pointer; }
  .property-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); border-color: var(--accent); }
  .property-card .photo { width: 100%; height: 200px; object-fit: cover; background: var(--glass); display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 3rem; }
  .property-card .photo img { width: 100%; height: 100%; object-fit: cover; }
  .property-card .info { padding: 16px; }
  .property-card .info h3 { font-family: var(--serif); font-size: 1.1rem; margin: 0 0 4px; }
  .property-card .info .loc { color: var(--muted); font-size: 0.85rem; margin-bottom: 8px; }
  .property-card .info .meta { display: flex; gap: 6px; flex-wrap: wrap; }
  .property-card .info .pricing { color: var(--accent); font-weight: 600; font-size: 0.9rem; margin-top: 8px; }
  .filters-bar { display: flex; flex-wrap: wrap; gap: 12px; padding: 0 24px 20px; align-items: center; }
  .section-label { padding: 8px 24px; font-family: var(--serif); font-size: 1.3rem; color: var(--text); margin-top: 16px; }
  .stats-bar { display: flex; gap: 16px; padding: 0 24px 12px; color: var(--muted); font-size: 0.85rem; flex-wrap: wrap; }
  .stats-bar .stat { background: var(--glass); padding: 6px 14px; border-radius: 8px; border: 1px solid var(--glass-border); }
  .stats-bar .stat strong { color: var(--accent); }
  .gallery { display: flex; overflow-x: auto; gap: 2px; background: var(--glass); border-radius: 12px; margin-bottom: 16px; }
  .gallery img { width: 280px; height: 200px; object-fit: cover; flex-shrink: 0; }
  .gallery .no-photos { width: 100%; height: 200px; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 2rem; }
  .detail-body { padding: 0; }
  .detail-loc { color: var(--muted); margin-bottom: 16px; }
  .detail-desc { line-height: 1.7; margin-bottom: 16px; }
  .detail-section { margin-bottom: 16px; }
  .detail-section h4 { color: var(--accent); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .research-badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 6px; background: var(--green); color: #000; font-weight: 600; }
  .pending-badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 6px; background: var(--muted); color: #000; font-weight: 600; }
  @media (max-width: 640px) { .property-grid { grid-template-columns: 1fr; padding: 0 12px 24px; } .filters-bar { padding: 0 12px 12px; } }
</style>
</head>
<body>
<cc-app-nav app="travel-collection" title="Travel Collection" active="properties"></cc-app-nav>
<cc-user-auth mode="gate" allow-signup="false"></cc-user-auth>
<cc-toast></cc-toast>

<cc-page-header icon="🏨" title="Travel Collection" description="Dominique Debay Collection"></cc-page-header>

<div class="filters-bar">
  <cc-search id="search" placeholder="Search properties..."></cc-search>
  <cc-pill-dropdown id="filter-category" label="Category" items='[{"value":"","label":"All Categories"},{"value":"Hotels & Resorts","label":"Hotels & Resorts"},{"value":"Private Retreats & Villas","label":"Private Retreats & Villas"}]' value=""></cc-pill-dropdown>
  <cc-pill-dropdown id="filter-region" label="Region" items='[{"value":"","label":"All Regions"},{"value":"Americas","label":"Americas"},{"value":"Europe","label":"Europe"},{"value":"Asia & Middle East","label":"Asia & Middle East"},{"value":"South Pacific","label":"South Pacific"}]' value=""></cc-pill-dropdown>
  <cc-pill-dropdown id="filter-type" label="Type" items='[{"value":"","label":"All Types"},{"value":"Hotel","label":"Hotel"},{"value":"Resort","label":"Resort"},{"value":"Villa","label":"Villa"},{"value":"Private Island","label":"Private Island"},{"value":"Estate","label":"Estate"},{"value":"Cruise","label":"Cruise"}]' value=""></cc-pill-dropdown>
  <cc-pill-dropdown id="sort-by" label="Sort" items='[{"value":"name","label":"Name"},{"value":"region","label":"Region"},{"value":"category","label":"Category"},{"value":"type","label":"Type"}]' value="name"></cc-pill-dropdown>
</div>

<div class="stats-bar" id="stats"></div>
<div id="content"></div>

<cc-modal id="detail-modal" title="" size="lg">
  <div id="detail-body"></div>
</cc-modal>

<script src="https://shared.adam-harris.alphaclaw.app/supabase-client.js"></script>
<script src="db.js"></script>
<script>
let properties = [];
let db = null;

function esc(s) { const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; }
function escAttr(s) { return (s ?? '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function load() {
  try {
    db = await TravelDB.init();
    properties = await db.getProperties();
    renderProperties();
    document.getElementById('content').addEventListener('click', e => {
      const card = e.target.closest('[data-property-id]');
      if (card) showDetail(card.dataset.propertyId);
    });
    document.addEventListener('cc-search', renderProperties);
    document.addEventListener('dropdown-change', renderProperties);
  } catch (err) {
    console.error(err);
    window.showToast?.('Failed to load properties', 4000);
  }
}

async function renderProperties() {
  const q = (document.getElementById('search').getAttribute('value') || '').toLowerCase();
  const cat = document.getElementById('filter-category').getAttribute('value') || '';
  const region = document.getElementById('filter-region').getAttribute('value') || '';
  const type = document.getElementById('filter-type').getAttribute('value') || '';
  const sort = document.getElementById('sort-by').getAttribute('value') || 'name';

  let filtered = db ? await db.getProperties({ search: q || undefined, category: cat || undefined, region: region || undefined, type: type || undefined, sort }) : [];

  const researched = filtered.filter(p => p.researched).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><strong>${filtered.length}</strong> properties</div>
    <div class="stat"><strong>${researched}</strong> researched</div>
    <div class="stat"><strong>${filtered.length - researched}</strong> pending</div>
    <div class="stat"><strong>${new Set(filtered.map(p => p.region)).size}</strong> regions</div>
  `;

  const groups = {};
  filtered.forEach(p => {
    if (!groups[p.category]) groups[p.category] = [];
    groups[p.category].push(p);
  });

  if (filtered.length === 0) {
    document.getElementById('content').innerHTML = '<cc-empty-state icon="🏨" message="No properties match your filters."></cc-empty-state>';
    return;
  }

  let html = '';
  for (const [cat, items] of Object.entries(groups)) {
    html += `<div class="section-label">${esc(cat)} <span style="color:var(--muted);font-size:0.85rem;">(${items.length})</span></div>`;
    html += '<div class="property-grid">';
    items.forEach(p => {
      const photoHtml = p.photos && p.photos.length > 0
        ? `<img src="${escAttr(p.photos[0])}" alt="${escAttr(p.name)}" loading="lazy">`
        : getPlaceholderEmoji(p.type);
      html += `
        <div class="property-card" data-property-id="${escAttr(p.id)}">
          <div class="photo">${photoHtml}</div>
          <div class="info">
            <h3>${esc(p.name)}</h3>
            <div class="loc">📍 ${esc(p.location)}</div>
            <div class="meta">
              <cc-pill-list items='${escAttr(JSON.stringify([p.type, p.region]))}'></cc-pill-list>
              ${p.researched ? '<span class="research-badge">✓ Researched</span>' : '<span class="pending-badge">Pending</span>'}
            </div>
            ${p.pricing ? `<div class="pricing">${esc(p.pricing)}</div>` : ''}
          </div>
        </div>`;
    });
    html += '</div>';
  }
  document.getElementById('content').innerHTML = html;
}

function getPlaceholderEmoji(type) {
  const map = { 'Hotel': '🏨', 'Resort': '🌴', 'Villa': '🏡', 'Private Island': '🏝️', 'Estate': '🏰', 'Cruise': '🚢' };
  return map[type] || '🏨';
}

function showDetail(id) {
  const p = properties.find(x => x.id === id);
  if (!p) return;

  const modal = document.getElementById('detail-modal');
  modal.setAttribute('title', p.name);

  const galleryHtml = p.photos && p.photos.length > 0
    ? p.photos.map(url => `<img src="${escAttr(url)}" alt="${escAttr(p.name)}" loading="lazy">`).join('')
    : `<div class="no-photos">${getPlaceholderEmoji(p.type)}</div>`;

  document.getElementById('detail-body').innerHTML = `
    <div class="gallery">${galleryHtml}</div>
    <div class="detail-body">
      <div class="detail-loc">📍 ${esc(p.location)} · ${esc(p.region)}</div>
      <div class="meta" style="margin-bottom:16px;">
        <cc-pill-list items='${escAttr(JSON.stringify([p.category, p.type]))}'></cc-pill-list>
        ${p.researched ? '<span class="research-badge">✓ Researched</span>' : '<span class="pending-badge">Pending Research</span>'}
      </div>
      ${p.description ? `<div class="detail-desc">${esc(p.description)}</div>` : '<div class="detail-desc text-muted">Research pending...</div>'}
      ${p.website ? `<div class="detail-section"><h4>Website</h4><a href="${escAttr(p.website)}" target="_blank" rel="noopener" style="color:var(--accent)">${esc(p.website)}</a></div>` : ''}
      ${p.pricing ? `<div class="detail-section"><h4>Pricing</h4><div style="color:var(--accent);font-weight:600;">${esc(p.pricing)}</div></div>` : ''}
      ${p.amenities && p.amenities.length ? `<div class="detail-section"><h4>Amenities</h4><cc-pill-list items='${escAttr(JSON.stringify(p.amenities))}'></cc-pill-list></div>` : ''}
      ${p.highlights && p.highlights.length ? `<div class="detail-section"><h4>Highlights</h4><ul style="color:var(--text);line-height:1.8;padding-left:20px;">${p.highlights.map(h => `<li>${esc(h)}</li>`).join('')}</ul></div>` : ''}
      ${p.tags && p.tags.length ? `<div class="detail-section"><h4>Tags</h4><cc-pill-list items='${escAttr(JSON.stringify(p.tags))}'></cc-pill-list></div>` : ''}
      ${p.rating ? `<div class="detail-section"><h4>Rating</h4><cc-star-rating value="${p.rating}" label></cc-star-rating></div>` : ''}
    </div>
  `;
  modal.open();
}

document.addEventListener('DOMContentLoaded', load);
</script>
</body>
</html>
