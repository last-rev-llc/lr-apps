<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#eab308">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.svg">
<title>⚡ Alpha Wins</title>
<link rel="stylesheet" href="https://shared.adam-harris.alphaclaw.app/theme.css">
<style>
  .wins-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:16px; padding:0 24px 24px; }
  .win-card { cursor:pointer; transition:transform .15s,box-shadow .15s; }
  .win-card:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(0,0,0,.3); }
  .card-top { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .card-icon { font-size:1.6rem; }
  .card-title { font-family:var(--serif); font-size:1rem; font-weight:700; color:var(--text); flex:1; }
  .card-desc { color:var(--muted); font-size:.875rem; line-height:1.6; margin-bottom:12px; }
  .card-tags { display:flex; gap:6px; flex-wrap:wrap; }
  .int-badge { background:color-mix(in srgb, var(--accent) 15%, transparent); color:var(--accent); padding:2px 8px; border-radius:6px; font-size:11px; font-weight:600; }
  .skill-badge { background:color-mix(in srgb, var(--blue) 15%, transparent); color:var(--blue); padding:2px 8px; border-radius:6px; font-size:11px; font-weight:600; }
  .tag { background:var(--glass-bg, rgba(255,255,255,.06)); color:var(--muted); padding:2px 8px; border-radius:6px; font-size:11px; }
  /* page-header styles removed — using cc-page-header */
  .filters { padding:0 24px 16px; display:flex; flex-direction:column; gap:10px; }
  .filter-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .prompt-block { background:var(--surface, rgba(0,0,0,.3)); border:1px solid var(--border); border-radius:10px; padding:16px; font-family:var(--font-mono,'monospace'); font-size:13px; color:var(--muted); white-space:pre-wrap; line-height:1.6; }
  .how-step { display:flex; gap:10px; margin-bottom:8px; color:var(--muted); font-size:.9rem; line-height:1.5; }
  .how-num { background:var(--accent); color:#000; width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex-shrink:0; margin-top:1px; }
  .section-label { color:var(--accent); font-size:.8rem; text-transform:uppercase; letter-spacing:1px; font-weight:600; margin-bottom:8px; }
  .copy-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .empty-state { text-align:center; padding:60px 20px; color:var(--muted); font-size:1rem; }
  .date-badge { color:var(--muted); font-size:11px; margin-left:auto; white-space:nowrap; }
  @media(max-width:768px) {
    .wins-grid { grid-template-columns:1fr; padding:0 16px 16px; }
    cc-page-header, .filters { padding-left:16px; padding-right:16px; }
    .filter-row .search { width:100%; flex:1; }
  }
</style>
</head>
<body>
<cc-app-nav app="alpha-wins" title="Alpha Wins" active="index"></cc-app-nav>
<cc-toast></cc-toast>

<cc-page-header icon="⚡" title="Alpha Wins" description="Recent wins & accomplishments">
  <span class="count" id="count"></span>
</cc-page-header>

<div class="filters">
  <div class="filter-row">
    <cc-search id="search" placeholder="Search wins…" style="flex:1;min-width:200px;"></cc-search>
  </div>
  <div class="filter-row" id="integration-filters">
    <cc-pill-dropdown id="int-filter" label="Integration" value="All"></cc-pill-dropdown>
  </div>
</div>

<div class="wins-grid" id="grid"></div>
<cc-empty-state id="empty" style="display:none" message="No wins match that filter" icon="🔍"></cc-empty-state>

<cc-modal id="win-modal" title="" size="lg"></cc-modal>

<script src="https://shared.adam-harris.alphaclaw.app/components/index.js"></script>
<script src="https://shared.adam-harris.alphaclaw.app/supabase-auth.js"></script>
<script>
(async () => {
  let wins = [];
  try {
    const resp = await fetch('data/wins.json');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    wins = await resp.json();
  } catch (err) {
    console.error('Failed to load wins:', err);
    window.showToast?.('Failed to load wins data', 4000);
  }
  let activeIntegration = 'All';
  let searchQuery = '';

  const searchEl = document.getElementById('search');
  const gridEl = document.getElementById('grid');
  const countEl = document.getElementById('count');
  const emptyEl = document.getElementById('empty');
  const intFilter = document.getElementById('int-filter');
  const modal = document.getElementById('win-modal');

  // Build integration filter dropdown
  const allIntegrations = [...new Set(wins.flatMap(w => w.integrations || []))];
  const intItems = [{ value: 'All', label: 'All' }, ...allIntegrations.map(i => ({ value: i, label: i }))];
  intFilter.setAttribute('items', JSON.stringify(intItems));

  intFilter.addEventListener('dropdown-change', (e) => { activeIntegration = e.detail.value; render(); });

  function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function escAttr(s) { return (s ?? '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function formatDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function render() {
    const q = searchQuery.toLowerCase();
    let filtered = wins;
    if (activeIntegration !== 'All') filtered = filtered.filter(w => (w.integrations || []).includes(activeIntegration));
    if (q) filtered = filtered.filter(w =>
      w.name.toLowerCase().includes(q) ||
      (w.description || '').toLowerCase().includes(q) ||
      (w.tags || []).some(t => t.toLowerCase().includes(q)) ||
      (w.integrations || []).some(i => i.toLowerCase().includes(q)) ||
      (w.skills || []).some(s => s.toLowerCase().includes(q))
    );

    countEl.textContent = filtered.length + ' win' + (filtered.length !== 1 ? 's' : '');
    emptyEl.style.display = filtered.length ? 'none' : '';

    gridEl.innerHTML = filtered.map(w => `
      <div class="card win-card" data-id="${escAttr(w.id)}">
        <div class="card-top">
          <span class="card-icon">${esc(w.icon)}</span>
          <span class="card-title">${esc(w.name)}</span>
          <span class="date-badge">${formatDate(w.postedAt)}</span>
        </div>
        <div class="card-desc">${esc(w.description)}</div>
        <div class="card-tags">
          ${(w.integrations || []).map(x => `<span class="int-badge">${esc(x)}</span>`).join('')}
          ${(w.skills || []).map(x => `<span class="skill-badge">${esc(x)}</span>`).join('')}
          ${(w.tags || []).map(x => `<span class="tag">${esc(x)}</span>`).join('')}
        </div>
      </div>
    `).join('');

    gridEl.querySelectorAll('.win-card').forEach(card => {
      card.addEventListener('click', () => openDetail(card.dataset.id));
    });

  }

  function openDetail(id) {
    const w = wins.find(x => x.id === id);
    if (!w) return;

    modal.setAttribute('title', `${w.icon} ${w.name}`);
    const h2 = modal.querySelector('.cc-modal-header h2');
    if (h2) h2.textContent = `${w.icon} ${w.name}`;

    const body = modal.querySelector('.cc-modal-body');
    if (!body) return;

    body.innerHTML = `
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:16px;">
        ${(w.integrations || []).map(x => `<span class="int-badge">${esc(x)}</span>`).join('')}
        ${(w.skills || []).map(x => `<span class="skill-badge">${esc(x)}</span>`).join('')}
        ${(w.tags || []).map(x => `<span class="tag">${esc(x)}</span>`).join('')}
        <span class="date-badge">${formatDate(w.postedAt)}</span>
      </div>

      <div style="color:var(--text);line-height:1.7;margin-bottom:20px;">${esc(w.description)}</div>

      ${(w.howItWorks || []).length ? `
        <div style="margin-bottom:20px;">
          <div class="section-label">How it works</div>
          ${w.howItWorks.map((step, i) => `
            <div class="how-step">
              <span class="how-num">${i + 1}</span>
              <span>${esc(step)}</span>
            </div>
          `).join('')}
        </div>` : ''}

      ${(w.integrations || []).length ? `
        <div style="margin-bottom:16px;">
          <div class="section-label">Required Integrations</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;">${w.integrations.map(x => `<span class="pill">${esc(x)}</span>`).join('')}</div>
        </div>` : ''}

      ${(w.skills || []).length ? `
        <div style="margin-bottom:16px;">
          <div class="section-label">Skills</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;">${w.skills.map(x => `<span class="pill">${esc(x)}</span>`).join('')}</div>
        </div>` : ''}

      <div>
        <div class="copy-row">
          <div class="section-label" style="margin-bottom:0;">Setup Prompt</div>
          <button class="btn btn-sm" id="modal-copy-btn">📋 Copy Prompt</button>
        </div>
        <div class="prompt-block">${esc(w.prompt || 'No prompt available.')}</div>
      </div>
    `;

    const copyBtn = body.querySelector('#modal-copy-btn');
    if (copyBtn) {
      copyBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        navigator.clipboard.writeText(w.prompt || '').then(() => {
          copyBtn.textContent = '✅ Copied!';
          setTimeout(() => { copyBtn.textContent = '📋 Copy Prompt'; }, 2000);
          window.showToast && window.showToast('Prompt copied to clipboard!');
        });
      });
    }

    modal.open();
  }

  searchEl.addEventListener('cc-search', (e) => { searchQuery = e.detail.value; render(); });

  render();
})();
</script>
</body>
</html>
