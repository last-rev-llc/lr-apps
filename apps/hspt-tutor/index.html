<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f59e0b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <title>🎯 HSPT Tutor</title>
  <link rel="stylesheet" href="https://shared.adam-harris.alphaclaw.app/theme.css">
  <script src="https://shared.adam-harris.alphaclaw.app/components/index.js"></script>
    <script src="https://shared.adam-harris.alphaclaw.app/supabase-auth.js"></script>
  <style>
    /* Section cards grid */
    .sections-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:16px; margin-bottom:24px; }

    /* Progress ring */
    .ring-wrap { display:flex; align-items:center; gap:16px; }
    .ring-svg { width:64px; height:64px; transform:rotate(-90deg); }
    .ring-bg { fill:none; stroke:var(--border); stroke-width:6; }
    .ring-fg { fill:none; stroke-width:6; stroke-linecap:round; transition:stroke-dashoffset .6s ease; }
    .ring-label { font-size:13px; color:var(--muted); }
    .ring-pct { font-size:22px; font-weight:700; }

    /* Sub-topic bars */
    .subtopic { margin:8px 0; }
    .subtopic-label { display:flex; justify-content:space-between; font-size:12px; margin-bottom:4px; }
    .subtopic-bar { height:8px; border-radius:4px; background:var(--border); overflow:hidden; }
    .subtopic-fill { height:100%; border-radius:4px; transition:width .5s ease; }

    /* Quiz */
    .quiz-container { max-width:640px; margin:0 auto; }
    .quiz-progress { display:flex; gap:4px; margin-bottom:20px; }
    .quiz-dot { width:28px; height:6px; border-radius:3px; background:var(--border); transition:background .3s; }
    .quiz-dot.done-correct { background:var(--green); }
    .quiz-dot.done-wrong { background:var(--red); }
    .quiz-dot.current { background:var(--accent); }
    .choice-btn {
      display:block; width:100%; text-align:left; padding:14px 18px; margin:8px 0;
      border-radius:12px; border:1px solid var(--border); background:var(--glass);
      color:var(--text); cursor:pointer; font-size:15px; transition:all .2s; font-family:inherit;
    }
    .choice-btn:hover:not(:disabled) { background:var(--glass-hover); border-color:var(--accent); }
    .choice-btn.correct { background:rgba(16,185,129,0.2); border-color:var(--green); }
    .choice-btn.wrong { background:rgba(248,113,113,0.2); border-color:var(--red); }
    .choice-btn:disabled { cursor:default; opacity:0.8; }
    .feedback-box {
      margin:16px 0; padding:14px 18px; border-radius:12px; font-size:14px; line-height:1.6;
    }
    .feedback-box.correct { background:rgba(16,185,129,0.1); border:1px solid var(--green); }
    .feedback-box.wrong { background:rgba(248,113,113,0.1); border:1px solid var(--red); }
    .next-btn {
      margin-top:16px; padding:12px 32px; border-radius:12px; border:none;
      background:var(--accent-grad); color:#000; font-weight:600; font-size:15px;
      cursor:pointer; font-family:inherit;
    }
    .next-btn:hover { opacity:0.9; }

    /* Readiness meter */
    .readiness { text-align:center; margin:24px 0; }
    .readiness-score { font-size:56px; font-weight:800; }
    .readiness-label { font-size:14px; color:var(--muted); margin-top:4px; }

    /* Mastery badges */
    .badges-grid { display:flex; flex-wrap:wrap; gap:10px; margin-top:12px; }
    .mastery-badge {
      padding:6px 14px; border-radius:99px; font-size:12px; font-weight:600;
      background:rgba(16,185,129,0.15); border:1px solid var(--green); color:var(--green);
    }

    /* Trend mini chart (sparkline via inline SVG) */
    .trend-row { display:flex; align-items:center; gap:12px; padding:8px 0; border-bottom:1px solid var(--border); }
    .trend-row:last-child { border-bottom:none; }
    .trend-topic { flex:1; font-size:13px; }
    .trend-spark { width:80px; height:24px; }
    .trend-spark polyline { fill:none; stroke:var(--accent); stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    .trend-val { font-size:13px; font-weight:600; width:40px; text-align:right; }

    /* Start quiz panel */
    .start-quiz-panel { text-align:center; padding:32px 16px; }
    .start-quiz-panel p { color:var(--muted); margin:12px 0 24px; font-size:14px; }
    .big-btn {
      padding:16px 40px; border-radius:16px; border:none; background:var(--accent-grad);
      color:#000; font-weight:700; font-size:18px; cursor:pointer; font-family:inherit;
      transition:transform .15s;
    }
    .big-btn:hover { transform:scale(1.03); }

    .encourage { font-size:15px; color:var(--accent); font-weight:600; margin:8px 0; }

    @media (max-width:600px) {
      body { padding:12px; }
      .sections-grid { grid-template-columns:1fr; }
      .tab-btn { padding:8px 12px; font-size:13px; }
    }
  </style>
</head>
<body>
  <cc-app-nav app="hspt-tutor" title="🎯 HSPT Tutor" active="home"></cc-app-nav>
  <cc-user-auth mode="gate" allow-signup="false"></cc-user-auth>
  <cc-toast></cc-toast>

  <cc-page-header icon="🎯" title="HSPT Tutor" description="High School Placement Test prep">
    <span class="count" id="readiness-mini"></span>
  </cc-page-header>

  <cc-tabs active="dashboard" id="main-tabs">
  <cc-tab name="dashboard" label="📊 Dashboard">
    <div class="readiness">
      <div class="readiness-score" id="overall-score">--</div>
      <div class="readiness-label">Overall Readiness</div>
      <div class="encourage" id="encourage-msg"></div>
    </div>
    <div class="sections-grid" id="sections-grid"></div>
  </cc-tab>

  <cc-tab name="quiz" label="⚡ Practice">
    <div class="quiz-container">
      <div id="quiz-start" class="start-quiz-panel">
        <h2>🧠 Ready to level up?</h2>
        <p>We'll pick 10 questions from your weakest areas. Let's crush it!</p>
        <button class="big-btn" onclick="startQuiz()">Practice Weak Areas</button>
      </div>
      <div id="quiz-active" class="panel" style="display:none;">
        <div class="quiz-progress" id="quiz-dots"></div>
        <div id="quiz-question-num" style="font-size:12px;color:var(--muted);margin-bottom:8px;"></div>
        <h3 id="quiz-question" style="margin-bottom:16px;line-height:1.5;"></h3>
        <div id="quiz-choices"></div>
        <div id="quiz-feedback" style="display:none;"></div>
        <button id="quiz-next" class="next-btn" style="display:none;" onclick="nextQuestion()">Next →</button>
      </div>
    </div>
  </cc-tab>

  <cc-tab name="progress" label="📈 Progress">
    <div class="panel" style="margin-bottom:20px;">
      <div class="panel-header">🏅 Mastery Badges</div>
      <div id="badges-container" class="badges-grid">
        <span style="color:var(--muted);font-size:13px;">Keep practicing to earn badges! (85%+ mastery)</span>
      </div>
    </div>
    <div class="panel">
      <div class="panel-header">📈 Topic Trends</div>
      <div id="trends-container"></div>
    </div>
  </cc-tab>
  </cc-tabs>

  <!-- Quiz completion modal -->
  <cc-modal id="quiz-modal" title="Quiz Complete! 🎉" size="md">
    <div id="modal-body" style="text-align:center;padding:8px 0;"></div>
    <div slot="footer">
      <button class="next-btn" onclick="document.getElementById('quiz-modal').close()">Awesome!</button>
    </div>
  </cc-modal>

  <script src="https://shared.adam-harris.alphaclaw.app/sql-sync.js"></script>
  <script>
    // ── State ──
    let db = null;
    let allResults = [];
    let allQuestions = [];
    let topicStats = {}; // {section/topic: {correct, total, pct}}
    let quizState = null; // {questions, current, answers}
    let quizHistory = []; // stored quiz results

    // ── Escape helper (XSS prevention) ──
    function esc(str) {
      const d = document.createElement('div');
      d.textContent = String(str ?? '');
      return d.innerHTML;
    }

    // ── Init ──
    async function init() {
      db = await SyncDB.init({
        name: 'hspt-tutor',
        tables: {
          results: { columns: 'id TEXT PRIMARY KEY, date TEXT, sections TEXT', jsonFields: ['sections'], file: 'results.json' },
          questions: { columns: 'id TEXT PRIMARY KEY, section TEXT, topic TEXT, question TEXT, choices TEXT, correct TEXT, explanation TEXT', jsonFields: ['choices'], file: 'questions.json' },
          quizzes: { columns: 'id TEXT PRIMARY KEY, date TEXT, score INTEGER, total INTEGER, topics TEXT, answers TEXT', jsonFields: ['topics','answers'], file: 'quizzes.json' },
          progress: { columns: 'id TEXT PRIMARY KEY, section TEXT, topic TEXT, correct INTEGER, total INTEGER, pct REAL, history TEXT', jsonFields: ['history'], file: 'progress.json' }
        }
      });

      allResults = db.all('results');
      allQuestions = db.all('questions');
      quizHistory = db.all('quizzes');

      computeStats();
      renderDashboard();
      renderProgress();
    }

    function computeStats() {
      topicStats = {};
      // From exam results
      for (const exam of allResults) {
        const sections = typeof exam.sections === 'string' ? JSON.parse(exam.sections) : exam.sections;
        for (const [secName, secData] of Object.entries(sections)) {
          if (!secData.questions) continue;
          for (const q of secData.questions) {
            const key = secName + '/' + q.topic;
            if (!topicStats[key]) topicStats[key] = { section: secName, topic: q.topic, correct: 0, total: 0 };
            topicStats[key].total++;
            if (q.correct) topicStats[key].correct++;
          }
        }
      }
      // From quiz history
      for (const quiz of quizHistory) {
        const answers = typeof quiz.answers === 'string' ? JSON.parse(quiz.answers) : quiz.answers;
        if (!answers) continue;
        for (const a of answers) {
          const key = a.section + '/' + a.topic;
          if (!topicStats[key]) topicStats[key] = { section: a.section, topic: a.topic, correct: 0, total: 0 };
          topicStats[key].total++;
          if (a.correct) topicStats[key].correct++;
        }
      }
      // Compute pcts
      for (const s of Object.values(topicStats)) {
        s.pct = s.total > 0 ? Math.round((s.correct / s.total) * 100) : 0;
      }
    }

    function getColor(pct) {
      if (pct >= 75) return 'var(--green)';
      if (pct >= 50) return 'var(--yellow)';
      return 'var(--red)';
    }
    function getEmoji(pct) {
      if (pct >= 75) return '🟢';
      if (pct >= 50) return '🟡';
      return '🔴';
    }

    function renderDashboard() {
      // Group by section
      const sections = {};
      const sectionNames = ['verbal','quantitative','reading','math','language'];
      const sectionLabels = { verbal:'Verbal', quantitative:'Quantitative', reading:'Reading', math:'Math', language:'Language' };
      const sectionEmojis = { verbal:'📖', quantitative:'🔢', reading:'📚', math:'➗', language:'✍️' };

      for (const [key, stat] of Object.entries(topicStats)) {
        if (!sections[stat.section]) sections[stat.section] = { topics: [], correct: 0, total: 0 };
        sections[stat.section].topics.push(stat);
        sections[stat.section].correct += stat.correct;
        sections[stat.section].total += stat.total;
      }

      // Overall
      let totalCorrect = 0, totalAll = 0;
      for (const s of Object.values(sections)) { totalCorrect += s.correct; totalAll += s.total; }
      const overall = totalAll > 0 ? Math.round((totalCorrect / totalAll) * 100) : 0;

      document.getElementById('overall-score').textContent = overall + '%';
      document.getElementById('overall-score').style.color = getColor(overall);
      document.getElementById('readiness-mini').textContent = 'Readiness: ' + overall + '%';

      const msgs = overall >= 85 ? "You're crushing it! 🔥" : overall >= 70 ? "Looking strong! Keep it up! 💪" : overall >= 50 ? "Good progress — let's target those weak spots! 🎯" : "Every practice session makes you stronger! Let's go! 🚀";
      document.getElementById('encourage-msg').textContent = msgs;

      // Section cards
      const grid = document.getElementById('sections-grid');
      grid.innerHTML = '';
      for (const sec of sectionNames) {
        const data = sections[sec];
        if (!data) continue;
        const pct = Math.round((data.correct / data.total) * 100);
        const circumference = 2 * Math.PI * 26;
        const offset = circumference - (pct / 100) * circumference;

        const card = document.createElement('div');
        card.className = 'panel';
        card.innerHTML = `
          <div class="ring-wrap">
            <svg class="ring-svg" viewBox="0 0 64 64">
              <circle class="ring-bg" cx="32" cy="32" r="26"/>
              <circle class="ring-fg" cx="32" cy="32" r="26" stroke="${getColor(pct)}"
                stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"/>
            </svg>
            <div>
              <div class="ring-pct" style="color:${getColor(pct)}">${pct}%</div>
              <div class="ring-label">${esc(sectionEmojis[sec])} ${esc(sectionLabels[sec])}</div>
            </div>
          </div>
          <div style="margin-top:14px;" class="subtopics"></div>
        `;
        const subDiv = card.querySelector('.subtopics');
        data.topics.sort((a,b) => a.pct - b.pct);
        for (const t of data.topics) {
          subDiv.innerHTML += `
            <div class="subtopic">
              <div class="subtopic-label">
                <span>${getEmoji(t.pct)} ${esc(t.topic)}</span>
                <span style="color:${getColor(t.pct)}">${t.pct}%</span>
              </div>
              <div class="subtopic-bar"><div class="subtopic-fill" style="width:${t.pct}%;background:${getColor(t.pct)}"></div></div>
            </div>`;
        }
        grid.appendChild(card);
      }
    }

    // ── Quiz ──
    function startQuiz() {
      // Pick 10 questions from weakest topics
      const weakTopics = Object.values(topicStats).sort((a,b) => a.pct - b.pct);
      const targetTopics = weakTopics.slice(0, 5); // focus on 5 weakest
      const targetKeys = new Set(targetTopics.map(t => t.section + '/' + t.topic));

      let pool = allQuestions.filter(q => targetKeys.has(q.section + '/' + q.topic));
      if (pool.length < 10) pool = [...pool, ...allQuestions.filter(q => !targetKeys.has(q.section + '/' + q.topic))];

      // Shuffle and pick 10
      pool.sort(() => Math.random() - 0.5);
      const selected = pool.slice(0, 10);

      quizState = { questions: selected, current: 0, answers: [] };
      document.getElementById('quiz-start').style.display = 'none';
      document.getElementById('quiz-active').style.display = 'block';
      renderQuestion();
    }

    function renderQuestion() {
      const q = quizState.questions[quizState.current];
      const choices = typeof q.choices === 'string' ? JSON.parse(q.choices) : q.choices;
      const total = quizState.questions.length;

      // Dots
      const dots = document.getElementById('quiz-dots');
      dots.innerHTML = '';
      for (let i = 0; i < total; i++) {
        const cls = i < quizState.current ? (quizState.answers[i]?.correct ? 'done-correct' : 'done-wrong') :
                    i === quizState.current ? 'current' : '';
        dots.innerHTML += `<div class="quiz-dot ${cls}"></div>`;
      }

      document.getElementById('quiz-question-num').textContent = `Question ${quizState.current + 1} of ${total} \u2022 ${q.section} \u2192 ${q.topic}`;
      document.getElementById('quiz-question').textContent = q.question;

      const choicesDiv = document.getElementById('quiz-choices');
      choicesDiv.innerHTML = '';
      for (const c of choices) {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = c;
        btn.onclick = () => selectAnswer(c, q);
        choicesDiv.appendChild(btn);
      }

      document.getElementById('quiz-feedback').style.display = 'none';
      document.getElementById('quiz-next').style.display = 'none';
    }

    function selectAnswer(choice, q) {
      const letter = choice.charAt(0);
      const isCorrect = letter === q.correct;
      quizState.answers.push({ section: q.section, topic: q.topic, correct: isCorrect, userAnswer: letter, correctAnswer: q.correct });

      // Highlight
      const btns = document.querySelectorAll('.choice-btn');
      btns.forEach(b => {
        b.disabled = true;
        if (b.textContent.charAt(0) === q.correct) b.classList.add('correct');
        if (b.textContent === choice && !isCorrect) b.classList.add('wrong');
      });

      // Feedback
      const fb = document.getElementById('quiz-feedback');
      fb.style.display = 'block';
      fb.className = 'feedback-box ' + (isCorrect ? 'correct' : 'wrong');
      fb.innerHTML = isCorrect
        ? `<strong>✅ Correct!</strong> ${esc(q.explanation)}`
        : `<strong>❌ Not quite.</strong> The answer is <strong>${esc(q.correct)}</strong>. ${esc(q.explanation)}`;

      document.getElementById('quiz-next').style.display = 'inline-block';
      document.getElementById('quiz-next').textContent = quizState.current === quizState.questions.length - 1 ? 'See Results 🎉' : 'Next →';

      // Update dot
      const dots = document.querySelectorAll('.quiz-dot');
      if (dots[quizState.current]) {
        dots[quizState.current].className = 'quiz-dot ' + (isCorrect ? 'done-correct' : 'done-wrong');
      }
    }

    function nextQuestion() {
      quizState.current++;
      if (quizState.current >= quizState.questions.length) {
        finishQuiz();
        return;
      }
      renderQuestion();
    }

    function finishQuiz() {
      const score = quizState.answers.filter(a => a.correct).length;
      const total = quizState.answers.length;
      const pct = Math.round((score / total) * 100);

      // Save quiz
      const quizRecord = {
        id: 'quiz-' + Date.now(),
        date: new Date().toISOString().split('T')[0],
        score, total,
        topics: [...new Set(quizState.answers.map(a => a.section + '/' + a.topic))],
        answers: quizState.answers
      };
      db.upsert('quizzes', quizRecord);
      quizHistory = db.all('quizzes');

      // Recompute
      computeStats();
      renderDashboard();
      renderProgress();

      // Show modal
      const emoji = pct >= 80 ? '🔥' : pct >= 60 ? '💪' : '📈';
      const msg = pct >= 80 ? "Outstanding work!" : pct >= 60 ? "Nice job! You're getting stronger!" : "Keep at it — you're learning every time!";

      const topicBreakdown = {};
      for (const a of quizState.answers) {
        const k = a.topic;
        if (!topicBreakdown[k]) topicBreakdown[k] = { c: 0, t: 0 };
        topicBreakdown[k].t++;
        if (a.correct) topicBreakdown[k].c++;
      }
      let breakdownHtml = '<div style="text-align:left;margin-top:16px;">';
      for (const [topic, d] of Object.entries(topicBreakdown)) {
        const p = Math.round((d.c / d.t) * 100);
        breakdownHtml += `<div class="subtopic"><div class="subtopic-label"><span>${getEmoji(p)} ${esc(topic)}</span><span>${d.c}/${d.t}</span></div>
          <div class="subtopic-bar"><div class="subtopic-fill" style="width:${p}%;background:${getColor(p)}"></div></div></div>`;
      }
      breakdownHtml += '</div>';

      document.getElementById('modal-body').innerHTML = `
        <div style="font-size:48px;margin:8px 0;">${emoji}</div>
        <div style="font-size:36px;font-weight:800;color:${getColor(pct)}">${score}/${total}</div>
        <div style="color:var(--muted);margin:8px 0;">${msg}</div>
        ${breakdownHtml}
      `;
      document.getElementById('quiz-modal').open();

      // Reset quiz UI
      document.getElementById('quiz-active').style.display = 'none';
      document.getElementById('quiz-start').style.display = 'block';
      quizState = null;
    }

    // ── Progress ──
    function renderProgress() {
      // Badges
      const badgesEl = document.getElementById('badges-container');
      const mastered = Object.values(topicStats).filter(t => t.pct >= 85);
      if (mastered.length > 0) {
        badgesEl.innerHTML = mastered.map(t =>
          `<span class="mastery-badge">🏅 ${esc(t.topic)} (${t.pct}%)</span>`
        ).join('');
      } else {
        badgesEl.innerHTML = '<cc-empty-state message="Keep practicing to earn badges! (85%+ mastery)" icon="🏅" animation="sparkle"></cc-empty-state>';
      }

      // Trends — show per-quiz scores per topic
      const trendsEl = document.getElementById('trends-container');
      trendsEl.innerHTML = '';

      // Build topic history from quiz results
      const topicHistory = {};
      for (const quiz of quizHistory) {
        const answers = typeof quiz.answers === 'string' ? JSON.parse(quiz.answers) : quiz.answers;
        if (!answers) continue;
        const quizTopics = {};
        for (const a of answers) {
          const k = a.section + '/' + a.topic;
          if (!quizTopics[k]) quizTopics[k] = { c: 0, t: 0 };
          quizTopics[k].t++;
          if (a.correct) quizTopics[k].c++;
        }
        for (const [k, v] of Object.entries(quizTopics)) {
          if (!topicHistory[k]) topicHistory[k] = [];
          topicHistory[k].push(Math.round((v.c / v.t) * 100));
        }
      }

      // Show all topics with current stats + sparkline if quiz data exists
      const sorted = Object.entries(topicStats).sort((a,b) => a[1].pct - b[1].pct);
      for (const [key, stat] of sorted) {
        const history = topicHistory[key] || [];
        const row = document.createElement('div');
        row.className = 'trend-row';

        let sparkHtml = '';
        if (history.length >= 2) {
          const pts = history.map((v, i) => {
            const x = (i / (history.length - 1)) * 76 + 2;
            const y = 22 - (v / 100) * 20;
            return `${x},${y}`;
          }).join(' ');
          sparkHtml = `<svg class="trend-spark" viewBox="0 0 80 24"><polyline points="${pts}"/></svg>`;
        }

        row.innerHTML = `
          <span class="trend-topic">${getEmoji(stat.pct)} ${esc(stat.section)} → ${esc(stat.topic)}</span>
          ${sparkHtml}
          <span class="trend-val" style="color:${getColor(stat.pct)}">${stat.pct}%</span>
        `;
        trendsEl.appendChild(row);
      }

      if (sorted.length === 0) {
        trendsEl.innerHTML = '<cc-empty-state message="Take some quizzes to see your progress!" icon="📈" animation="sparkle"></cc-empty-state>';
      }
    }

    init().catch(console.error);
  </script>
</body>
</html>
