<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f59e0b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.svg">
<title>⚔️ Slang Battle — GenAlpha</title>
<meta name="supabase-url" content="https://lregiwsovpmljxjvrrsc.supabase.co">
<meta name="supabase-key" content="sb_publishable_HPinRWPrX97uxshGM0u1rw_UAsQsyFq">
<script src="https://shared.adam-harris.alphaclaw.app/supabase-client.js"></script>
<link rel="stylesheet" href="https://shared.adam-harris.alphaclaw.app/theme.css">
<script src="https://shared.adam-harris.alphaclaw.app/components/index.js"></script>
<style>
  :root { --amber: var(--accent, #f59e0b); --amber-dim: rgba(245,158,11,.15); --vs-red: var(--danger, var(--red, #ef4444)); --vs-blue: var(--info, var(--blue, #3b82f6)); }
  body { margin: 0; padding: 0; min-height: 100vh; background: var(--bg, #0a0a0a); color: var(--text, #e5e5e5); font-family: system-ui, -apple-system, sans-serif; }
  .battle-wrap { max-width: 600px; margin: 0 auto; padding: 1rem; }
  .battle-header { text-align: center; margin: 1.5rem 0; }
  .battle-header h1 { font-size: 1.8rem; margin: 0; }
  .battle-header p { color: var(--muted, #888); margin: .5rem 0 0; }

  .arena { position: relative; margin: 2rem 0; }
  .vs-badge { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 2; background: var(--amber); color: #000; font-weight: 900; font-size: 1.2rem; width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(245,158,11,.5); }

  .fighter { border: 2px solid var(--border, #333); border-radius: 12px; padding: 1.5rem; cursor: pointer; transition: all .2s; position: relative; overflow: hidden; }
  .fighter:hover { transform: scale(1.02); }
  .fighter.a { background: linear-gradient(135deg, rgba(239,68,68,.08), transparent); border-color: var(--vs-red); margin-bottom: .75rem; }
  .fighter.b { background: linear-gradient(135deg, rgba(59,130,246,.08), transparent); border-color: var(--vs-blue); margin-top: .75rem; }
  .fighter.voted { opacity: .7; pointer-events: none; }
  .fighter.winner { border-width: 3px; box-shadow: 0 0 20px rgba(245,158,11,.3); transform: scale(1.02); }

  .fighter-term { font-size: 1.5rem; font-weight: 800; margin: 0 0 .5rem; }
  .fighter.a .fighter-term { color: var(--vs-red); }
  .fighter.b .fighter-term { color: var(--vs-blue); }
  .fighter-def { color: var(--muted, #aaa); font-size: .95rem; line-height: 1.4; }

  .vote-bar { margin-top: 1rem; height: 8px; border-radius: 4px; background: var(--border, #333); overflow: hidden; display: none; }
  .voted .vote-bar { display: block; }
  .vote-bar-fill { height: 100%; border-radius: 4px; transition: width .6s ease; }
  .fighter.a .vote-bar-fill { background: var(--vs-red); }
  .fighter.b .vote-bar-fill { background: var(--vs-blue); }
  .vote-pct { display: none; font-size: .85rem; font-weight: 700; margin-top: .4rem; }
  .voted .vote-pct { display: block; }

  .battle-nav { display: flex; justify-content: center; gap: 1rem; margin: 1.5rem 0; }
  .battle-nav button { background: var(--amber-dim); border: 1px solid var(--amber); color: var(--amber); padding: .6rem 1.5rem; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all .2s; }
  .battle-nav button:hover { background: var(--amber); color: #000; }
  .battle-nav button:disabled { opacity: .3; cursor: default; }

  .leaderboard { margin: 2rem 0; }
  .leaderboard h2 { font-size: 1.2rem; margin: 0 0 1rem; text-align: center; }
  .lb-row { display: flex; align-items: center; gap: .75rem; padding: .75rem 1rem; border-radius: 8px; background: var(--card-bg, rgba(255,255,255,.04)); margin-bottom: .5rem; }
  .lb-rank { font-weight: 900; font-size: 1.1rem; min-width: 28px; color: var(--amber); }
  .lb-term { font-weight: 700; flex: 1; }
  .lb-wins { font-size: .85rem; color: var(--muted, #888); }
  .lb-bar { width: 60px; height: 6px; border-radius: 3px; background: var(--border, #333); overflow: hidden; }
  .lb-bar-fill { height: 100%; background: var(--amber); border-radius: 3px; }

</style>
</head>
<body>
<cc-app-nav app="gen-alpha" title="🧠 GenAlpha" active="battle"></cc-app-nav>
<cc-auth></cc-auth>
<cc-toast></cc-toast>

<div class="battle-wrap">
  <div class="battle-header">
    <h1>⚔️ Slang Battle</h1>
    <p>Which predicted term will actually catch on? You decide.</p>
  </div>

  <cc-tabs active="battle" no-url>
    <cc-tab name="battle" label="⚔️ Battle">
    <cc-fade-in>
    <div class="arena" id="arena">
      <div class="fighter a" id="fighter-a">
        <div class="fighter-term" id="term-a"></div>
        <div class="fighter-def" id="def-a"></div>
        <div class="vote-bar"><div class="vote-bar-fill" id="bar-a"></div></div>
        <div class="vote-pct" id="pct-a"></div>
      </div>
      <div class="vs-badge">VS</div>
      <div class="fighter b" id="fighter-b">
        <div class="fighter-term" id="term-b"></div>
        <div class="fighter-def" id="def-b"></div>
        <div class="vote-bar"><div class="vote-bar-fill" id="bar-b"></div></div>
        <div class="vote-pct" id="pct-b"></div>
      </div>
    </div>
    </cc-fade-in>
    <div class="battle-nav">
      <button id="btn-prev" disabled>← Prev</button>
      <button id="btn-skip">Skip →</button>
    </div>

    </cc-tab>
    <cc-tab name="leaderboard" label="🏆 Leaderboard">
      <div class="leaderboard">
        <h2>🏆 Most Likely to Catch On</h2>
        <div id="lb-list"></div>
      </div>
    </cc-tab>
  </cc-tabs>
</div>

<script>
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
(async () => {
  const sb = window.supabase;
  const VOTER_ID = localStorage.getItem('battle_voter') || (() => { const id = crypto.randomUUID(); localStorage.setItem('battle_voter', id); return id; })();

  let battles = [];
  let idx = 0;
  let myVotes = {};

  // Load battles + my votes
  async function load() {
    battles = await sb.select('slang_battles', { filters: { active: 'eq.true' }, order: 'created_at.asc' });
    const votes = await sb.select('slang_battle_votes', { filters: { voter_id: `eq.${VOTER_ID}` } });
    myVotes = {};
    votes.forEach(v => myVotes[v.battle_id] = v.voted_for);
  }

  function render() {
    if (!battles.length) { document.getElementById('arena').innerHTML = '<cc-empty-state message="No battles yet — check back soon!" icon="⚔️"></cc-empty-state>'; return; }
    const b = battles[idx];
    document.getElementById('term-a').textContent = b.term_a;
    document.getElementById('def-a').textContent = b.definition_a || '';
    document.getElementById('term-b').textContent = b.term_b;
    document.getElementById('def-b').textContent = b.definition_b || '';

    const fa = document.getElementById('fighter-a');
    const fb = document.getElementById('fighter-b');
    const voted = myVotes[b.id];

    fa.classList.toggle('voted', !!voted);
    fb.classList.toggle('voted', !!voted);
    fa.classList.toggle('winner', voted === 'a');
    fb.classList.toggle('winner', voted === 'b');

    const total = b.votes_a + b.votes_b || 1;
    const pctA = Math.round(b.votes_a / total * 100);
    const pctB = Math.round(b.votes_b / total * 100);
    document.getElementById('bar-a').style.width = pctA + '%';
    document.getElementById('bar-b').style.width = pctB + '%';
    document.getElementById('pct-a').textContent = voted ? `${pctA}% (${b.votes_a} votes)` : '';
    document.getElementById('pct-b').textContent = voted ? `${pctB}% (${b.votes_b} votes)` : '';

    document.getElementById('btn-prev').disabled = idx === 0;
    document.getElementById('btn-skip').textContent = idx < battles.length - 1 ? 'Skip →' : 'Done ✓';
  }

  async function vote(side) {
    const b = battles[idx];
    if (myVotes[b.id]) return;

    myVotes[b.id] = side;
    const col = side === 'a' ? 'votes_a' : 'votes_b';

    // Optimistic update
    if (side === 'a') b.votes_a++; else b.votes_b++;
    render();

    try {
      await sb.insert('slang_battle_votes', { battle_id: b.id, voted_for: side, voter_id: VOTER_ID });
      // Increment vote count via raw PATCH with computed value
      const updated = await sb.select('slang_battles', { filters: { id: `eq.${b.id}` }, limit: 1 });
      if (updated[0]) { b.votes_a = updated[0].votes_a; b.votes_b = updated[0].votes_b; }

      // Update server-side count
      const patch = {};
      patch[col] = (side === 'a' ? b.votes_a : b.votes_b);
      await sb.update('slang_battles', patch, { id: `eq.${b.id}` });
    } catch(e) { console.error('Vote failed', e); }

    render();
    window.showToast?.('Vote recorded! ⚔️', 3000);

    // Auto-advance after 1.5s
    setTimeout(() => { if (idx < battles.length - 1) { idx++; render(); } }, 1500);
  }

  // Build leaderboard
  async function renderLeaderboard() {
    const all = await sb.select('slang_battles', { order: 'created_at.asc' });
    // Build term win map
    const terms = {};
    all.forEach(b => {
      [['a', b.term_a, b.votes_a, b.votes_b], ['b', b.term_b, b.votes_b, b.votes_a]].forEach(([side, term, wins, losses]) => {
        if (!terms[term]) terms[term] = { wins: 0, losses: 0, total: 0 };
        terms[term].wins += wins;
        terms[term].losses += losses;
        terms[term].total += wins + losses;
      });
    });

    const sorted = Object.entries(terms).sort((a, b) => b[1].wins - a[1].wins);
    const maxWins = sorted[0]?.[1].wins || 1;
    const list = document.getElementById('lb-list');

    if (!sorted.length) { list.innerHTML = '<cc-empty-state message="No votes yet!" icon="🏆"></cc-empty-state>'; return; }

    list.innerHTML = sorted.map(([term, s], i) => `
      <div class="lb-row">
        <div class="lb-rank">${i < 3 ? ['🥇','🥈','🥉'][i] : '#' + (i+1)}</div>
        <div class="lb-term">${esc(term)}</div>
        <div class="lb-bar"><div class="lb-bar-fill" style="width:${Math.round(s.wins/maxWins*100)}%"></div></div>
        <div class="lb-wins">${s.wins}W / ${s.losses}L</div>
      </div>
    `).join('');
  }

  // Events
  document.getElementById('fighter-a').addEventListener('click', () => vote('a'));
  document.getElementById('fighter-b').addEventListener('click', () => vote('b'));
  document.getElementById('btn-prev').addEventListener('click', () => { if (idx > 0) { idx--; render(); } });
  document.getElementById('btn-skip').addEventListener('click', () => { if (idx < battles.length - 1) { idx++; render(); } });

  document.querySelector('cc-tabs').addEventListener('tab-change', e => {
    if (e.detail.tab === 'leaderboard') renderLeaderboard();
  });

  // Keyboard support
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowUp' || e.key === '1') vote('a');
    if (e.key === 'ArrowDown' || e.key === '2') vote('b');
    if (e.key === 'ArrowRight') document.getElementById('btn-skip').click();
    if (e.key === 'ArrowLeft') document.getElementById('btn-prev').click();
  });

  // Swipe support
  let touchY = 0;
  document.getElementById('arena').addEventListener('touchstart', e => touchY = e.touches[0].clientY);
  document.getElementById('arena').addEventListener('touchend', e => {
    const diff = touchY - e.changedTouches[0].clientY;
    if (Math.abs(diff) > 50) vote(diff > 0 ? 'b' : 'a');
  });

  await load();
  render();
})();
</script>
</body>
</html>
