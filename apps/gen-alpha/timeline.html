<style>
.tl-page { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
.tl-hero { text-align: center; margin-bottom: 2rem; }
.tl-hero h1 { font-size: 2rem; margin: 0 0 .5rem; }
.tl-hero p { color: var(--muted); font-size: 1.1rem; }

/* Generation columns */
.tl-gens { display: flex; gap: 2px; margin-bottom: 1.5rem; overflow-x: auto; }
.tl-gen-col { flex: 1; min-width: 140px; text-align: center; padding: .75rem .5rem; border-radius: var(--radius); cursor: pointer; transition: all .2s; position: relative; }
.tl-gen-col:hover, .tl-gen-col.active { transform: translateY(-2px); }
.tl-gen-col .gen-label { font-weight: 700; font-size: .85rem; }
.tl-gen-col .gen-years { font-size: .7rem; color: var(--muted); }
.gen-boomers { background: rgba(239,68,68,.15); border: 1px solid rgba(239,68,68,.3); }
.gen-boomers.active { background: rgba(239,68,68,.3); box-shadow: 0 0 20px rgba(239,68,68,.2); }
.gen-x { background: rgba(168,85,247,.15); border: 1px solid rgba(168,85,247,.3); }
.gen-x.active { background: rgba(168,85,247,.3); box-shadow: 0 0 20px rgba(168,85,247,.2); }
.gen-mill { background: rgba(59,130,246,.15); border: 1px solid rgba(59,130,246,.3); }
.gen-mill.active { background: rgba(59,130,246,.3); box-shadow: 0 0 20px rgba(59,130,246,.2); }
.gen-z { background: rgba(16,185,129,.15); border: 1px solid rgba(16,185,129,.3); }
.gen-z.active { background: rgba(16,185,129,.3); box-shadow: 0 0 20px rgba(16,185,129,.2); }
.gen-alpha { background: rgba(245,158,11,.15); border: 1px solid rgba(245,158,11,.3); }
.gen-alpha.active { background: rgba(245,158,11,.3); box-shadow: 0 0 20px rgba(245,158,11,.2); }
.gen-next { background: rgba(236,72,153,.15); border: 1px solid rgba(236,72,153,.3); border-style: dashed; }
.gen-next.active { background: rgba(236,72,153,.3); box-shadow: 0 0 20px rgba(236,72,153,.2); }

/* Chain cards */
.tl-chains { display: flex; flex-direction: column; gap: 1rem; }
.chain-card { border-radius: var(--radius); padding: 1.25rem; background: var(--card-bg, var(--card)); border: 1px solid var(--border); }
.chain-card:hover { border-color: var(--accent, #f59e0b); }
.chain-concept { font-size: .75rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: .5rem; }
.chain-flow { display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; padding: .75rem 0; }
.chain-node { padding: .4rem .8rem; border-radius: 999px; font-weight: 600; font-size: .9rem; white-space: nowrap; transition: all .3s; animation: nodeIn .4s ease-out both; }
.chain-node:nth-child(1) { animation-delay: 0s; }
.chain-node:nth-child(3) { animation-delay: .1s; }
.chain-node:nth-child(5) { animation-delay: .2s; }
.chain-node:nth-child(7) { animation-delay: .3s; }
.chain-node:nth-child(9) { animation-delay: .4s; }
.chain-node:nth-child(11) { animation-delay: .5s; }
@keyframes nodeIn { from { opacity: 0; transform: scale(.8) translateY(5px); } to { opacity: 1; transform: scale(1) translateY(0); } }
.chain-arrow { color: var(--muted); font-size: 1.2rem; }
.node-boomers { background: rgba(239,68,68,.2); color: #ef4444; }
.node-genx { background: rgba(168,85,247,.2); color: #a855f7; }
.node-mill { background: rgba(59,130,246,.2); color: #3b82f6; }
.node-genz { background: rgba(16,185,129,.2); color: #10b981; }
.node-alpha { background: rgba(245,158,11,.2); color: #f59e0b; }
.node-next { background: rgba(236,72,153,.15); color: #ec4899; border: 1px dashed rgba(236,72,153,.4); animation: glow 2s ease-in-out infinite alternate; }
@keyframes glow { from { box-shadow: 0 0 5px rgba(236,72,153,.2); } to { box-shadow: 0 0 15px rgba(236,72,153,.4); } }
.chain-pattern { display: inline-flex; align-items: center; gap: .3rem; font-size: .75rem; color: var(--muted); margin-top: .5rem; }
.chain-pattern .pill { font-size: .7rem; padding: .15rem .5rem; }

/* Filter */
.tl-filters { display: flex; gap: .75rem; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
.tl-filters .search { flex: 1; min-width: 200px; }
.tl-count { font-size: .8rem; color: var(--muted); }
</style>
</head>
<body>
<cc-app-nav app="gen-alpha" title="🧠 GenAlpha" active="timeline"></cc-app-nav>
<cc-auth></cc-auth>
<cc-toast></cc-toast>

<div class="tl-page">
  <div class="tl-hero">
    <h1>📊 Generational Slang Timeline</h1>
    <p>Trace how concepts mutated across generations — and see what's predicted next</p>
  </div>

  <div class="tl-gens" id="genBar"></div>

  <div class="tl-filters">
    <cc-search id="searchInput" placeholder="Search a concept or word..."></cc-search>
    <span class="tl-count" id="chainCount"></span>
  </div>

  <div class="tl-chains" id="chains"></div>
</div>

<script>
const GENS = [
  { key: 'boomers', label: 'Boomers', years: '1946–1964', cls: 'gen-boomers', node: 'node-boomers' },
  { key: 'genx', label: 'Gen X', years: '1965–1980', cls: 'gen-x', node: 'node-genx' },
  { key: 'mill', label: 'Millennials', years: '1981–1996', cls: 'gen-mill', node: 'node-mill' },
  { key: 'genz', label: 'Gen Z', years: '1997–2012', cls: 'gen-z', node: 'node-genz' },
  { key: 'alpha', label: 'Gen Alpha', years: '2013–2025', cls: 'gen-alpha', node: 'node-alpha' },
  { key: 'next', label: 'Gen Beta?', years: '2025+', cls: 'gen-next', node: 'node-next' }
];

// Evolution chains — each traces a concept across generations
const CHAINS = [
  { concept: 'Approval / Something Good', pattern: 'Semantic Drift', chains: [
    { gen: 'boomers', term: 'groovy' }, { gen: 'genx', term: 'radical' }, { gen: 'mill', term: 'sick' }, { gen: 'genz', term: 'fire 🔥' }, { gen: 'alpha', term: 'bussin' }, { gen: 'next', term: 'quantum?' }
  ]},
  { concept: 'Performing Well', pattern: 'Ironic Reuse', chains: [
    { gen: 'boomers', term: 'killing it' }, { gen: 'genx', term: 'crushing it' }, { gen: 'mill', term: 'slaying' }, { gen: 'genz', term: 'ate that' }, { gen: 'alpha', term: 'devoured' }, { gen: 'next', term: 'consumed?' }
  ]},
  { concept: 'Attractive Person', pattern: 'Semantic Drift', chains: [
    { gen: 'boomers', term: 'fox / foxy' }, { gen: 'genx', term: 'babe' }, { gen: 'mill', term: 'hot' }, { gen: 'genz', term: 'baddie' }, { gen: 'alpha', term: 'rizz god' }, { gen: 'next', term: 'auramaxxed?' }
  ]},
  { concept: 'Something Uncool', pattern: 'Semantic Drift', chains: [
    { gen: 'boomers', term: 'square' }, { gen: 'genx', term: 'lame' }, { gen: 'mill', term: 'basic' }, { gen: 'genz', term: 'mid' }, { gen: 'alpha', term: 'NPC behavior' }, { gen: 'next', term: 'default?' }
  ]},
  { concept: 'Laughing Hard', pattern: 'Emotional Compression', chains: [
    { gen: 'boomers', term: 'cracking up' }, { gen: 'genx', term: 'ROFL' }, { gen: 'mill', term: 'LOL / 😂' }, { gen: 'genz', term: "I'm dead 💀" }, { gen: 'alpha', term: 'skull emoji only' }, { gen: 'next', term: '⚰️?' }
  ]},
  { concept: 'Lying / Being Fake', pattern: 'Ironic Reuse', chains: [
    { gen: 'boomers', term: 'fibbing' }, { gen: 'genx', term: 'BS-ing' }, { gen: 'mill', term: 'fronting' }, { gen: 'genz', term: 'cap 🧢' }, { gen: 'alpha', term: 'capping hard' }, { gen: 'next', term: 'render?' }
  ]},
  { concept: 'Embarrassing Moment', pattern: 'Platform Leak', chains: [
    { gen: 'boomers', term: 'making a fool' }, { gen: 'genx', term: 'eating crow' }, { gen: 'mill', term: 'fail' }, { gen: 'genz', term: 'caught in 4K' }, { gen: 'alpha', term: 'clipped 💀' }, { gen: 'next', term: 'logged?' }
  ]},
  { concept: 'Money / Wealth', pattern: 'Semantic Drift', chains: [
    { gen: 'boomers', term: 'bread' }, { gen: 'genx', term: 'cheddar' }, { gen: 'mill', term: 'paper' }, { gen: 'genz', term: 'bag 💰' }, { gen: 'alpha', term: 'stacking W\'s' }, { gen: 'next', term: 'minted?' }
  ]},
  { concept: 'Leaving / Goodbye', pattern: 'Shortening', chains: [
    { gen: 'boomers', term: 'see ya later' }, { gen: 'genx', term: 'peace out' }, { gen: 'mill', term: 'bounce / dip' }, { gen: 'genz', term: 'I\'m out / bet' }, { gen: 'alpha', term: 'gg' }, { gen: 'next', term: 'dc?' }
  ]},
  { concept: 'Being Obsessed', pattern: 'Suffix Grafting', chains: [
    { gen: 'boomers', term: 'hooked on' }, { gen: 'genx', term: 'addicted to' }, { gen: 'mill', term: 'obsessed' }, { gen: 'genz', term: 'stanning' }, { gen: 'alpha', term: 'brain-rotted' }, { gen: 'next', term: '-coded?' }
  ]},
  { concept: 'Home / Hangout', pattern: 'Gaming Crossover', chains: [
    { gen: 'boomers', term: 'pad' }, { gen: 'genx', term: 'crib' }, { gen: 'mill', term: 'spot' }, { gen: 'genz', term: 'my place' }, { gen: 'alpha', term: 'spawn point' }, { gen: 'next', term: 'hub?' }
  ]},
  { concept: 'Suspicious Person', pattern: 'Shortening', chains: [
    { gen: 'boomers', term: 'shady character' }, { gen: 'genx', term: 'sketchy' }, { gen: 'mill', term: 'sus' }, { gen: 'genz', term: 'giving off vibes' }, { gen: 'alpha', term: 'low aura' }, { gen: 'next', term: 'flagged?' }
  ]},
  { concept: 'Trying Too Hard', pattern: 'Semantic Drift', chains: [
    { gen: 'boomers', term: 'brown-nosing' }, { gen: 'genx', term: 'try-hard' }, { gen: 'mill', term: 'extra' }, { gen: 'genz', term: 'doing too much' }, { gen: 'alpha', term: 'glazing' }, { gen: 'next', term: 'overclocked?' }
  ]},
  { concept: 'Confident / Bold', pattern: 'Gaming Crossover', chains: [
    { gen: 'boomers', term: 'gutsy' }, { gen: 'genx', term: 'ballsy' }, { gen: 'mill', term: 'savage' }, { gen: 'genz', term: 'based' }, { gen: 'alpha', term: 'sigma' }, { gen: 'next', term: 'mainchar?' }
  ]},
  { concept: 'Understanding / Agreement', pattern: 'Shortening', chains: [
    { gen: 'boomers', term: 'right on' }, { gen: 'genx', term: 'word' }, { gen: 'mill', term: 'facts' }, { gen: 'genz', term: 'no cap / real' }, { gen: 'alpha', term: 'fr fr' }, { gen: 'next', term: 'v?' }
  ]},
  { concept: 'Ignoring Someone', pattern: 'Semantic Drift', chains: [
    { gen: 'boomers', term: 'cold shoulder' }, { gen: 'genx', term: 'dissing' }, { gen: 'mill', term: 'ghosting' }, { gen: 'genz', term: 'leaving on read' }, { gen: 'alpha', term: 'muted' }, { gen: 'next', term: 'archived?' }
  ]},
  { concept: 'Self-Improvement', pattern: 'Suffix Grafting', chains: [
    { gen: 'boomers', term: 'bettering yourself' }, { gen: 'genx', term: 'working on yourself' }, { gen: 'mill', term: 'self-care' }, { gen: 'genz', term: 'glow up' }, { gen: 'alpha', term: 'looksmaxxing' }, { gen: 'next', term: 'statmaxxing?' }
  ]},
  { concept: 'Being Stuck', pattern: 'Gaming Crossover', chains: [
    { gen: 'boomers', term: 'in a pickle' }, { gen: 'genx', term: 'in a bind' }, { gen: 'mill', term: 'stuck' }, { gen: 'genz', term: 'down bad' }, { gen: 'alpha', term: 'softlocked' }, { gen: 'next', term: 'hardstuck?' }
  ]},
  { concept: 'Gossip / Drama', pattern: 'Semantic Drift', chains: [
    { gen: 'boomers', term: 'scuttlebutt' }, { gen: 'genx', term: 'dirt' }, { gen: 'mill', term: 'tea ☕' }, { gen: 'genz', term: 'spill the tea' }, { gen: 'alpha', term: 'plotmaxxing' }, { gen: 'next', term: 'scripted?' }
  ]},
  { concept: 'Something Overwhelming', pattern: 'Phonetic Respelling', chains: [
    { gen: 'boomers', term: 'far out' }, { gen: 'genx', term: 'gnarly' }, { gen: 'mill', term: 'insane' }, { gen: 'genz', term: 'unhinged' }, { gen: 'alpha', term: 'brainrot' }, { gen: 'next', term: 'cooked?' }
  ]}
];

function getNodeCls(gen) {
  const map = { boomers: 'node-boomers', genx: 'node-genx', mill: 'node-mill', genz: 'node-genz', alpha: 'node-alpha', next: 'node-next' };
  return map[gen] || '';
}

// Gen bar
const genBar = document.getElementById('genBar');
let activeGen = null;
GENS.forEach(g => {
  const el = document.createElement('div');
  el.className = `tl-gen-col ${g.cls}`;
  el.innerHTML = `<div class="gen-label">${g.label}</div><div class="gen-years">${g.years}</div>`;
  el.onclick = () => {
    if (activeGen === g.key) { activeGen = null; el.classList.remove('active'); }
    else {
      genBar.querySelectorAll('.tl-gen-col').forEach(x => x.classList.remove('active'));
      el.classList.add('active');
      activeGen = g.key;
    }
    renderChains();
  };
  genBar.appendChild(el);
});

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
const searchInput = document.getElementById('searchInput');
searchInput.addEventListener('cc-search', (e) => { searchInput._val = e.detail.value; renderChains(); });

function renderChains() {
  const q = (searchInput._val || '').toLowerCase().trim();
  const container = document.getElementById('chains');
  const filtered = CHAINS.filter(c => {
    if (q && !c.concept.toLowerCase().includes(q) && !c.chains.some(n => n.term.toLowerCase().includes(q)) && !c.pattern.toLowerCase().includes(q)) return false;
    if (activeGen && !c.chains.some(n => n.gen === activeGen)) return false;
    return true;
  });

  document.getElementById('chainCount').textContent = `${filtered.length} evolution chain${filtered.length !== 1 ? 's' : ''}`;

  container.innerHTML = filtered.map(c => {
    const nodes = c.chains.map((n, i) => {
      const highlight = activeGen === n.gen ? 'transform:scale(1.15);' : '';
      const arrow = i < c.chains.length - 1 ? '<span class="chain-arrow">→</span>' : '';
      return `<span class="chain-node ${getNodeCls(n.gen)}" style="${highlight}">${esc(n.term)}</span>${arrow}`;
    }).join('');
    return `<div class="chain-card">
      <div class="chain-concept">${esc(c.concept)}</div>
      <div class="chain-flow">${nodes}</div>
      <div class="chain-pattern"><span class="pill">${esc(c.pattern)}</span></div>
    </div>`;
  }).join('');
}

renderChains();
</script>
</body>
</html>
