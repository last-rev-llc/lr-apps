<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f59e0b">
<title>🦍 Age of Apes Guide - Research</title>
<meta name="supabase-url" content="https://lregiwsovpmljxjvrrsc.supabase.co">
<meta name="supabase-key" content="sb_publishable_HPinRWPrX97uxshGM0u1rw_UAsQsyFq">
<script src="https://shared.adam-harris.alphaclaw.app/supabase-client.js"></script>
<link rel="stylesheet" href="https://shared.adam-harris.alphaclaw.app/theme.css">
<link rel="stylesheet" href="modules/aoa-common.css">
<script src="https://shared.adam-harris.alphaclaw.app/components/index.js"></script>
<script src="modules/utils.js"></script>
<style>
  .research-category { margin-bottom:2rem; }
  .research-items { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:12px; }
  .research-item { position:relative; }
  .research-progress { height:4px; background:var(--border); border-radius:2px; margin-top:8px; overflow:hidden; }
  .research-progress-fill { height:100%; background:linear-gradient(90deg, var(--green), var(--blue)); transition:width 0.3s; }
</style>
</head>
<body>
<cc-app-nav app="age-of-apes" title="🦍 Age of Apes Guide" active="research"></cc-app-nav>
<cc-auth></cc-auth>
<cc-toast></cc-toast>

<div style="max-width:1400px;margin:0 auto;padding:1rem;">
  <div class="page-header">
    <h1>🔬 Research Database</h1>
    <div class="header-right">
      <span class="badge badge-app" id="total-research">Loading...</span>
    </div>
  </div>

  <cc-tabs active="overview">
    <cc-tab name="overview" label="Overview" icon="book">
      <div id="research-overview" style="padding:1rem 0;"></div>
    </cc-tab>
    <cc-tab name="calculator" label="Calculator" icon="calculator">
      <div class="panel">
        <h3 style="margin:0 0 1rem;">Research Calculator</h3>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:1rem;">
          <div><label style="color:var(--muted);font-size:.85rem;">Category</label><select id="rc-cat" class="aoa-select"></select></div>
          <div><label style="color:var(--muted);font-size:.85rem;">Research Item</label><select id="rc-item" class="aoa-select"></select></div>
          <div><label style="color:var(--muted);font-size:.85rem;">Start Level</label><input type="number" id="rc-start" class="aoa-input" value="0" min="0"></div>
          <div><label style="color:var(--muted);font-size:.85rem;">End Level</label><input type="number" id="rc-end" class="aoa-input" value="10" min="1"></div>
          <div><label style="color:var(--muted);font-size:.85rem;">Speed %</label><input type="number" id="rc-speed" class="aoa-input" value="0" min="0"></div>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1rem;">
          <label style="color:var(--muted);font-size:.85rem;display:flex;align-items:center;gap:4px;"><input type="checkbox" id="rc-einstein"> Einstein (+5%)</label>
          <label style="color:var(--muted);font-size:.85rem;display:flex;align-items:center;gap:4px;"><input type="checkbox" id="rc-guild"> Guild Research (+10%)</label>
        </div>
        <button class="btn btn-primary" id="rc-calc">Calculate</button>
        <div id="rc-results" style="margin-top:1rem;"></div>
      </div>
    </cc-tab>
  </cc-tabs>
</div>

<script>
const { fmt, esc, escAttr, timeStr, totalSeconds, secondsToTime } = AOA;
let gameData = {};

async function loadData() {
  try {
    const research = await fetch('data/research.json').then(r=>r.json());
    gameData = { research };
    renderResearch();
    setupCalculator();
  } catch(e) {
    console.error('Error loading data:', e);
  }
}

function renderResearch() {
  const rd = gameData.research;
  
  // Count total research items
  let totalItems = 0;
  Object.values(rd.categories).forEach(cat => totalItems += Object.keys(cat.items).length);
  document.getElementById('total-research').textContent = `${totalItems} Research Items`;

  // Research category sections
  const categoriesHtml = Object.entries(rd.categories).map(([catKey, category]) => {
    const categoryColor = {
      civil: 'var(--green)',
      military: 'var(--red)',
      economy: 'var(--yellow)',
      defense: 'var(--blue)'
    }[catKey] || 'var(--accent)';

    const itemsHtml = Object.entries(category.items).map(([itemKey, item]) => {
      const maxPower = item.basePower[item.basePower.length - 1] || 0;
      const totalPower = item.basePower.reduce((sum, p) => sum + p, 0);
      const progress = (item.maxLevel / 30) * 100; // Assuming max theoretical level is 30
      
      return `
        <div class="card research-item">
          <div class="card-top">
            <div class="card-title" style="font-size:.95rem;">${esc(item.name)}</div>
          </div>
          <div class="card-desc">Max Level: ${item.maxLevel} | Max Power: ${fmt(maxPower)}</div>
          <div class="card-meta">
            <span class="badge" style="background:${categoryColor};color:#fff;">Level ${item.maxLevel}</span>
            <span class="badge" style="background:var(--muted);color:#fff;">${fmt(totalPower)} Total</span>
          </div>
          <div class="research-progress">
            <div class="research-progress-fill" style="width:${Math.min(progress, 100)}%;background:${categoryColor};"></div>
          </div>
        </div>
      `;
    }).join('');

    return `
      <div class="research-category">
        <h3 style="margin:0 0 1rem;color:${categoryColor};">${esc(category.name)}</h3>
        <div class="research-items">
          ${itemsHtml}
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('research-overview').innerHTML = `
    ${categoriesHtml}
    <div class="panel" style="margin-top:2rem;">
      <h3 style="margin:0 0 .5rem;">Research Stats</h3>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;">
        <div class="stat-box"><div class="stat-box-value">${totalItems}</div><div class="stat-box-label">Total Research</div></div>
        <div class="stat-box"><div class="stat-box-value">${Object.keys(rd.categories).length}</div><div class="stat-box-label">Categories</div></div>
        <div class="stat-box"><div class="stat-box-value">25</div><div class="stat-box-label">Max Level</div></div>
        <div class="stat-box"><div class="stat-box-value">∞</div><div class="stat-box-label">Research Time</div></div>
      </div>
    </div>`;
}

function setupCalculator() {
  const rd = gameData.research;
  
  // Populate categories
  const cats = Object.entries(rd.categories).map(([k,c])=>`<option value="${escAttr(k)}">${esc(c.name)}</option>`).join('');
  document.getElementById('rc-cat').innerHTML = cats;
  
  const rcCat = document.getElementById('rc-cat');
  const rcItem = document.getElementById('rc-item');
  
  const populateItems = () => {
    const cat = rd.categories[rcCat.value];
    rcItem.innerHTML = Object.entries(cat.items).map(([k,v])=>`<option value="${escAttr(k)}">${esc(v.name)}</option>`).join('');
  };
  
  rcCat.addEventListener('change', populateItems);
  populateItems();

  document.getElementById('rc-calc').addEventListener('click', () => {
    const cat = rd.categories[rcCat.value];
    const item = cat.items[rcItem.value];
    const start = +document.getElementById('rc-start').value;
    const end = Math.min(+document.getElementById('rc-end').value, item.maxLevel);
    let speed = +document.getElementById('rc-speed').value;
    
    if(document.getElementById('rc-einstein').checked) speed += 5;
    if(document.getElementById('rc-guild').checked) speed += 10;
    
    if (start >= end) {
      window.showToast('Start level must be less than end level ⚠️', 3000);
      return;
    }
    
    let power = 0;
    let totalCost = 0;
    
    for(let i = start; i < end; i++) {
      power += (item.basePower[i] || 0);
      // Estimate cost based on level (exponential growth)
      totalCost += Math.floor(1000 * Math.pow(1.5, i));
    }
    
    // Estimate time based on power and level (very rough approximation)
    const levelDiff = end - start;
    const basetime = levelDiff * 3600; // 1 hour per level base
    const powerMultiplier = power / 1000;
    const estSec = basetime * (1 + powerMultiplier);
    const actualSec = estSec * (100/(100+speed));
    const saved = estSec - actualSec;
    
    document.getElementById('rc-results').innerHTML = `
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;">
        <div class="stat-box"><div class="stat-box-value" style="font-size:1.1rem;">${esc(item.name)}</div><div class="stat-box-label">Research</div></div>
        <div class="stat-box"><div class="stat-box-value" style="font-size:1.1rem;">${start} → ${end}</div><div class="stat-box-label">Levels</div></div>
        <div class="stat-box"><div class="stat-box-value" style="font-size:1.1rem;">${fmt(power)}</div><div class="stat-box-label">Power Gained</div></div>
        <div class="stat-box"><div class="stat-box-value" style="font-size:1.1rem;">${fmt(totalCost)}</div><div class="stat-box-label">Est. Cost</div></div>
        <div class="stat-box"><div class="stat-box-value" style="font-size:1.1rem;">${secondsToTime(estSec).str}</div><div class="stat-box-label">Est. Time</div></div>
        <div class="stat-box"><div class="stat-box-value" style="font-size:1.1rem;">${secondsToTime(actualSec).str}</div><div class="stat-box-label">Actual Time</div></div>
        <div class="stat-box"><div class="stat-box-value" style="font-size:1.1rem;">${secondsToTime(saved).str}</div><div class="stat-box-label">Time Saved</div></div>
        <div class="stat-box"><div class="stat-box-value" style="font-size:1.1rem;">${speed}%</div><div class="stat-box-label">Speed Bonus</div></div>
      </div>`;

    window.showToast(`Calculated ${item.name} research costs ✅`, 3000);
  });
}

loadData();
</script>
</body>
</html>
