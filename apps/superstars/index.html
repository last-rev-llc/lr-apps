<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f59e0b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.svg">
<title>⭐ Superstars</title>
<meta name="supabase-url" content="https://lregiwsovpmljxjvrrsc.supabase.co">
<meta name="supabase-key" content="sb_publishable_HPinRWPrX97uxshGM0u1rw_UAsQsyFq">
<link rel="stylesheet" href="https://shared.adam-harris.alphaclaw.app/theme.css">
<script src="https://shared.adam-harris.alphaclaw.app/components/index.js"></script>
    <script src="https://shared.adam-harris.alphaclaw.app/supabase-auth.js"></script>
<script src="https://shared.adam-harris.alphaclaw.app/supabase-client.js"></script>
<style>
  :root {
    --theme-primary: #00543C;
    --theme-primary-light: #007A56;
    --theme-accent: #FDBB30;
    --theme-accent-dark: #D49A1A;
    --theme-gray: #919194;
  }
  * { box-sizing: border-box; }
  body { background: var(--bg); overflow-x: hidden; }

  /* ===== PEOPLE NAV ===== */
  .people-nav {
    position: fixed; top: 56px; left: 0; right: 0; z-index: 100;
    display: flex; gap: 8px; justify-content: center; padding: 10px 16px;
    background: rgba(10,14,26,0.85); backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .people-nav a {
    padding: 6px 18px; border-radius: 20px; font-size: 13px; font-weight: 600;
    color: #fff; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    text-decoration: none; transition: all 0.3s;
  }
  .people-nav a.active, .people-nav a:hover {
    background: var(--theme-primary); border-color: var(--theme-accent); color: var(--theme-accent);
  }

  /* ===== CUSTOM HERO MODIFICATIONS ===== */
  cc-hero .cc-hero { 
    min-height: 100vh; display: flex; flex-direction: column; justify-content: center;
    background: radial-gradient(ellipse at center top, color-mix(in srgb, var(--theme-primary) 35%, transparent) 0%, transparent 70%);
    padding: 120px 24px 60px; position: relative;
  }
  cc-hero .cc-hero::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 120px;
    background: linear-gradient(transparent, var(--bg)); pointer-events: none;
  }
  .hero-photos { position: relative; display: inline-block; margin-bottom: 28px; }
  .hero-photo-main {
    width: 220px; height: 220px; border-radius: 50%; object-fit: cover;
    border: 4px solid var(--theme-accent);
    box-shadow: 0 0 60px rgba(253,187,48,0.25), 0 0 120px rgba(0,84,60,0.4);
    animation: hero-glow 3s ease-in-out infinite alternate;
  }
  @keyframes hero-glow {
    from { box-shadow: 0 0 40px color-mix(in srgb, var(--theme-accent) 20%, transparent), 0 0 80px color-mix(in srgb, var(--theme-primary) 30%, transparent); }
    to { box-shadow: 0 0 60px color-mix(in srgb, var(--theme-accent) 40%, transparent), 0 0 120px color-mix(in srgb, var(--theme-primary) 50%, transparent); }
  }
  .hero-photo-action {
    position: absolute; bottom: -10px; right: -40px;
    width: 110px; height: 110px; border-radius: 12px; object-fit: cover;
    border: 3px solid var(--theme-primary);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    transform: rotate(5deg); transition: transform 0.3s; cursor: pointer;
  }
  .hero-photo-action:hover { transform: rotate(0deg) scale(1.1); }
  .hero-links {
    display: flex; justify-content: center; gap: 10px; margin-top: 20px; flex-wrap: wrap;
  }
  .hero-link {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 20px; border-radius: 24px; font-size: 13px; color: #fff;
    background: color-mix(in srgb, var(--theme-primary) 40%, transparent);
    border: 1px solid color-mix(in srgb, var(--theme-primary) 60%, transparent);
    text-decoration: none; transition: all 0.3s; backdrop-filter: blur(8px);
  }
  .hero-link:hover { background: var(--theme-primary); border-color: var(--theme-accent); transform: translateY(-2px); }
  .gallery-img { width: 100%; height: 300px; object-fit: cover; border-radius: 12px; cursor: pointer; transition: transform 0.3s; }
  .gallery-img:hover { transform: scale(1.05); }
  .article-link { display: flex; align-items: center; gap: 14px; padding: 16px 20px; text-decoration: none; margin-bottom: 10px; transition: all 0.3s; }
  .article-link:hover { transform: translateX(4px); }

  /* ===== CONTENT SECTIONS ===== */
  .content { max-width: 960px; margin: 0 auto; padding: 0 24px 80px; position: relative; z-index: 1; }
  .section-header {
    display: flex; align-items: center; gap: 14px; margin: 56px 0 28px;
  }
  .section-header h2 {
    font-family: Georgia, serif; font-size: 1.7rem; color: #fff; margin: 0; white-space: nowrap;
  }
  .accent-line {
    flex: 1; height: 2px; border-radius: 1px;
    background: linear-gradient(90deg, var(--theme-accent), transparent);
  }
  @media (max-width: 700px) {
    .people-nav { top: 48px; }
    cc-hero .cc-hero { padding: 80px 16px 60px; }
    .hero-photo-main { width: 160px; height: 160px; }
    .hero-photo-action { width: 80px; height: 80px; right: -20px; }
  }
</style>
</head>
<body>
<cc-particles color1="253,187,48" color2="0,122,86" line-color="0,122,86" count="50"></cc-particles>
<cc-app-nav app="superstars" title="⭐ Superstars" active="home"></cc-app-nav>
<cc-user-auth mode="gate" allow-signup="false"></cc-user-auth>
<cc-confetti></cc-confetti>
<cc-lightbox></cc-lightbox>
<cc-toast></cc-toast>

<div id="people-nav"></div>
<div id="app"></div>

<script>
function esc(s) {
  if (s == null) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}
function escAttr(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function applyTheme(p) {
  if (!p.theme) return;
  const r = document.documentElement.style;
  r.setProperty('--theme-primary', p.theme.primary || '#00543C');
  r.setProperty('--theme-primary-light', p.theme.primaryLight || p.theme.primary || '#007A56');
  r.setProperty('--theme-accent', p.theme.accent || '#FDBB30');
  r.setProperty('--theme-accent-dark', p.theme.accentDark || p.theme.accent || '#D49A1A');
  // Update particles
  const pc = document.querySelector('cc-particles');
  if (pc) {
    pc.remove();
    const np = document.createElement('cc-particles');
    const hexToRgb = h => { const v = parseInt(h.slice(1), 16); return `${(v>>16)&255},${(v>>8)&255},${v&255}`; };
    np.setAttribute('color1', hexToRgb(p.theme.accent || '#FDBB30'));
    np.setAttribute('color2', hexToRgb(p.theme.primary || '#00543C'));
    np.setAttribute('line-color', hexToRgb(p.theme.primary || '#00543C'));
    document.body.insertBefore(np, document.body.firstChild);
  }
}

function buildTimelineSteps(p) {
  if (!p.timeline || !p.timeline.length) return '[]';
  return JSON.stringify(p.timeline.map(t => ({
    title: t.title,
    description: `${t.year} • ${t.detail}`,
    icon: t.icon === '⚽' ? 'football' : 
          t.icon === '🎓' ? 'graduation-cap' : 
          t.icon === '🏆' ? 'trophy' : 
          t.icon === '🏟️' ? 'building' : 
          t.icon === '🧤' ? 'hand' : 
          t.icon === '📊' ? 'bar-chart' :
          t.icon === '💼' ? 'briefcase' :
          t.icon === '🏫' ? 'school' :
          t.icon === '🌍' ? 'globe' :
          t.icon === '⭐' ? 'star' :
          t.icon === '🏖️' ? 'palmtree' :
          t.icon === '📝' ? 'file-text' :
          t.icon === '🤝' ? 'handshake' :
          'circle'
  })));
}

async function init() {
  const resp = await fetch('data/people.json');
  const people = await resp.json();
  const hash = location.hash.slice(1) || people[0].id;
  const p = people.find(pp => pp.id === hash) || people[0];
  applyTheme(p);

  // People nav
  if (people.length > 1) {
    document.getElementById('people-nav').innerHTML = `
      <div class="people-nav">
        ${people.map(pp => `<a href="#${escAttr(pp.id)}" class="${pp.id === p.id ? 'active' : ''}">${esc(pp.name)}</a>`).join('')}
      </div>
    `;
  }

  // Re-fire confetti
  const confetti = document.querySelector('cc-confetti');
  if (confetti) setTimeout(() => confetti.fire(), 200);

  render(p);
}

function render(p) {
  const app = document.getElementById('app');
  const hasActionPhoto = p.photos && p.photos.action;
  const allPhotos = Object.entries(p.photos || {}).filter(([k, v]) => v);

  app.innerHTML = `
    <!-- ===== HERO SECTION ===== -->
    <cc-hero 
      title="${escAttr(p.name)}" 
      subtitle="${escAttr(p.tagline)}"
      body="${escAttr(p.currentRole)} · ${escAttr(p.currentOrg)}"
      variant="glow"
      align="center">
      <div slot="actions" style="display: flex; flex-direction: column; align-items: center; gap: 20px; margin-top: 24px;">
        <div class="hero-photos">
          <img class="hero-photo-main" src="${escAttr(p.photos?.headshot || '')}" alt="${escAttr(p.name)}" onerror="this.style.background='var(--theme-primary)';this.src=''">
          ${hasActionPhoto ? `<img class="hero-photo-action" src="${escAttr(p.photos.action)}" alt="${escAttr(p.name)}" onclick="CCLightbox.open(this.src)" onerror="this.style.display='none'">` : ''}
        </div>
        <div class="hero-links">
          ${p.linkedinUrl ? `<a class="hero-link" href="${escAttr(p.linkedinUrl)}" target="_blank" rel="noopener">💼 LinkedIn</a>` : ''}
          ${p.wikiUrl ? `<a class="hero-link" href="${escAttr(p.wikiUrl)}" target="_blank" rel="noopener">📖 Wikipedia</a>` : ''}
          ${p.mlsUrl ? `<a class="hero-link" href="${escAttr(p.mlsUrl)}" target="_blank" rel="noopener">⚽ MLS</a>` : ''}
          ${p.transfermarktUrl ? `<a class="hero-link" href="${escAttr(p.transfermarktUrl)}" target="_blank" rel="noopener">📊 Transfermarkt</a>` : ''}
        </div>
      </div>
    </cc-hero>

    <div class="content">
      <!-- BIO -->
      <cc-fade-in>
        <div class="card" style="margin-bottom: 48px; padding: 36px; font-size: 1.15rem; line-height: 1.9;">
          ${p.bio}
        </div>
      </cc-fade-in>

      <!-- STATS -->
      <cc-stagger animation="scale" delay="100">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 14px; margin-bottom: 48px;">
          ${renderStats(p)}
        </div>
      </cc-stagger>

      <!-- GALLERY -->
      ${allPhotos.length > 0 ? `
      <cc-fade-in>
        <div class="section-header"><h2>📸 Gallery</h2><div class="accent-line"></div></div>
      </cc-fade-in>
      <cc-stagger animation="fade-up" delay="80">
        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; margin-bottom: 48px;">
          ${allPhotos.map(([key, url]) => `
            <cc-media-card>
              <img src="${escAttr(url)}" alt="${escAttr(p.name)}" onclick="CCLightbox.open(this.src, this.alt)" class="gallery-img">
              <div style="position: absolute; bottom: 14px; left: 14px; color: white; font-weight: 600; text-shadow: 0 2px 8px rgba(0,0,0,0.7);">
                ${esc(key.charAt(0).toUpperCase() + key.slice(1).replace(/([A-Z])/g, ' $1'))}
              </div>
            </cc-media-card>
          `).join('')}
        </div>
      </cc-stagger>` : ''}

      <!-- CAREER TIMELINE -->
      ${p.timeline && p.timeline.length ? `
      <cc-fade-in>
        <div class="section-header"><h2>⏳ Career Timeline</h2><div class="accent-line"></div></div>
      </cc-fade-in>
      <cc-timeline steps='${escAttr(buildTimelineSteps(p))}' variant="vertical" numbered="false"></cc-timeline>
      ` : ''}

      <!-- EDUCATION -->
      ${p.education && p.education.length ? `
      <cc-fade-in>
        <div class="section-header"><h2>🎓 Education</h2><div class="accent-line"></div></div>
      </cc-fade-in>
      <cc-stagger animation="fade-up" delay="100">
        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; margin-bottom: 48px;">
          ${p.education.map(e => `
            <div class="card" style="padding: 22px;">
              <div style="font-weight: 700; color: var(--theme-accent); font-size: 16px;">${esc(e.school)}</div>
              <div style="color: #fff; font-size: 14px; margin: 5px 0;">${esc(e.degree)}${e.sport ? ' · ' + esc(e.sport) : ''}</div>
              ${e.years ? `<div style="color: var(--theme-gray); font-size: 13px;">${esc(e.years)}</div>` : ''}
            </div>
          `).join('')}
        </div>
      </cc-stagger>` : ''}

      <!-- CAREER HIGHLIGHTS -->
      ${p.careerHighlights && p.careerHighlights.length ? `
      <cc-fade-in>
        <div class="section-header"><h2>🏆 Career Highlights</h2><div class="accent-line"></div></div>
      </cc-fade-in>
      <cc-stagger animation="fade-up" delay="100">
        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; margin-bottom: 48px;">
          ${p.careerHighlights.map(c => `
            <div class="card" style="padding: 22px;">
              <div style="font-weight: 700; color: var(--theme-accent); font-size: 16px;">${esc(c.title)}</div>
              <div style="color: #fff; font-size: 14px; margin: 5px 0;">${esc(c.detail)}</div>
            </div>
          `).join('')}
        </div>
      </cc-stagger>` : ''}

      <!-- TEAMS -->
      ${p.careerTeams && p.careerTeams.length ? `
      <cc-fade-in>
        <div class="section-header"><h2>🏟️ Professional Career</h2><div class="accent-line"></div></div>
      </cc-fade-in>
      <cc-marquee direction="left" speed="30" pause-on-hover="true" style="margin-bottom: 20px;">
        ${p.careerTeams.map(t => `<span style="color: ${escAttr(t.color)}; font-weight: bold; margin-right: 2rem;">${esc(t.name)}</span>`).join('')}
      </cc-marquee>
      <cc-stagger animation="scale" delay="80">
        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 14px; margin-bottom: 48px;">
          ${p.careerTeams.map(t => `
            <div class="card" style="padding: 20px 16px; text-align: center; position: relative; overflow: hidden;">
              <div style="position: absolute; top: 0; left: 0; right: 0; height: 4px; background: ${escAttr(t.color)}; border-radius: 12px 12px 0 0;"></div>
              <div style="font-size: 13px; color: var(--theme-accent); font-weight: 600; margin-top: 4px;">${esc(t.years)}</div>
              <div style="font-weight: 700; color: #fff; font-size: 15px;">${esc(t.name)}</div>
              <div style="font-size: 12px; color: var(--theme-gray); margin-top: 3px;">${esc(t.league)}</div>
            </div>
          `).join('')}
        </div>
      </cc-stagger>` : ''}

      <!-- INTERNATIONAL -->
      ${p.internationalExhibitions && p.internationalExhibitions.length ? `
      <cc-fade-in>
        <div class="section-header"><h2>🌍 International Experience</h2><div class="accent-line"></div></div>
      </cc-fade-in>
      <cc-stagger animation="fade-left" delay="60">
        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; margin-bottom: 48px;">
          ${p.internationalExhibitions.map(e => `
            <div class="card" style="display: flex; align-items: center; gap: 12px; padding: 14px 16px;">
              <div style="font-weight: 700; color: var(--theme-accent); font-size: 13px; font-family: monospace; min-width: 40px;">${esc(e.year)}</div>
              <div>
                <div style="color: #fff; font-size: 14px; font-weight: 600;">${esc(e.match)}</div>
                <div style="color: var(--theme-gray); font-size: 12px;">${esc(e.context)}</div>
              </div>
            </div>
          `).join('')}
        </div>
      </cc-stagger>` : ''}

      <!-- COACHING -->
      ${p.coachingHighlights && p.coachingHighlights.length ? `
      <cc-fade-in>
        <div class="section-header"><h2>🧤 Goalkeepers Developed</h2><div class="accent-line"></div></div>
      </cc-fade-in>
      <cc-stagger animation="fade-up" delay="100">
        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; margin-bottom: 48px;">
          ${p.coachingHighlights.map(c => `
            <div class="card" style="padding: 22px;">
              <div style="font-weight: 700; color: var(--theme-accent); font-size: 16px;">${esc(c.player)}</div>
              <div style="color: #fff; font-size: 14px; margin: 5px 0;">${esc(c.achievement)}</div>
              <div style="color: var(--theme-gray); font-size: 13px;">${esc(c.stats)}</div>
            </div>
          `).join('')}
        </div>
      </cc-stagger>` : ''}

      <!-- ARTICLES -->
      ${p.articles && p.articles.length ? `
      <cc-fade-in>
        <div class="section-header"><h2>📰 In the Press</h2><div class="accent-line"></div></div>
      </cc-fade-in>
      <cc-stagger animation="fade-right" delay="80">
        <div style="margin-bottom: 48px;">
          ${p.articles.map(a => `
            <a href="${escAttr(a.url)}" target="_blank" rel="noopener" class="card article-link">
              <div style="font-size: 24px; flex-shrink: 0;">📰</div>
              <div>
                <div style="font-weight: 700; color: #fff; font-size: 14px;">${esc(a.title)}</div>
                <div style="font-size: 12px; color: var(--theme-gray); margin-top: 3px;">${esc(a.source)} · ${esc(a.date)}</div>
              </div>
            </a>
          `).join('')}
        </div>
      </cc-stagger>` : ''}

      <!-- QUOTES -->
      ${p.quotes && p.quotes.length ? `
      <cc-fade-in>
        <div class="section-header"><h2>💬 Words</h2><div class="accent-line"></div></div>
      </cc-fade-in>
      <cc-stagger animation="fade-up" delay="150">
        <div style="margin-bottom: 48px;">
          ${p.quotes.map(q => `
            <cc-testimonial 
              quote="${escAttr(q.text)}" 
              author="${escAttr(q.source)}"
              variant="minimal">
            </cc-testimonial>
          `).join('')}
        </div>
      </cc-stagger>` : ''}
    </div>

    <div style="text-align: center; padding: 48px 24px; color: var(--theme-gray); font-size: 12px; border-top: 1px solid rgba(255,255,255,0.08); margin-top: 48px;">
      ⭐ <strong>Superstars</strong> · A personal showcase<br>
      ${p.currentOrgUrl ? `<a href="${escAttr(p.currentOrgUrl)}" target="_blank" rel="noopener" style="color: var(--theme-accent); text-decoration: none;">${esc(p.currentOrg)}</a>` : ''}
      ${p.linkedinUrl ? ` · <a href="${escAttr(p.linkedinUrl)}" target="_blank" rel="noopener" style="color: var(--theme-accent); text-decoration: none;">LinkedIn</a>` : ''}
      ${p.wikiUrl ? ` · <a href="${escAttr(p.wikiUrl)}" target="_blank" rel="noopener" style="color: var(--theme-accent); text-decoration: none;">Wikipedia</a>` : ''}
    </div>
  `;
}

function renderStats(p) {
  if (!p.stats) return '';
  // Soccer-specific
  if (p.stats.proYears !== undefined) {
    return [
      ['proYears','Pro Seasons',''],['proTeams','Pro Teams',''],['proApps','Pro Appearances',''],
      ['mlsApps','MLS Starts',''],['collegeShutouts','College Shutouts',''],
      ['collegeGAA','College GAA',''],['miamiGAA','Miami FC GAA',''],['coachingYears','Years Coaching','+']
    ].filter(([k]) => p.stats[k] !== undefined).map(([k,label,suffix]) =>
      `<div class="card"><cc-stat-counter value="${escAttr(p.stats[k])}" label="${escAttr(label)}" suffix="${escAttr(suffix)}"></cc-stat-counter></div>`
    ).join('');
  }
  // Generic
  const mapping = {
    yearsAtMerrill:'Years at Merrill',sportsPlayed:'College Sport',ncaaDivision:'NCAA Division',
    degrees:'Degrees Earned',certifications:'Certifications'
  };
  return Object.entries(p.stats).filter(([k]) => mapping[k]).map(([k,v]) =>
    `<div class="card"><cc-stat-counter value="${escAttr(v)}" label="${escAttr(mapping[k])}"></cc-stat-counter></div>`
  ).join('');
}

window.addEventListener('hashchange', init);
init();
</script>
</body>
</html>
