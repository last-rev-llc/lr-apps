<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💡 Ideas — Logs</title>
<link rel="stylesheet" href="https://shared.adam-harris.alphaclaw.app/theme.css">
<script src="https://shared.adam-harris.alphaclaw.app/components/index.js"></script>
    <script src="https://shared.adam-harris.alphaclaw.app/supabase-auth.js"></script>
<meta name="supabase-url" content="https://lregiwsovpmljxjvrrsc.supabase.co">
<meta name="supabase-key" content="sb_publishable_HPinRWPrX97uxshGM0u1rw_UAsQsyFq">

</head>
<body>

<cc-app-topnav app="cc-ideas" title="💡 Ideas" links='[{"id":"app","label":"App","href":"app.html"},{"id":"apps","label":"Apps","href":"apps.html"},{"id":"ideas","label":"Ideas","href":"ideas.html"},{"id":"docs","label":"Docs","href":"docs.html"}]' active="logs"></cc-app-topnav>
<cc-app-nav app="cc-ideas" title="💡 Ideas" active="logs" position="bottom"></cc-app-nav>
<cc-user-auth mode="gate" allow-signup="false"></cc-user-auth>
<cc-toast></cc-toast>
<div style="max-width:960px;margin:40px auto;padding:0 20px;">
  <h1 style="font-family:var(--serif);margin-bottom:24px;">📋 Change Log</h1>
  <div id="logs-container" style="color:var(--muted);font-size:14px;">Loading logs…</div>
</div>
<script>
(async () => {
  const container = document.getElementById('logs-container');
  const esc = s => { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; };
  try {
    const sb = window.supabase;
    if (!sb) { container.textContent = 'Database not available.'; return; }
    // Query activity_log table from Supabase
    const rows = await sb.select('activity_log', { order: 'timestamp.desc', limit: 100 });
    if (!rows || !rows.length) {
      container.innerHTML = '<cc-empty-state message="No log entries yet. Activity will appear here as changes are made." icon="📋" animation="none"></cc-empty-state>';
      return;
    }
    container.innerHTML = rows.map(r => `
      <div style="padding:10px 0;border-bottom:1px solid var(--border);">
        <span style="color:var(--heading);font-weight:600;">${esc(r.action || 'update')}</span>
        <span style="margin-left:8px;font-size:12px;color:var(--muted);">${esc(new Date(r.timestamp || r.created_at).toLocaleString())}</span>
        ${r.details || r.description ? `<div style="font-size:12px;margin-top:4px;">${esc(r.details || r.description)}</div>` : ''}
      </div>`).join('');
  } catch(e) {
    container.textContent = 'Could not load logs: ' + e.message;
  }
})();
</script>
</body>
</html>
