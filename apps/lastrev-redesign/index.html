<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f59e0b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <title>🎨 Design Review</title>
  <link rel="stylesheet" href="https://shared.adam-harris.alphaclaw.app/theme.css">
  <script src="https://shared.adam-harris.alphaclaw.app/components/index.js"></script>
    <script src="https://shared.adam-harris.alphaclaw.app/supabase-auth.js"></script>
  <style>
    .app-layout { display: flex; flex-direction: column; height: 100vh; }
    .app-content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

    /* Project bar */
    .project-bar { display: flex; gap: 12px; padding: 16px 20px; overflow-x: auto; border-bottom: 1px solid var(--border); background: var(--card); flex-shrink: 0; }
    .project-card { cursor: pointer; padding: 14px 18px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); min-width: 260px; max-width: 320px; transition: all 0.2s; flex-shrink: 0; }
    .project-card:hover { border-color: var(--accent); }
    .project-card.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
    .project-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .project-card p { font-size: 12px; color: var(--muted); line-height: 1.4; margin-bottom: 8px; }
    .project-meta { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--muted); }

    /* View mode toggle */
    .view-bar { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--card); flex-shrink: 0; }
    .view-modes { display: flex; gap: 6px; }
    .view-mode-btn { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .view-mode-btn:hover { border-color: var(--accent); color: var(--text-primary, #fff); }
    .view-mode-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .view-info { font-size: 12px; color: var(--muted); }

    /* Gallery grid */
    .concept-area { flex: 1; overflow: auto; padding: 20px; }
    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .concept-card { cursor: pointer; border-radius: 10px; border: 1px solid var(--border); background: var(--card); overflow: hidden; transition: all 0.2s; }
    .concept-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .concept-preview { height: 160px; background: var(--bg); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
    .concept-preview .preview-gradient { position: absolute; inset: 0; opacity: 0.7; }
    .concept-preview .preview-label { position: relative; z-index: 1; font-size: 14px; font-weight: 600; color: #fff; text-transform: uppercase; letter-spacing: 0.08em; text-shadow: 0 1px 4px rgba(0,0,0,0.5); }
    .concept-info { padding: 14px; }
    .concept-info h4 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .concept-info p { font-size: 12px; color: var(--muted); line-height: 1.4; }

    /* Side-by-side comparison */
    .compare-container { display: flex; flex: 1; overflow: hidden; }
    .compare-pane { flex: 1; display: flex; flex-direction: column; border-right: 2px solid var(--border); overflow: hidden; min-width: 0; position: relative; }
    .compare-pane:last-child { border-right: none; }
    .compare-header { padding: 8px 14px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .compare-header h4 { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .compare-header .compare-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .compare-header .compare-actions button { padding: 3px 8px; font-size: 11px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; }
    .compare-header .compare-actions button:hover { border-color: var(--accent); color: var(--text-primary, #fff); }
    .compare-body { flex: 1; overflow: auto; }
    .compare-body .shadow-host { display: block; width: 100%; min-height: 100%; }

    /* Single full-width view */
    .single-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .single-header { padding: 10px 20px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .single-header h3 { font-size: 14px; font-weight: 600; }
    .single-header .nav-btns { display: flex; gap: 8px; }
    .single-body { flex: 1; overflow: auto; }
    .single-body .shadow-host { display: block; width: 100%; min-height: 100%; }

    .hidden { display: none !important; }

    @media (max-width: 900px) {
      .compare-container { flex-direction: column; }
      .compare-pane { border-right: none; border-bottom: 2px solid var(--border); min-height: 50vh; }
    }
    @media (max-width: 640px) {
      .project-bar { padding: 12px; gap: 8px; }
      .project-card { min-width: 200px; padding: 10px 14px; }
      .concept-area { padding: 12px; }
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <cc-app-nav app="lastrev-redesign" title="Design Review" active="home"></cc-app-nav>
    <cc-user-auth mode="gate" allow-signup="false"></cc-user-auth>
    <cc-toast></cc-toast>

    <div class="app-content">
      <div class="project-bar" id="projectBar"></div>

      <div class="view-bar" id="viewBar">
        <div class="view-modes">
          <button class="view-mode-btn active" data-mode="gallery">🗂 Gallery</button>
          <button class="view-mode-btn" data-mode="compare">⬜⬜ Side by Side</button>
          <button class="view-mode-btn" data-mode="single">🔍 Full View</button>
        </div>
        <div class="view-info" id="viewInfo"></div>
      </div>

      <!-- Gallery mode -->
      <div class="concept-area" id="galleryView">
        <div class="gallery-grid" id="conceptGrid"></div>
      </div>

      <!-- Side-by-side comparison mode -->
      <div class="compare-container hidden" id="compareView"></div>

      <!-- Single full-width view -->
      <div class="single-container hidden" id="singleView">
        <div class="single-header">
          <button class="btn btn-secondary btn-sm" id="backBtn">← Back</button>
          <h3 id="singleTitle"></h3>
          <div class="nav-btns">
            <button class="btn btn-secondary btn-sm" id="prevBtn">◀ Prev</button>
            <button class="btn btn-secondary btn-sm" id="nextBtn">Next ▶</button>
            <button class="btn btn-primary btn-sm" id="externalBtn">↗ New Tab</button>
          </div>
        </div>
        <div class="single-body" id="singleBody"></div>
      </div>
    </div>
  </div>

  <script>
    let projects = [];
    let activeProject = null;
    let viewMode = 'gallery';
    let singleIndex = 0;
    const contentCache = {};

    function esc(s) { const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; }

    // Event delegation for view mode buttons
    document.querySelector('.view-modes').addEventListener('click', e => {
      const btn = e.target.closest('[data-mode]');
      if (btn) setViewMode(btn.dataset.mode);
    });
    document.getElementById('backBtn').addEventListener('click', () => setViewMode('gallery'));
    document.getElementById('prevBtn').addEventListener('click', () => navSingle(-1));
    document.getElementById('nextBtn').addEventListener('click', () => navSingle(1));
    document.getElementById('externalBtn').addEventListener('click', () => openExternal());
    
    // Project selection event delegation
    document.getElementById('projectBar').addEventListener('click', (e) => {
      const card = e.target.closest('[data-action="select-project"]');
      if (card) selectProject(card.dataset.id);
    });

    async function fetchConceptHTML(file) {
      if (contentCache[file]) return contentCache[file];
      try {
        const res = await fetch(file);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const html = await res.text();
        contentCache[file] = html;
        return html;
      } catch (e) {
        console.error('Failed to fetch concept:', file, e);
        return `<div style="padding:40px;text-align:center;font-family:system-ui;color:#888">Failed to load concept</div>`;
      }
    }

    function injectIntoShadow(hostEl, html) {
      if (!hostEl.shadowRoot) hostEl.attachShadow({ mode: 'open' });
      // Parse HTML and extract styles + body content
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      // Get all stylesheets and style tags
      const styles = [...doc.querySelectorAll('style')].map(s => s.outerHTML).join('\n');
      const links = [...doc.querySelectorAll('link[rel="stylesheet"]')].map(l => l.outerHTML).join('\n');
      const body = doc.body ? doc.body.innerHTML : html;
      hostEl.shadowRoot.innerHTML = links + styles + body;
      // Execute scripts within shadow context
      const scripts = doc.querySelectorAll('script');
      scripts.forEach(orig => {
        if (orig.src) {
          const s = document.createElement('script');
          s.src = orig.src;
          hostEl.shadowRoot.appendChild(s);
        }
      });
    }

    async function init() {
      try {
        const res = await fetch('projects.json');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        projects = (data.projects || []).reverse();
      } catch (e) {
        window.showToast?.('Failed to load projects', 4000);
        projects = [];
      }
      renderProjects();
      if (projects.length > 0) selectProject(projects[0].id);
    }

    function renderProjects() {
      const bar = document.getElementById('projectBar');
      if (!projects.length) { bar.innerHTML = '<cc-empty-state message="No projects yet" icon="🎨"></cc-empty-state>'; return; }
      bar.innerHTML = projects.map(p => {
        const sc = p.status === 'in-review' ? 'blue' : p.status === 'approved' ? 'green' : p.status === 'rejected' ? 'red' : 'gray';
        return `<div class="project-card ${activeProject === p.id ? 'active' : ''}" data-id="${esc(p.id)}" data-action="select-project">
          <h3>${esc(p.name)}</h3><p>${esc(p.description)}</p>
          <div class="project-meta"><span class="pill pill-${sc}">${esc((p.status||'').replace('-',' '))}</span><span>${p.concepts?p.concepts.length:0} concepts</span><span>${esc(p.createdAt)}</span></div>
        </div>`;
      }).join('');
    }

    function getProject() { return projects.find(p => p.id === activeProject); }

    function selectProject(id) {
      activeProject = id;
      renderProjects();
      applyView();
    }

    function setViewMode(mode) {
      viewMode = mode;
      document.querySelectorAll('.view-mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
      applyView();
    }

    function applyView() {
      const project = getProject();
      document.getElementById('galleryView').classList.toggle('hidden', viewMode !== 'gallery');
      document.getElementById('compareView').classList.toggle('hidden', viewMode !== 'compare');
      document.getElementById('singleView').classList.toggle('hidden', viewMode !== 'single');
      if (!project) return;

      const info = document.getElementById('viewInfo');
      info.textContent = `${project.name} — ${project.concepts?.length || 0} concepts`;

      if (viewMode === 'gallery') renderGallery(project);
      else if (viewMode === 'compare') renderCompare(project);
      else if (viewMode === 'single') renderSingle(project);
    }

    const gradients = [
      'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
      'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
      'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)',
      'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)',
      'linear-gradient(135deg, #fa709a 0%, #fee140 100%)',
      'linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%)',
      'linear-gradient(135deg, #fccb90 0%, #d57eeb 100%)',
      'linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%)',
    ];

    function renderGallery(project) {
      const grid = document.getElementById('conceptGrid');
      if (!project.concepts?.length) { grid.innerHTML = '<cc-empty-state message="No concepts yet" icon="📐"></cc-empty-state>'; return; }
      grid.innerHTML = project.concepts.map((c, i) => `
        <div class="concept-card" data-index="${i}">
          <div class="concept-preview">
            <div class="preview-gradient" style="background:${gradients[i % gradients.length]}"></div>
            <span class="preview-label">${esc(c.name)}</span>
          </div>
          <div class="concept-info"><h4>${esc(c.name)}</h4><p>${esc(c.description)}</p></div>
        </div>`).join('');
      grid.querySelectorAll('.concept-card').forEach(card => {
        card.addEventListener('click', () => { singleIndex = +card.dataset.index; setViewMode('single'); });
      });
    }

    async function renderCompare(project) {
      const container = document.getElementById('compareView');
      if (!project.concepts?.length) { container.innerHTML = ''; return; }
      container.innerHTML = project.concepts.map((c, i) => `
        <div class="compare-pane">
          <div class="compare-header">
            <h4>${esc(c.name)}</h4>
            <div class="compare-actions">
              <button data-file="${esc(c.file)}" class="compare-open">↗</button>
              <button data-index="${i}" class="compare-focus">🔍</button>
            </div>
          </div>
          <div class="compare-body"><div class="shadow-host" id="compare-host-${i}"></div></div>
        </div>`).join('');

      // Event delegation for compare actions
      container.querySelectorAll('.compare-open').forEach(btn => {
        btn.addEventListener('click', () => window.open(btn.dataset.file, '_blank'));
      });
      container.querySelectorAll('.compare-focus').forEach(btn => {
        btn.addEventListener('click', () => { singleIndex = +btn.dataset.index; setViewMode('single'); });
      });

      // Load all concepts in parallel
      await Promise.all(project.concepts.map(async (c, i) => {
        const html = await fetchConceptHTML(c.file);
        const host = document.getElementById(`compare-host-${i}`);
        if (host) injectIntoShadow(host, html);
      }));
    }

    async function renderSingle(project) {
      if (!project.concepts?.length) return;
      const c = project.concepts[singleIndex];
      document.getElementById('singleTitle').textContent = c.name;
      const body = document.getElementById('singleBody');
      body.innerHTML = '<div class="shadow-host" id="single-host"></div>';
      const html = await fetchConceptHTML(c.file);
      injectIntoShadow(document.getElementById('single-host'), html);
    }

    function navSingle(dir) {
      const project = getProject();
      if (!project?.concepts?.length) return;
      singleIndex = (singleIndex + dir + project.concepts.length) % project.concepts.length;
      renderSingle(project);
    }

    function openExternal() {
      const project = getProject();
      if (project?.concepts?.[singleIndex]) window.open(project.concepts[singleIndex].file, '_blank');
    }

    init();
  </script>
</body>
</html>
