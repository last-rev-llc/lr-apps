<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#8b5cf6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
<title>🔍 PR Review — Logs</title>
<link rel="stylesheet" href="https://shared.adam-harris.alphaclaw.app/theme.css">
<script src="https://shared.adam-harris.alphaclaw.app/components/index.js"></script>
    <script src="https://shared.adam-harris.alphaclaw.app/supabase-auth.js"></script>
<meta name="supabase-url" content="https://lregiwsovpmljxjvrrsc.supabase.co">
<meta name="supabase-key" content="sb_publishable_HPinRWPrX97uxshGM0u1rw_UAsQsyFq">
<script src="https://shared.adam-harris.alphaclaw.app/supabase-client.js"></script>
<script src="db.js"></script>
</head>
<body>
<cc-app-topnav app="cc-pr-review" title="🔍 PR Review" links='[{"id":"app","label":"App","href":"app.html"}]' active=""></cc-app-topnav>
<cc-app-nav app="cc-pr-review" title="🔍 PR Review" active="logs" position="bottom"></cc-app-nav>
<cc-user-auth mode="gate" allow-signup="false"></cc-user-auth>
<cc-toast></cc-toast>
<div style="max-width:960px;margin:40px auto;padding:0 20px;">
  <h1 style="font-family:var(--serif);margin-bottom:24px;">📋 Change Log</h1>
  <div id="logs-container" style="color:var(--muted);font-size:14px;">Loading logs…</div>
</div>
<script>
(async () => {
  const container = document.getElementById('logs-container');
  try {
    const db = await PrReviewDB.init();
    const rows = await db.getAll({ orderBy: 'reviewed_at', desc: true });
    if (!rows.length) {
      container.innerHTML = '<p>No log entries yet. Activity will appear here as reviews are recorded.</p>';
      return;
    }
    container.innerHTML = rows.map(r => `
      <div style="padding:10px 0;border-bottom:1px solid var(--border);">
        <span style="color:var(--heading);font-weight:600;">${r.app_name || 'review'}</span>
        <span style="margin-left:8px;font-size:12px;color:var(--muted);">${new Date(r.reviewed_at).toLocaleString()}</span>
        <div style="font-size:12px;margin-top:4px;">${r.summary || ''}</div>
      </div>`).join('');
  } catch(e) {
    container.textContent = 'Could not load logs: ' + e.message;
  }
})();
</script>
</body>
</html>
